gion": "dk2", "badge": "26", "div": false, "title": "Influencer Marketing \u2014 Reuse Your Content", "html": "<section class=\"slide\">\n  <div class=\"kicker\"><span class=\"dot\"></span> Influencer Marketing \u2014 Reuse Your Content <span class=\"num\">26</span></div>\n  <div class=\"rule\"></div>\n  <h2 class=\"d\" style=\"font-size:42px;margin-top:12px\">Don't waste your <em class=\"i\">sponsored content</em>.</h2>\n  <div class=\"lead\" style=\"margin-top:10px\">You paid for that influencer video or customer photo once \u2014 it can keep working for you in five more places.</div>\n  <div style=\"display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-top:auto;margin-bottom:auto\">\n    <div class=\"gcard\"><div style=\"font-family:'Spline Sans Mono';font-size:11px;letter-spacing:.12em;color:var(--accent)\">01</div><div class=\"gh\" style=\"font-size:18px;margin-top:6px\">Organic social posts</div></div>\n    <div class=\"gcard\"><div style=\"font-family:'Spline Sans Mono';font-size:11px;letter-spacing:.12em;color:var(--accent)\">02</div><div class=\"gh\" style=\"font-size:18px;margin-top:6px\">Paid ads <span style=\"font-size:13px;color:var(--ink-soft)\">(with permission)</span></div></div>\n    <div class=\"gcard\"><div style=\"font-family:'Spline Sans Mono';font-size:11px;letter-spacing:.12em;color:var(--accent)\">03</div><div class=\"gh\" style=\"font-size:18px;margin-top:6px\">Website testimonials</div></div>\n    <div class=\"gcard\"><div style=\"font-family:'Spline Sans Mono';font-size:11px;letter-spacing:.12em;color:var(--accent)\">04</div><div class=\"gh\" style=\"font-size:18px;margin-top:6px\">Product pages</div></div>\n    <div class=\"gcard\"><div style=\"font-family:'Spline Sans Mono';font-size:11px;letter-spacing:.12em;color:var(--accent)\">05</div><div class=\"gh\" style=\"font-size:18px;margin-top:6px\">CRM / email marketing</div></div>\n  </div>\n</section>", "section": "b2", "note": "<ul>\n<li><b>Say:</b> &quot;You paid for that influencer video or customer photo <i>once</i> \u2014 don&#x27;t let it die in a single post. One piece of content can keep working in <b>five</b> more places: organic social, paid ads (with permission), website testimonials, product pages, and your CRM/email.&quot;</li>\n<li>\u25b8 <i>Interactive:</i> &quot;Think of the last creator post you paid for \u2014 where else could it have run? That&#x27;s free reach you left on the table.&quot;</li>\n</ul>"}, {"region": "dk2", "badge": "27", "div": false, "title": "Case Study 1: Brand Ambassador Approach", "html": "<section class=\"slide\">\n  <div class=\"kicker\"><span class=\"dot\"></span> Case Study 1: Brand Ambassador Approach <span class=\"num\">27</span></div>\n  <div class=\"rule\"></div>\n  <div class=\"case c1\">\n    <div class=\"cmeta\">\n      <div><div class=\"ml\">Client</div><div class=\"mv\">MSIG Insurance</div></div>\n      <div><div class=\"ml\">Campaign Theme</div><span class=\"chip\">#RealSmallProblems</span></div>\n      <div class=\"blk\"><div class=\"bl\">The Strategy</div><div class=\"bt\">Engaged 5 key influencers for a 1-year partnership to position them as authentic brand ambassadors rather than one-off promoters.</div></div>\n      <div class=\"blk\"><div class=\"bl\">The Concept</div><div class=\"bt\">Influencers recounted seemingly small, relatable travel mishaps that caused frustration, positioning insurance as the solution to everyday inconveniences.</div></div>\n    </div>\n    <div>\n      <div class=\"sub2\" style=\"margin-top:0;color:var(--exec)\">The Ambassador Squad \u00b7 Travel \u00b7 Lifestyle \u00b7 Parenting</div>\n      <div class=\"squad\" style=\"margin-top:10px\">\n        <div class=\"sqc\"><img src=\"_assets/src/s123_0.png\" alt=\"Amelyn Beverly\"><div class=\"sqi\"><div class=\"sqn\">Amelyn Beverly</div><div class=\"sqt\">Travel</div><div class=\"sqd\">Authentic travel moments &amp; visual storytelling</div></div></div>\n        <div class=\"sqc\"><img src=\"_assets/src/s123_1.png\" alt=\"Keith Yuen\"><div class=\"sqi\"><div class=\"sqn\">Keith Yuen</div><div class=\"sqt\">Travel</div><div class=\"sqd\">Adventure travel &amp; unique destinations</div></div></div>\n        <div class=\"sqc\"><img src=\"_assets/src/s123_2.png\" alt=\"Jemma Wei\"><div class=\"sqi\"><div class=\"sqn\">Jemma Wei</div><div class=\"sqt\">Lifestyle</div><div class=\"sqd\">Literary lifestyle &amp; thoughtful narratives</div></div></div>\n        <div class=\"sqc\"><img src=\"_assets/src/s123_7.png\" alt=\"Aarika Lee\"><div class=\"sqi\"><div class=\"sqn\">Aarika Lee</div><div class=\"sqt\">Parenting</div><div class=\"sqd\">Family travel &amp; relatable parenting hurdles</div></div></div>\n        <div class=\"sqc\"><img src=\"_assets/src/s123_8.png\" alt=\"Xin Lin\"><div class=\"sqi\"><div class=\"sqn\">Xin Lin</div><div class=\"sqt\">Lifestyle</div><div class=\"sqd\">Aesthetic lifestyle &amp; daily inspirations</div></div></div>\n      </div>\n    </div>\n  </div>\n</section>", "section": "b2", "note": "<ul>\n<li><b>What the campaign was:</b> &quot;#RealSmallProblems was a highly successful, localized branding initiative designed to <i>humanize the insurance process</i>. It used everyday, micro-level inconveniences \u2014 a holiday trip interruption, a small health hiccup \u2014 to show how MSIG&#x27;s products provide timely, reliable assistance.&quot;</li>\n<li><b>Walk it:</b> &quot;MSIG didn&#x27;t do a one-off ad. They signed 5 creators for a <i>year</i> as ambassadors, around #RealSmallProblems \u2014 relatable travel mishaps that make insurance feel human. Ongoing &gt; one-off, because trust compounds.&quot;</li>\n</ul>"}, {"region": "dk2", "badge": "28", "div": false, "title": "Case Study 2: Campaign Approach \u2014 One-Off Product Launch Strategy", "html": "<section class=\"slide\">\n  <div class=\"kicker\"><span class=\"dot\"></span> Case Study 2: Campaign Approach \u2014 One-Off Product Launch Strategy <span class=\"num\">28</span></div>\n  <div class=\"rule\"></div>\n  <div class=\"case c2\">\n    <div class=\"cmeta\">\n      <div><div class=\"ml\">Client</div><div class=\"mv\">Eu Yan Sang</div></div>\n      <div><div class=\"ml\">Campaign</div><span class=\"chip\">Mother's Day Bird's Nest</span></div>\n      <div class=\"blk\"><div class=\"bl\">The Emotional Hook</div><div class=\"bt q\">\"For 365 days your mother has taken care of you. For 1 day, you can take care of your mum.\"</div></div>\n      <div class=\"blk\"><div class=\"bl\">Campaign Mechanism</div><div class=\"bt\">Product seeding via an exclusive gift box to generate immediate visual impact and authentic reactions.</div></div>\n    </div>\n    <div class=\"seedbox\">\n      <img src=\"_assets/src/s124_0.png\" alt=\"The seeding kit\">\n      <div class=\"seedlist\">\n        <div class=\"sh\">Exclusive Gift Box Contents</div>\n        <div class=\"si\"><span>Premium Slow Cooker</span><span>2pcs Raw Bird's Nest</span><span>Premium Rock Sugar</span><span>Red Dates</span><span>Detailed Pocket Guide (Recipe &amp; Tips)</span><span>Premium Packaging Design</span></div>\n      </div>\n    </div>\n    <div class=\"impact\">\n      <div class=\"impbox\"><div class=\"iv\">500k+</div><div class=\"il\">Organic Views Generated</div></div>\n      <div class=\"impbox\"><div class=\"id\">\ud83d\ude0a Positive Sentiment</div><div class=\"idd\">High resonance with emotional messaging</div></div>\n    </div>\n  </div>\n</section>", "section": "b2", "note": "<ul>\n<li><b>Walk it:</b> &quot;Opposite play \u2014 a single Mother&#x27;s Day campaign. They <i>seeded</i> a premium gift box to creators, let the genuine reactions do the work, and got 500k+ organic views off an emotional hook. Right tool for a launch moment.&quot;</li>\n<li><b>Pair 27 + 28 deliberately:</b> &quot;Same lever, two settings \u2014 ongoing vs one-off. Pick by your objective.&quot;</li>\n</ul>"}, {"region": "dk2", "badge": "29", "div": false, "title": "How Social Media, Influencers &amp; UGC Work Together", "html": "<section class=\"slide\">\n  <div class=\"kicker\"><span class=\"dot\"></span> How Social Media, Influencers &amp; UGC Work Together <span class=\"num\">29</span></div>\n  <div class=\"rule\"></div>\n  <div class=\"sub2\">Integrated Ecosystem Flow</div>\n  <div class=\"vflow\">\n    <div class=\"vstep\"><div class=\"vn\">Social Media</div><div class=\"vd\">Builds presence</div></div>\n    <div class=\"varrow\">\u2193</div>\n    <div class=\"vstep\"><div class=\"vn\">Influencers</div><div class=\"vd\">Accelerate trust</div></div>\n    <div class=\"varrow\">\u2193</div>\n    <div class=\"vstep\"><div class=\"vn\">User Generated Content (UGC)</div><div class=\"vd\">Sustains credibility</div></div>\n    <div class=\"varrow\">\u2193</div>\n    <div class=\"vstep\"><div class=\"vn\">Paid Media</div><div class=\"vd\">Amplifies what already works</div></div>\n  </div>\n</section>", "section": "b2", "note": "<ul>\n<li><b>Say:</b> &quot;Not separate tactics \u2014 one system. Social builds presence \u2192 influencers accelerate trust \u2192 UGC sustains credibility \u2192 paid amplifies what&#x27;s already working. Don&#x27;t pay to amplify something that isn&#x27;t working yet.&quot;</li>\n</ul>\n<p>---</p>"}, {"region": "dk2", "badge": "30", "div": true, "title": "Content Optimisation for Different Platforms", "html": "<section class=\"slide divider\">\n  <div class=\"dtag\">SMU \u00b7 Day 1 \u2014 Section 2</div>\n  <div class=\"eyebrow\">Part 3 of 4</div>\n  <h1 class=\"d\">Content Optimisation<br>for Different Platforms</h1>\n  <div class=\"dsub\">One idea, many platforms \u2014 each with its own rules of reach and relevance.</div>\n  <div class=\"dbn\">03</div>\n</section>", "section": "b3", "note": "<ul>\n<li><b>Hook:</b> &quot;Be honest \u2014 who posts the exact same thing to every platform at once?&quot; (Hands.) &quot;It quietly underperforms <i>everywhere</i>. Each platform is a different room with different manners.&quot;</li>\n</ul>"}, {"region": "dk2", "badge": "30", "div": false, "title": "Why Platform-Specific Content Optimisation Matters", "html": "<section class=\"slide\">\n  <div class=\"kicker\"><span class=\"dot\"></span> Why Platform-Specific Content Optimisation Matters <span class=\"num\">30</span></div>\n  <div class=\"rule\"></div>\n  <div class=\"center\">\n    <div style=\"background:var(--proof);color:#fff;border-radius:10px;padding:40px 44px\">\n      <div style=\"font-size:26px;line-height:1.35\">Every platform has its own audience behaviour, content format, and engagement expectations.</div>\n      <div style=\"font-size:24px;line-height:1.35;margin-top:22px\">Optimising content ensures<br><span style=\"font-family:'Fraunces';font-size:46px;font-weight:600\">reach, relevance, and performance.</span></div>\n    </div>\n  </div>\n</section>", "section": "b3", "note": "<ul>\n<li><b>Hook:</b> &quot;Be honest \u2014 who posts the exact same thing to every platform at once?&quot; (Hands.) &quot;It quietly underperforms <i>everywhere</i>. Each platform is a different room with different manners.&quot;</li>\n</ul>"}, {"region": "dk2", "badge": "31", "div": false, "title": "Understanding Platform Audiences", "html": "<section class=\"slide\">\n  <div class=\"kicker\"><span class=\"dot\"></span> Understanding Platform Audiences <span class=\"num\">31</span></div>\n  <div class=\"rule\"></div>\n  <div class=\"ptbl\">\n    <div class=\"prow\"><div class=\"pc\"><img src=\"_assets/src/s107_7.png\" alt=\"LinkedIn\"></div><div class=\"pd2\">Professionals, credibility-focused</div><div class=\"pb\"><ul><li>Thought leadership, case studies, insights</li><li>Clear structure, professional tone</li><li>Value-first, avoid sales-heavy posts</li></ul></div></div>\n    <div class=\"prow\"><div class=\"pc\"><img src=\"_assets/src/s107_0.png\" alt=\"Instagram\"></div><div class=\"pd2\">Visual-first, emotional connection</div><div class=\"pb\"><ul><li>High-quality visuals, strong aesthetics</li><li>Short captions, clear CTAs</li><li>Use of reels, stories, carousels</li></ul></div></div>\n    <div class=\"prow\"><div class=\"pc\"><img src=\"_assets/src/s107_1.png\" alt=\"TikTok\"></div><div class=\"pd2\">Fast, entertainment-driven, scroll-heavy</div><div class=\"pb\"><ul><li>Hooks within 1\u20132 seconds</li><li>Authentic, informal, human-focused</li><li>Trends, voiceovers, fast captions</li></ul></div></div>\n    <div class=\"prow\"><div class=\"pc\"><img src=\"_assets/src/s107_2.png\" alt=\"Facebook\"></div><div class=\"pd2\">Community-led, family-oriented</div><div class=\"pb\"><ul><li>Community, events, relatable stories</li><li>Longer captions work here</li><li>Great for older demographic and niche groups</li></ul></div></div>\n    <div class=\"prow lab\"><div class=\"pc\"><div class=\"pcl\">Website</div></div><div class=\"pd2\">Trust-building, information-seeking</div></div>\n    <div class=\"prow lab\"><div class=\"pc\"><div class=\"pcl\">Email / EDM</div></div><div class=\"pd2\">Direct communication, conversion-driven</div></div>\n  </div>\n</section>", "section": "b3", "note": "<ul>\n<li><b>Say (matching, fast):</b> LinkedIn = professional/credibility; Instagram = visual/aesthetic; TikTok = hook in 1\u20132 seconds; Facebook = community/older; Website = trust; Email = direct/owned. &quot;Same message, six different accents.&quot;</li>\n</ul>"}, {"region": "dk2", "badge": "32", "div": false, "title": "Content Format Differences", "html": "<section class=\"slide\">\n  <div class=\"kicker\"><span class=\"dot\"></span> Content Format Differences <span class=\"num\">32</span></div>\n  <div class=\"rule\"></div>\n  <div class=\"split\">\n    <ul class=\"blist star\" style=\"margin-top:26px\">\n      <li>Long vs short form</li>\n      <li>Static vs video vs carousel</li>\n      <li>Search-driven vs feed-driven</li>\n      <li>Professional tone vs casual tone</li>\n    </ul>\n    <div style=\"display:flex;flex-direction:column;gap:14px;align-items:center\">\n      <img class=\"illus\" src=\"_assets/src/s132_0.png\" alt=\"video clock\" style=\"width:200px\">\n      <div style=\"display:flex;gap:14px\"><img class=\"illus\" src=\"_assets/src/s132_1.png\" alt=\"browser\" style=\"width:150px\"><img class=\"illus\" src=\"_assets/src/s132_2.png\" alt=\"analytics\" style=\"width:150px\"></div>\n    </div>\n  </div>\n</section>", "section": "b3", "note": "<ul>\n<li><b>Say:</b> &quot;Four dials to turn per platform: long vs short, static vs video vs carousel, search-driven vs feed-driven, professional vs casual. You&#x27;re not making new content \u2014 you&#x27;re <i>re-cutting</i> one piece.&quot;</li>\n</ul>"}, {"region": "dk2", "badge": "33", "div": false, "title": "Optimising Content for Website &amp; Blog", "html": "<section class=\"slide\">\n  <div class=\"kicker\"><span class=\"dot\"></span> Optimising Content for Website &amp; Blog <span class=\"num\">33</span></div>\n  <div class=\"rule\"></div>\n  <div class=\"duo\">\n    <div class=\"pane a\"><div class=\"pl\">Website Content</div><ul style=\"margin-top:6px\"><li>SEO-structured: headings, keywords, clarity</li><li>Trust indicators: testimonials, case studies</li><li>Scannable information architecture</li></ul></div>\n    <div class=\"pane g\"><div class=\"pl\">Blog Content</div><ul style=\"margin-top:6px\"><li>Educational storytelling</li><li>Internal linking for navigation</li><li>Optimised titles &amp; meta descriptions</li></ul></div>\n  </div>\n</section>", "section": "b3", "note": "<ul>\n<li><b>Say:</b> &quot;Your website is the one room <i>you</i> own, where people come to be convinced \u2014 structure it for SEO and trust (testimonials, case studies). Blog earns the search traffic.&quot; (Callback to Section 1 <i>Do</i> stage.)</li>\n</ul>"}, {"region": "dk2", "badge": "34", "div": false, "title": "Optimising for Mobile &amp; Multi-Channel Experience", "html": "<section class=\"slide\">\n  <div class=\"kicker\"><span class=\"dot\"></span> Optimising for Mobile &amp; Multi-Channel Experience <span class=\"num\">34</span></div>\n  <div class=\"rule\"></div>\n  <div class=\"split\" style=\"grid-template-columns:.9fr 1.1fr\">\n    <div>\n      <h2 class=\"d\" style=\"font-size:32px\">Mobile-First Considerations</h2>\n      <ul class=\"blist star\" style=\"margin-top:16px\">\n        <li>Short paragraphs</li>\n        <li>Clear hierarchy</li>\n        <li>Large text and buttons</li>\n        <li>Visual spacing for readability</li>\n      </ul>\n    </div>\n    <div style=\"display:flex;justify-content:center\"><img src=\"_assets/src/s134_0.png\" alt=\"Mobile-first / Task-first / Content-first infographic\" style=\"max-height:520px;width:auto;border-radius:8px\"></div>\n  </div>\n</section>", "section": "b3", "note": "<ul>\n<li><b>Say:</b> &quot;Almost everyone meets your content on a phone, one thumb, half-distracted. Short paragraphs, big buttons, clear hierarchy. If it&#x27;s hard to read on mobile, it doesn&#x27;t exist.&quot;</li>\n</ul>"}, {"region": "dk2", "badge": "35", "div": false, "title": "Repurposing Content Effectively Across Platforms", "html": "<section class=\"slide\">\n  <div class=\"kicker\"><span class=\"dot\"></span> Repurposing Content Effectively Across Platforms <span class=\"num\">35</span></div>\n  <div class=\"rule\"></div>\n  <div class=\"lead\" style=\"margin-top:12px;color:var(--ink)\">Transforming one core piece of content into multiple formats while adapting to platform needs.</div>\n  <div class=\"sub2\" style=\"margin-top:18px\">Example Flow</div>\n  <div class=\"chain\">\n    <div class=\"cn k\">1 blog post</div><span class=\"ca\">\u2192</span>\n    <div class=\"cn\">LinkedIn article</div><span class=\"ca\">\u2192</span>\n    <div class=\"cn\">Instagram carousel</div><span class=\"ca\">\u2192</span>\n    <div class=\"cn\">TikTok explainer</div><span class=\"ca\">\u2192</span>\n    <div class=\"cn\">Email newsletter tip</div><span class=\"ca\">\u2192</span>\n    <div class=\"cn\">Website FAQ section</div><span class=\"ca\">\u2192</span>\n    <div class=\"cn\">Short clips or quotes for social</div>\n  </div>\n  <div class=\"aibar\">\n    <img src=\"_assets/src/s135_0.png\" alt=\"AI\">\n    <div>\n      <div class=\"at\">AI can instantly:</div>\n      <ul><li>Rewrite tone</li><li>Shorten content</li><li>Reformat structure</li><li>Extract key insights</li></ul>\n    </div>\n  </div>\n</section>", "section": "b3", "note": "<ul>\n<li><b>Say:</b> &quot;Write <i>one</i> strong piece \u2014 a blog post \u2014 then spin it into a LinkedIn article, an IG carousel, a TikTok, an email tip, a website FAQ. One idea, seven assets. AI does the re-cutting in seconds.&quot; Work smart, not more.</li>\n</ul>"}, {"region": "dk2", "badge": "36", "div": false, "title": "Using Data &amp; Metrics to Optimise Platform Content", "html": "<section class=\"slide\">\n  <div class=\"kicker\"><span class=\"dot\"></span> Using Data &amp; Metrics to Optimise Platform Content <span class=\"num\">36</span></div>\n  <div class=\"rule\"></div>\n  <h2 class=\"d\" style=\"font-size:34px;margin-top:14px\">Key Metrics by Platform</h2>\n  <div class=\"grid3 auto\">\n    <div class=\"gcard\"><div class=\"gh\" style=\"font-size:18px\">Engagement rate</div><div style=\"font-size:14px;color:var(--ink-soft);margin-top:5px\">Likes, comments, shares</div></div>\n    <div class=\"gcard\"><div class=\"gh\" style=\"font-size:18px\">Watch time</div><div style=\"font-size:14px;color:var(--ink-soft);margin-top:5px\">Video</div></div>\n    <div class=\"gcard\"><div class=\"gh\" style=\"font-size:18px\">Click-through rate</div><div style=\"font-size:14px;color:var(--ink-soft);margin-top:5px\">CTAs</div></div>\n    <div class=\"gcard\"><div class=\"gh\" style=\"font-size:18px\">Reach &amp; impressions</div></div>\n    <div class=\"gcard\"><div class=\"gh\" style=\"font-size:18px\">Website bounce rate</div></div>\n    <div class=\"gcard\"><div class=\"gh\" style=\"font-size:18px\">Email open &amp; click rates</div></div>\n  </div>\n  <div class=\"takeaway\" style=\"font-size:22px\">Track your <b>metrics</b>.</div>\n</section>", "section": "b3", "note": "<ul>\n<li><b>Say:</b> &quot;Track what each platform actually rewards. And separate three things people confuse: <b>Reach</b> (did people see it \u2014 awareness), <b>Engagement</b> (did it resonate \u2014 interest), <b>ROI</b> (did it make money \u2014 results). Vanity metrics feel good; ROI pays rent.&quot;</li>\n<li><b>Spine tie:</b> Reach = See, Engagement = Think, ROI = Do.</li>\n</ul>"}, {"region": "dk2", "badge": "37", "div": false, "title": "Key Metrics to Track", "html": "<section class=\"slide\">\n  <div class=\"kicker\"><span class=\"dot\"></span> Key Metrics to Track <span class=\"num\">37</span></div>\n  <div class=\"rule\"></div>\n  <div class=\"sub2\">Understanding Reach vs. Engagement vs. ROI</div>\n  <div class=\"cmp3\">\n    <div class=\"cmpcol c1\"><div class=\"chd\">\ud83d\udc41 Reach</div><div class=\"cmpbody\">\n      <div class=\"cseg\"><div class=\"sl\">Definition</div><div style=\"font-size:13.5px;color:var(--ink-soft);line-height:1.3\">Measures the total number of unique people who see your content. It reflects the extent of your content's visibility.</div></div>\n      <div class=\"cseg\"><div class=\"sl\">Primary Purpose</div><div class=\"pp\">Drives Awareness</div></div>\n      <div class=\"cseg\"><div class=\"sl\">Key Metrics</div><ul><li>Impressions</li><li>Video Views</li><li>Unique Visitors</li><li>Follower Growth</li></ul></div>\n    </div></div>\n    <div class=\"cmpcol c2\"><div class=\"chd\">\u2764 Engagement</div><div class=\"cmpbody\">\n      <div class=\"cseg\"><div class=\"sl\">Definition</div><div style=\"font-size:13.5px;color:var(--ink-soft);line-height:1.3\">Measures how the audience interacts with content. It indicates how well content resonates.</div><div class=\"q\" style=\"margin-top:6px\">High engagement signals interest and increases organic visibility via algorithm prioritization.</div></div>\n      <div class=\"cseg\"><div class=\"sl\">Primary Purpose</div><div class=\"pp\">Signals Resonance</div></div>\n      <div class=\"cseg\"><div class=\"sl\">Key Metrics</div><ul><li>Likes &amp; Comments</li><li>Shares &amp; Saves</li><li>Click-Through Rate (CTR)</li></ul></div>\n    </div></div>\n    <div class=\"cmpcol c3\"><div class=\"chd\">\ud83d\udcc8 ROI</div><div class=\"cmpbody\">\n      <div class=\"cseg\"><div class=\"sl\">Definition</div><div style=\"font-size:13.5px;color:var(--ink-soft);line-height:1.3\">Measures the tangible business impact of social media efforts relative to the cost.</div></div>\n      <div class=\"cseg\"><div class=\"sl\">Primary Purpose</div><div class=\"pp\">Validates Results</div></div>\n      <div class=\"cseg\"><div class=\"sl\">Key Metrics</div><ul><li>Cost Per Acquisition (CPA)</li><li>Conversion Rate</li><li>Attributed Revenue</li><li>Customer Lifetime Value</li></ul></div>\n    </div></div>\n  </div>\n</section>", "section": "b3", "note": "<ul>\n<li><b>Say:</b> &quot;Track what each platform actually rewards. And separate three things people confuse: <b>Reach</b> (did people see it \u2014 awareness), <b>Engagement</b> (did it resonate \u2014 interest), <b>ROI</b> (did it make money \u2014 results). Vanity metrics feel good; ROI pays rent.&quot;</li>\n<li><b>Spine tie:</b> Reach = See, Engagement = Think, ROI = Do.</li>\n</ul>"}, {"region": "dk2", "badge": "38", "div": true, "title": "Activity 4", "html": "<section class=\"slide divider t\">\n  <div class=\"dtag\">SMU \u00b7 Day 1 \u2014 Section 2</div>\n  <div class=\"eyebrow\">Hands-on</div>\n  <h1 class=\"d\">Activity 4</h1>\n  <div class=\"dsub\">Adapt one message across platforms \u2014 formats, objectives, metrics.</div>\n  <div class=\"dbn\">A4</div>\n</section>", "section": "a4", "note": "<ul>\n<li><b>Set up:</b> &quot;Take your AI-generated image and one core message. Pick three platforms. For each: format, caption <i>in that platform&#x27;s voice</i>, objective, metric. Then have AI pressure-test it.&quot;</li>\n<li><b>Debrief:</b> &quot;How different did the <i>same</i> message have to become across three platforms? That difference is the whole lesson.&quot;</li>\n</ul>\n<p><i>(Tea Break)</i></p>\n<p>---</p>"}, {"region": "dk2", "badge": "38", "div": false, "title": "Activity 4 \u2014 Platform-Specific Content Plan", "html": "<section class=\"slide qslide\">\n  <div class=\"time\">\u23f1 20 minutes</div>\n  <div class=\"kicker\"><span class=\"dot\"></span> Activity 4 \u2014 Platform-Specific Content Plan <span class=\"num\">38</span></div>\n  <div class=\"rule\"></div>\n  <div class=\"goal\"><b>Goal:</b> Create a Platform-Specific Content Plan Using Your AI Image. <b>Objective:</b> Learn to adapt one message across platforms with different formats, objectives, and success metrics. <span class=\"tools\">Suggested tools \u2014 ChatGPT, Gemini, Grok</span></div>\n  <div class=\"steps\">\n    <div class=\"stp\"><div class=\"sn\">Step 1</div><div class=\"st\">Choose One Core Message</div><div class=\"sd\">Pick a single message to communicate using your AI image (product promo, event, service, etc.).</div></div>\n    <div class=\"stp\"><div class=\"sn\">Step 2 \u00b7 1 min</div><div class=\"st\">Select Three Platforms</div><div class=\"sd\">Choose any three: LinkedIn, Instagram, TikTok, Facebook, Website, Email.</div></div>\n    <div class=\"stp\"><div class=\"sn\">Step 3 \u00b7 6\u20137 min</div><div class=\"st\">Adapt for Each Platform</div><ul><li>Format (LinkedIn post, IG carousel, TikTok short)</li><li>Caption (rewrite in platform's style)</li><li>Objective (awareness, engagement, clicks, sign-ups)</li><li>Metric (engagement, CTR, watch time, saves)</li></ul></div>\n    <div class=\"stp\"><div class=\"sn\">Step 4</div><div class=\"st\">Refine Using AI</div><div class=\"sd\">\"Improve my content plan based on platform best practices. Check caption tone, format, and metrics for relevance.\"</div></div>\n  </div>\n  <div class=\"prompt\"><b>Prompt to try:</b> \"Using the image I generated earlier, help me create a platform-specific content plan. Here is my core message: [insert 1-sentence message]. I want to adapt this for three platforms. For each, provide: Format \u00b7 Caption rewritten to match the platform's tone &amp; audience \u00b7 Objective \u00b7 Success metric. Present the plan in a clear table with three rows, one per platform.\"</div>\n</section>", "section": "a4", "note": "<ul>\n<li><b>Set up:</b> &quot;Take your AI-generated image and one core message. Pick three platforms. For each: format, caption <i>in that platform&#x27;s voice</i>, objective, metric. Then have AI pressure-test it.&quot;</li>\n<li><b>Debrief:</b> &quot;How different did the <i>same</i> message have to become across three platforms? That difference is the whole lesson.&quot;</li>\n</ul>\n<p><i>(Tea Break)</i></p>\n<p>---</p>"}, {"region": "dk2", "badge": "39", "div": true, "title": "Tea Break", "html": "<section class=\"slide divider t\">\n  <div class=\"dtag\">SMU \u00b7 Day 1 \u2014 Section 2</div>\n  <div class=\"eyebrow\">Pause</div>\n  <h1 class=\"d\">Tea Break</h1>\n  <div class=\"dsub\">Back shortly \u2014 refill, stretch, compare notes.</div>\n  <div class=\"dbn\">\u2615</div>\n</section>", "section": "b4", "note": "<ul>\n<li><b>Hook:</b> &quot;Email feels old. But it&#x27;s the only channel where you <b>own the audience</b> \u2014 no algorithm decides who sees you. Highest ROI in marketing, and it&#x27;s <i>yours</i>.&quot; This is the <i>Care / Keep</i> stage of the spine.</li>\n</ul>"}, {"region": "dk2", "badge": "39", "div": true, "title": "Email Marketing", "html": "<section class=\"slide divider\">\n  <div class=\"dtag\">SMU \u00b7 Day 1 \u2014 Section 2</div>\n  <div class=\"eyebrow\">Part 4 of 4</div>\n  <h1 class=\"d\">Email Marketing</h1>\n  <div class=\"dsub\">The one channel you actually own \u2014 right message, right person, right moment.</div>\n  <div class=\"dbn\">04</div>\n</section>", "section": "b4", "note": "<ul>\n<li><b>Hook:</b> &quot;Email feels old. But it&#x27;s the only channel where you <b>own the audience</b> \u2014 no algorithm decides who sees you. Highest ROI in marketing, and it&#x27;s <i>yours</i>.&quot; This is the <i>Care / Keep</i> stage of the spine.</li>\n</ul>"}, {"region": "dk2", "badge": "39", "div": false, "title": "Why Email Marketing Still Works for SMEs", "html": "<section class=\"slide\">\n  <div class=\"kicker\"><span class=\"dot\"></span> Why Email Marketing Still Works for SMEs <span class=\"num\">39</span></div>\n  <div class=\"rule\"></div>\n  <div class=\"duo\">\n    <div class=\"pane a\"><div class=\"pl\">\u2709 What is Email Marketing?</div><div class=\"ph\" style=\"font-size:22px\">Direct communication with customers via email</div><div class=\"pd\">Used for sales, updates, education, and relationship building.</div></div>\n    <div class=\"pane b\"><div class=\"pl\">Why It's Important</div><ul style=\"margin-top:6px\"><li>One of the highest ROI marketing channels</li><li>You own your audience (not affected by algorithms)</li><li>Low cost, highly scalable</li><li>Very personal and targeted</li></ul></div>\n  </div>\n</section>", "section": "b4", "note": "<ul>\n<li><b>Hook:</b> &quot;Email feels old. But it&#x27;s the only channel where you <b>own the audience</b> \u2014 no algorithm decides who sees you. Highest ROI in marketing, and it&#x27;s <i>yours</i>.&quot; This is the <i>Care / Keep</i> stage of the spine.</li>\n</ul>"}, {"region": "dk2", "badge": "40", "div": false, "title": "Crafting Effective Emails: From Subject to CTA", "html": "<section class=\"slide\">\n  <div class=\"kicker\"><span class=\"dot\"></span> Crafting Effective Emails: From Subject to CTA <span class=\"num\">40</span></div>\n  <div class=\"rule\"></div>\n  <div class=\"anat\">\n    <div class=\"col\">\n      <div class=\"lblk\"><div class=\"lt\">Subject Line</div><div class=\"ld\">Grabs attention. Decides whether the email gets opened.</div></div>\n      <div class=\"lblk\"><div class=\"lt\">Header / Branding</div><div class=\"ld\">Logo, brand colours, trust elements.</div></div>\n      <div class=\"lblk\"><div class=\"lt\">Call-To-Action (CTA)</div><div class=\"ld\">Tells users what to do next. \"Shop Now\" \u00b7 \"Register Today\" \u00b7 \"Download Free Guide\"</div></div>\n    </div>\n    <div class=\"mock\"><img src=\"_assets/src/s143_0.png\" alt=\"Email anatomy\"></div>\n    <div class=\"col r\">\n      <div class=\"lblk\"><div class=\"lt\">Preview Text</div><div class=\"ld\">Short supporting teaser under the subject.</div></div>\n      <div class=\"lblk\"><div class=\"lt\">Main Content</div><div class=\"ld\">Message, story, offer, or update. Can be text, images, or video.</div></div>\n    </div>\n  </div>\n</section>", "section": "b4", "note": "<ul>\n<li><b>Say:</b> &quot;Anatomy of an email that works: subject line (gets it opened \u2014 the whole game), preview text, header, one clear message, one clear CTA. <b>One email, one job.</b> Don&#x27;t ask them to do five things.&quot;</li>\n</ul>"}, {"region": "dk2", "badge": "41", "div": false, "title": "Email Marketing \u2014 Examples", "html": "<section class=\"slide\">\n  <div class=\"kicker\"><span class=\"dot\"></span> Email Marketing \u2014 Examples <span class=\"num\">41</span></div>\n  <div class=\"rule\"></div>\n  <div class=\"emails\">\n    <img src=\"_assets/src/s144_2.png\" alt=\"Email example 1\">\n    <img src=\"_assets/src/s144_0.png\" alt=\"Email example 2\">\n    <img src=\"_assets/src/s144_1.png\" alt=\"Email example 3\">\n  </div>\n</section>", "section": "b4", "note": "<ul>\n<li><b>Walk briefly:</b> &quot;Notice \u2014 one message, one button, scannable. Not a wall of text.&quot; Point at what&#x27;s good.</li>\n</ul>"}, {"region": "dk2", "badge": "42", "div": false, "title": "Email Marketing \u2014 Why?", "html": "<section class=\"slide\">\n  <div class=\"kicker\"><span class=\"dot\"></span> Email Marketing \u2014 Why? <span class=\"num\">42</span></div>\n  <div class=\"rule\"></div>\n  <div class=\"jrow\">\n    <div>\n      <div class=\"copylead\"><span class=\"mk\">Email Marketing</span> is one of the best channels to connect with users at different life stages.</div>\n      <div class=\"tealbox\">\ud83d\udca1 Best practice is to align messages to users' life stages, delivering the right content at the right moment.</div>\n    </div>\n    <div class=\"jimg\"><img src=\"_assets/src/s145_0.png\" alt=\"The Email Customer Journey\"></div>\n  </div>\n</section>", "section": "b4", "note": "<ul>\n<li><b>Say:</b> &quot;Email&#x27;s superpower: you can meet someone at the <i>right moment</i>. A new subscriber and a 2-year customer should not get the same email. Relevance is the entire game.&quot;</li>\n</ul>"}, {"region": "dk2", "badge": "43", "div": false, "title": "Email Marketing \u2014 Deliverability &amp; Sender Reputation", "html": "<section class=\"slide\">\n  <div class=\"kicker\"><span class=\"dot\"></span> Email Marketing \u2014 Deliverability &amp; Sender Reputation <span class=\"num\">43</span></div>\n  <div class=\"rule\"></div>\n  <div class=\"sub2\">Landing in the inbox, not the spam folder</div>\n  <div class=\"duo\">\n    <div class=\"pane a\">\n      <div class=\"pl\">\u25c6 1 \u00b7 Prove it's really you</div>\n      <div class=\"ph\" style=\"font-size:22px\">Authenticate your domain</div>\n      <ul style=\"margin-top:6px\">\n        <li><b>SPF \u00b7 DKIM \u00b7 DMARC</b> \u2014 DNS records that prove the email truly came from you</li>\n        <li>Set up once, in your email tool \u2014 then forget it</li>\n        <li>Since 2024, Gmail &amp; Yahoo <b>require</b> them for bulk senders. No authentication \u2192 no inbox</li>\n      </ul>\n    </div>\n    <div class=\"pane g\">\n      <div class=\"pl\">\u25cf 2 \u00b7 Keep a clean reputation</div>\n      <ul style=\"margin-top:6px\">\n        <li>Keep spam complaints <b>under 0.3%</b> \u2014 the line Gmail &amp; Yahoo draw</li>\n        <li>Remove inactive &amp; bounced addresses \u2014 stop emailing people who never open</li>\n        <li>Use double opt-in \u00b7 one-click unsubscribe (now required)</li>\n        <li>Warm up a new domain slowly; avoid image-only emails (a spam trigger)</li>\n      </ul>\n    </div>\n  </div>\n  <div class=\"takeaway\">A small, <b>engaged</b> list beats a big, cold one \u2014 every time. Reputation is earned one send at a time.</div>\n</section>", "section": "b4", "note": "<ul>\n<li><b>Frame it as two questions:</b> &quot;Whether your email reaches the inbox comes down to two things \u2014 <i>can the inbox prove it&#x27;s really you</i>, and <i>do people actually want your mail</i>.&quot;</li>\n<li><b>1 \u00b7 Prove it&#x27;s you (authentication):</b> &quot;SPF, DKIM, DMARC \u2014 three DNS records that prove the email came from your domain. You set them up <i>once</i> in your email tool. This isn&#x27;t optional any more: <b>since 2024 Gmail and Yahoo require them</b> for anyone sending in volume. No authentication, no inbox.&quot;</li>\n<li><b>2 \u00b7 Keep a clean reputation:</b> &quot;Keep spam complaints <b>under 0.3%</b> \u2014 that&#x27;s the literal line Gmail and Yahoo draw. Remove people who never open. Use double opt-in and a one-click unsubscribe (now required). Warm a new domain up slowly. Don&#x27;t send image-only emails \u2014 classic spam trigger.&quot;</li>\n<li><b>The one line that matters:</b> &quot;A small, engaged list beats a big, cold one <i>every time</i>. Every send either builds or burns your reputation.&quot;</li>\n<li>\u25b8 <i>Honest aside for the room:</i> &quot;You don&#x27;t need to memorise SPF vs DKIM \u2014 next slide shows how much of this your tool just does for you.&quot;</li>\n</ul>"}, {"region": "dk2", "badge": "44", "div": false, "title": "Email Marketing \u2014 Let the Tool Do It", "html": "<section class=\"slide\">\n  <div class=\"kicker\"><span class=\"dot\"></span> Email Marketing \u2014 Let the Tool Do It <span class=\"num\">44</span></div>\n  <div class=\"rule\"></div>\n  <h2 class=\"d\" style=\"font-size:34px;margin-top:8px\">Most of this, your email tool does <em class=\"i\">for you</em>.</h2>\n  <div class=\"lead\" style=\"margin-top:8px;font-size:17px\">You don't hand-edit DNS or scrub lists by hand. A proper platform \u2014 Mailchimp, Klaviyo, HubSpot, Brevo \u2014 handles the plumbing.</div>\n  <div class=\"grid3 auto\">\n    <div class=\"gcard\"><div class=\"gh\">Auto-suppression</div><div style=\"font-size:14px;color:var(--ink-soft);margin-top:8px;line-height:1.35\">Bounces, unsubscribes &amp; spam complaints are removed automatically \u2014 protecting your reputation.</div></div>\n    <div class=\"gcard\"><div class=\"gh\">Authentication setup</div><div style=\"font-size:14px;color:var(--ink-soft);margin-top:8px;line-height:1.35\">Step-by-step SPF / DKIM / DMARC, so you stay compliant with Gmail &amp; Yahoo.</div></div>\n    <div class=\"gcard\"><div class=\"gh\">Sending infrastructure</div><div style=\"font-size:14px;color:var(--ink-soft);margin-top:8px;line-height:1.35\">Managed servers &amp; IP reputation \u2014 you borrow theirs instead of building your own.</div></div>\n    <div class=\"gcard\"><div class=\"gh\">Engagement segmentation</div><div style=\"font-size:14px;color:var(--ink-soft);margin-top:8px;line-height:1.35\">Sends less to disengaged contacts before they drag your reputation down.</div></div>\n    <div class=\"gcard\"><div class=\"gh\">Deliverability dashboard</div><div style=\"font-size:14px;color:var(--ink-soft);margin-top:8px;line-height:1.35\">Inbox-placement &amp; reputation health you can actually see (esp. HubSpot, Klaviyo).</div></div>\n    <div class=\"gcard\"><div class=\"gh\">One-click unsubscribe</div><div style=\"font-size:14px;color:var(--ink-soft);margin-top:8px;line-height:1.35\">Adds the unsubscribe header Gmail &amp; Yahoo now require \u2014 automatically.</div></div>\n  </div>\n  <div class=\"takeaway\">Your job: a <b>clean list</b>, <b>relevant content</b>, and don't blast. The tool does the rest.</div>\n</section>", "section": "b4", "note": "<ul>\n<li><b>Say:</b> &quot;Good news: you don&#x27;t hand-edit DNS records or scrub lists by hand. A real email platform \u2014 Mailchimp, Klaviyo, HubSpot, Brevo \u2014 does the plumbing: <b>auto-removes bounces/unsubscribes/complaints, walks you through SPF/DKIM/DMARC, runs the sending servers and their IP reputation, segments out your dead weight, and shows a deliverability dashboard</b> (HubSpot and Klaviyo especially).&quot;</li>\n<li><b>Land the takeaway:</b> &quot;So your job is small and human: a <b>clean list</b>, <b>relevant content</b>, and <b>don&#x27;t blast</b>. The tool handles the rest. The biggest mistake isn&#x27;t a technical one \u2014 it&#x27;s emailing people who stopped caring.&quot;</li>\n</ul>"}, {"region": "dk2", "badge": "45", "div": false, "title": "Email in the Wild \u2014 Example 1 of 3", "html": "<section class=\"slide\">\n  <div class=\"kicker\"><span class=\"dot\"></span> Email in the Wild \u2014 Example 1 of 3 <span class=\"num\">45</span></div>\n  <div class=\"rule\"></div>\n  <div style=\"display:grid;grid-template-columns:1fr 1.1fr;gap:38px;align-items:center;flex:1;margin-top:4px\">\n    <div>\n      <div style=\"font-family:'Spline Sans Mono';font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--accent)\">Nurture / value email</div>\n      <h2 class=\"d\" style=\"font-size:30px;margin-top:10px;line-height:1.08\">Lead with the reader's <em class=\"i\">goal</em>, not your product.</h2>\n      <ul class=\"blist\" style=\"margin-top:14px\">\n        <li><b>Personalised subject</b> \u2014 \"Tina, attract more clients\u2026\" earns the open before they see a single word inside.</li>\n        <li><b>One job, one CTA</b> \u2014 a single \"Learn more\". No five-button clutter.</li>\n        <li><b>Verified sender + easy unsubscribe</b> \u2014 the deliverability hygiene from the last slide, in practice.</li>\n      </ul>\n      <div class=\"takeaway\" style=\"margin-top:16px\">Sender: <b>Shopify Partners</b> \u2014 a relationship email that gives before it asks.</div>\n    </div>\n    <div style=\"display:flex;align-items:center;justify-content:center\">\n      <img src=\"_assets/email-eg-shopify.jpg\" alt=\"Shopify Partners email \u2014 Connect with more clients\" style=\"max-width:100%;max-height:440px;width:auto;height:auto;border:1px solid var(--line-2);border-radius:10px;box-shadow:0 18px 40px -22px rgba(0,0,0,.55)\">\n    </div>\n  </div>\n</section>", "section": "b4", "note": "<ul>\n<li><b>Walk the screenshot:</b> &quot;A relationship email, not a sell. Three things: the <b>subject is personalised</b> \u2014 &#x27;Tina, attract more clients\u2026&#x27; \u2014 it earns the open. It leads with <i>your</i> goal, not their product. And there&#x27;s <b>one job, one CTA</b> \u2014 a single &#x27;Learn more&#x27;, no clutter. Plus a verified sender and easy unsubscribe \u2014 the deliverability hygiene from the last slide, in practice.&quot;</li>\n</ul>"}, {"region": "dk2", "badge": "46", "div": false, "title": "Email in the Wild \u2014 Example 2 of 3", "html": "<section class=\"slide\">\n  <div class=\"kicker\"><span class=\"dot\"></span> Email in the Wild \u2014 Example 2 of 3 <span class=\"num\">46</span></div>\n  <div class=\"rule\"></div>\n  <div style=\"display:grid;grid-template-columns:1fr 1.1fr;gap:38px;align-items:center;flex:1;margin-top:4px\">\n    <div>\n      <div style=\"font-family:'Spline Sans Mono';font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--proof)\">Triggered lifecycle email \u00b7 automation</div>\n      <h2 class=\"d\" style=\"font-size:30px;margin-top:10px;line-height:1.08\">Sent by a <em class=\"i\">behaviour</em>, not a calendar.</h2>\n      <ul class=\"blist\" style=\"margin-top:14px\">\n        <li><b>Trigger, not a blast</b> \u2014 fires off one rule: \"inactive for 90+ days\". Nobody pressed send.</li>\n        <li><b>What, when, what to do</b> \u2014 names the user, the date, and the exact way to stop it.</li>\n        <li><b>Action in bold</b> \u2014 the one thing you can do is impossible to miss.</li>\n      </ul>\n      <div class=\"takeaway\" style=\"margin-top:16px\">Sender: <b>HubSpot</b> \u2014 this is the automation on the next slides, in the wild.</div>\n    </div>\n    <div style=\"display:flex;align-items:center;justify-content:center\">\n      <img src=\"_assets/email-eg-hubspot.jpg\" alt=\"HubSpot automated email \u2014 User Deactivations Tomorrow\" style=\"max-width:100%;max-height:440px;width:auto;height:auto;border:1px solid var(--line-2);border-radius:10px;box-shadow:0 18px 40px -22px rgba(0,0,0,.55)\">\n    </div>\n  </div>\n</section>", "section": "b4", "note": "<ul>\n<li><b>Walk the screenshot:</b> &quot;This one nobody pressed send on. It fired off a <i>behaviour</i> \u2014 &#x27;inactive for 90+ days&#x27; \u2014 not a calendar. It names the user, the date, and the <i>exact</i> action to stop it, with the action in bold. This is the automation we&#x27;re about to cover, sitting in a real inbox.&quot;</li>\n<li><b>Bridge:</b> &quot;Hold this image \u2014 the next few slides are how you build exactly this.&quot;</li>\n</ul>"}, {"region": "dk2", "badge": "47", "div": false, "title": "Email in the Wild \u2014 Example 3 of 3", "html": "<section class=\"slide\">\n  <div class=\"kicker\"><span class=\"dot\"></span> Email in the Wild \u2014 Example 3 of 3 <span class=\"num\">47</span></div>\n  <div class=\"rule\"></div>\n  <div style=\"display:grid;grid-template-columns:1fr 1.1fr;gap:38px;align-items:center;flex:1;margin-top:4px\">\n    <div>\n      <div style=\"font-family:'Spline Sans Mono';font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--exec)\">Promotional / launch email</div>\n      <h2 class=\"d\" style=\"font-size:30px;margin-top:10px;line-height:1.08\">Sell the <em class=\"i\">click</em>, not the product.</h2>\n      <ul class=\"blist\" style=\"margin-top:14px\">\n        <li><b>Curiosity + a hard number</b> \u2014 \"[Free Masterclass] The email flows behind $700k/month\" is one promise.</li>\n        <li><b>A person, not a brand</b> \u2014 \"Hey there \u2014 Dickie here.\" Reads like a note from a friend.</li>\n        <li><b>Borrowed trust</b> \u2014 named speakers do the convincing for you.</li>\n      </ul>\n      <div class=\"takeaway\" style=\"margin-top:16px\">Sender: <b>Dickie Bush &amp; Nicolas Cole</b> \u2014 every line drives one CTA: save your seat.</div>\n    </div>\n    <div style=\"display:flex;align-items:center;justify-content:center\">\n      <img src=\"_assets/email-eg-masterclass.jpg\" alt=\"Promotional email \u2014 Free Masterclass, the email flows behind $700k/month\" style=\"max-width:100%;max-height:440px;width:auto;height:auto;border:1px solid var(--line-2);border-radius:10px;box-shadow:0 18px 40px -22px rgba(0,0,0,.55)\">\n    </div>\n  </div>\n</section>", "section": "b4", "note": "<ul>\n<li><b>Walk the screenshot:</b> &quot;A promo email sells the <i>click</i>, not the product. The subject is curiosity plus a hard number \u2014 &#x27;[Free Masterclass] The email flows behind $700k/month.&#x27; It reads like a note from a person \u2014 &#x27;Hey there, Dickie here&#x27; \u2014 and it borrows trust with named speakers. Every line drives one CTA: save your seat.&quot;</li>\n</ul>"}, {"region": "dk2", "badge": "48", "div": false, "title": "Why Email Marketing Still Matters", "html": "<section class=\"slide\">\n  <div class=\"kicker\"><span class=\"dot\"></span> Why Email Marketing Still Matters <span class=\"num\">48</span></div>\n  <div class=\"rule\"></div>\n  <div class=\"sub2\">Email Is Not a Broadcast Channel</div>\n  <div class=\"split\">\n    <div>\n      <ul class=\"blist\">\n        <li>Owned Channel \u2014 not rented like social platforms</li>\n        <li>Highly Measurable &amp; cost-efficient</li>\n        <li>Works best when targeted and behaviour-driven</li>\n      </ul>\n      <div style=\"margin-top:18px;font-family:'Fraunces';font-size:18px;font-weight:560;color:var(--proof)\">\u25ce Best Channel For:</div>\n      <div style=\"display:flex;gap:10px;margin-top:10px\">\n        <span style=\"background:var(--paper-2);border:1px solid var(--line);border-radius:999px;padding:6px 16px;font-size:15px\">Activation</span>\n        <span style=\"background:var(--paper-2);border:1px solid var(--line);border-radius:999px;padding:6px 16px;font-size:15px\">Retention</span>\n        <span style=\"background:var(--paper-2);border:1px solid var(--line);border-radius:999px;padding:6px 16px;font-size:15px\">Churn Prevention</span>\n      </div>\n    </div>\n    <div class=\"insight\"><div class=\"il\">Common Mistake</div><div class=\"iq\">\"Most SMEs send the same email to everyone, treating it like a broadcast rather than a conversation.\"</div></div>\n  </div>\n</section>", "section": "b4", "note": "<ul>\n<li><b>Say:</b> &quot;The #1 SME email mistake: blasting the <i>same</i> email to everyone, like a megaphone. Email is a <i>conversation</i>, not a broadcast. Best for activation, retention, churn-prevention \u2014 not shouting.&quot;</li>\n</ul>"}, {"region": "dk2", "badge": "49", "div": false, "title": "What Is Email Workflow Automation?", "html": "<section class=\"slide\">\n  <div class=\"kicker\"><span class=\"dot\"></span> What Is Email Workflow Automation? <span class=\"num\">49</span></div>\n  <div class=\"rule\"></div>\n  <div class=\"sub2\">Email Automation = Right Message, Right Time</div>\n  <div class=\"lead\" style=\"margin-top:10px;color:var(--ink)\">Email workflow automation sends emails based on user behaviour or lifecycle stage \u2014 not on a fixed calendar.</div>\n  <div style=\"font-family:'Fraunces';font-size:18px;font-weight:560;margin-top:18px\">\u26a1 Examples of Triggers</div>\n  <div class=\"triggers\">\n    <div class=\"trig\"><div class=\"tl\">Trigger</div><div class=\"tt\">User signs up</div></div>\n    <div class=\"trig\"><div class=\"tl\">Trigger</div><div class=\"tt\">User completes action</div></div>\n    <div class=\"trig\"><div class=\"tl\">Trigger</div><div class=\"tt\">User goes inactive</div></div>\n    <div class=\"trig\"><div class=\"tl\">Trigger</div><div class=\"tt\">User reaches milestone</div></div>\n    <div class=\"trig\"><div class=\"tl\">Trigger</div><div class=\"tt\">User abandons journey</div></div>\n  </div>\n  <div class=\"takeaway\">Automation removes <b>guesswork and manual work</b>.</div>\n</section>", "section": "b4", "note": "<ul>\n<li><b>Say:</b> &quot;Automation = the right email fires on <i>behaviour</i>, not on a calendar. Someone signs up \u2192 welcome. Goes quiet \u2192 win-back. Runs while you sleep. <b>Manual emails react late; automated emails act early.</b>&quot;</li>\n<li>On 51: &quot;You don&#x27;t need dozens of flows \u2014 just the right few: welcome, activation, engagement nudge, re-engagement, milestone.&quot;</li>\n<li>\u25b8 <i>Interactive:</i> &quot;Do you have even a <i>welcome</i> email today? That&#x27;s the first one to build.&quot;</li>\n</ul>"}, {"region": "dk2", "badge": "50", "div": false, "title": "Why Automation Is Critical", "html": "<section class=\"slide\">\n  <div class=\"kicker\"><span class=\"dot\"></span> Why Automation Is Critical <span class=\"num\">50</span></div>\n  <div class=\"rule\"></div>\n  <div class=\"sub2\">Why Email Automation Drives Better ROI</div>\n  <div class=\"split\">\n    <ul class=\"blist\">\n      <li>Hyper-targeted communication tailored to specific user needs</li>\n      <li>Prevents churn before it happens by identifying inactivity early</li>\n      <li>Drives deeper product adoption through timely nudges</li>\n      <li>Scales personalisation without scaling manual effort</li>\n    </ul>\n    <div class=\"insight\" style=\"background:#eef4f2;border-color:var(--proof)\"><div class=\"il\" style=\"color:var(--proof)\">The Core Advantage</div><div class=\"iq\">\"Manual emails react late. Automated emails act early.\"</div></div>\n  </div>\n</section>", "section": "b4", "note": "<ul>\n<li><b>Say:</b> &quot;Automation = the right email fires on <i>behaviour</i>, not on a calendar. Someone signs up \u2192 welcome. Goes quiet \u2192 win-back. Runs while you sleep. <b>Manual emails react late; automated emails act early.</b>&quot;</li>\n<li>On 51: &quot;You don&#x27;t need dozens of flows \u2014 just the right few: welcome, activation, engagement nudge, re-engagement, milestone.&quot;</li>\n<li>\u25b8 <i>Interactive:</i> &quot;Do you have even a <i>welcome</i> email today? That&#x27;s the first one to build.&quot;</li>\n</ul>"}, {"region": "dk2", "badge": "51", "div": false, "title": "Common Email Workflows Every Business Should Have", "html": "<section class=\"slide\">\n  <div class=\"kicker\"><span class=\"dot\"></span> Common Email Workflows Every Business Should Have <span class=\"num\">51</span></div>\n  <div class=\"rule\"></div>\n  <div class=\"sub2\">Foundational Email Flows Checklist</div>\n  <div class=\"moves\">\n    <div class=\"move\"><div class=\"mvn\">1</div><div><div class=\"mvt\">Welcome &amp; Onboarding</div></div></div>\n    <div class=\"move\"><div class=\"mvn\">2</div><div><div class=\"mvt\">Activation &amp; Education</div></div></div>\n    <div class=\"move\"><div class=\"mvn\">3</div><div><div class=\"mvt\">Engagement Nudges</div></div></div>\n    <div class=\"move\"><div class=\"mvn\">4</div><div><div class=\"mvt\">Re-engagement / Churn Prevention</div></div></div>\n    <div class=\"move\"><div class=\"mvn\">5</div><div><div class=\"mvt\">Milestone or Lifecycle-based Content</div></div></div>\n  </div>\n  <div class=\"takeaway\">\"You don't need dozens of flows \u2014 <b>just the right few</b>.\"</div>\n</section>", "section": "b4", "note": "<ul>\n<li><b>Say:</b> &quot;Automation = the right email fires on <i>behaviour</i>, not on a calendar. Someone signs up \u2192 welcome. Goes quiet \u2192 win-back. Runs while you sleep. <b>Manual emails react late; automated emails act early.</b>&quot;</li>\n<li>On 51: &quot;You don&#x27;t need dozens of flows \u2014 just the right few: welcome, activation, engagement nudge, re-engagement, milestone.&quot;</li>\n<li>\u25b8 <i>Interactive:</i> &quot;Do you have even a <i>welcome</i> email today? That&#x27;s the first one to build.&quot;</li>\n</ul>"}, {"region": "dk2", "badge": "52", "div": false, "title": "Lifecycle Marketing Applied to Email", "html": "<section class=\"slide\">\n  <div class=\"kicker\"><span class=\"dot\"></span> Lifecycle Marketing Applied to Email <span class=\"num\">52</span></div>\n  <div class=\"rule\"></div>\n  <div class=\"sub2\">From Campaign Emails to Lifecycle Journeys</div>\n  <div class=\"split\">\n    <div class=\"insight\" style=\"background:#eef4f2;border-color:var(--proof);align-self:center\">\n      <div class=\"il\" style=\"color:var(--proof)\">Core Principle</div>\n      <div class=\"iq\">\"Different customers need different messages at different moments.\"</div>\n    </div>\n    <div>\n      <div style=\"font-family:'Fraunces';font-size:24px;font-weight:560;color:var(--proof);margin-bottom:8px\">What Is Lifecycle Marketing?</div>\n      <ul class=\"blist\">\n        <li>Understanding where your user is in their journey</li>\n        <li>Designing content that matches their current needs</li>\n        <li>Shifting from \"What do we want to say?\" to \"What do they need right now?\"</li>\n      </ul>\n    </div>\n  </div>\n</section>", "section": "b4", "note": "<ul>\n<li><b>Say:</b> &quot;Lifecycle = different message for where the customer <i>is</i>. Supermom nails it: pregnant mom, newborn, toddler, back-to-work \u2014 same brand, completely different needs. One email to all of them feels irrelevant, even insensitive.&quot;</li>\n<li>On 54: &quot;What changes by stage: tone, frequency, depth, the CTA. <b>Relevance beats frequency</b> \u2014 fewer, righter emails win.&quot;</li>\n</ul>"}, {"region": "dk2", "badge": "53", "div": false, "title": "Example \u2014 Lifecycle Email Journeys at Supermom", "html": "<section class=\"slide\">\n  <div class=\"kicker\"><span class=\"dot\"></span> Example \u2014 Lifecycle Email Journeys at Supermom <span class=\"num\">53</span></div>\n  <div class=\"rule\"></div>\n  <div class=\"split\">\n    <div class=\"stages\" style=\"grid-template-columns:1fr;margin-top:0\">\n      <div class=\"stage\"><div class=\"sn\">Pregnant Moms</div><div class=\"sd\">Preparation, reassurance, expert guidance</div></div>\n      <div class=\"stage\"><div class=\"sn\">Newborn Stage</div><div class=\"sd\">Survival tips, emotional support, confidence-building</div></div>\n      <div class=\"stage\"><div class=\"sn\">Toddler Stage</div><div class=\"sd\">Development milestones, behaviour insights</div></div>\n      <div class=\"stage\"><div class=\"sn\">Back to Work Post-Maternity</div><div class=\"sd\">Time management, emotional support, identity shift</div></div>\n    </div>\n    <div class=\"insight\" style=\"align-self:center\">\n      <div style=\"font-family:'Fraunces';font-size:26px;font-weight:560;line-height:1.1\">Same brand.<br>Completely different needs.</div>\n      <div class=\"iq\" style=\"font-size:18px;margin-top:16px\">\"If we sent the same email to all these moms, it would feel irrelevant \u2014 or even insensitive.\"</div>\n    </div>\n  </div>\n</section>", "section": "b4", "note": "<ul>\n<li><b>Say:</b> &quot;Lifecycle = different message for where the customer <i>is</i>. Supermom nails it: pregnant mom, newborn, toddler, back-to-work \u2014 same brand, completely different needs. One email to all of them feels irrelevant, even insensitive.&quot;</li>\n<li>On 54: &quot;What changes by stage: tone, frequency, depth, the CTA. <b>Relevance beats frequency</b> \u2014 fewer, righter emails win.&quot;</li>\n</ul>"}, {"region": "dk2", "badge": "54", "div": false, "title": "How Lifecycle Shapes Email Content Planning", "html": "<section class=\"slide\">\n  <div class=\"kicker\"><span class=\"dot\"></span> How Lifecycle Shapes Email Content Planning <span class=\"num\">54</span></div>\n  <div class=\"rule\"></div>\n  <div class=\"sub2\">Lifecycle Determines Content \u2014 Not Marketing Calendars</div>\n  <div class=\"split\">\n    <div>\n      <div style=\"font-family:'Fraunces';font-size:20px;font-weight:560;color:var(--proof)\">\u21c4 What Changes by Stage</div>\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px\">\n        <div class=\"auditcard\" style=\"margin:0\">Tone</div>\n        <div class=\"auditcard\" style=\"margin:0\">Frequency</div>\n        <div class=\"auditcard\" style=\"margin:0\">Content Depth</div>\n        <div class=\"auditcard\" style=\"margin:0\">Calls-to-Action (CTA)</div>\n      </div>\n    </div>\n    <div>\n      <div style=\"font-family:'Fraunces';font-size:20px;font-weight:560;color:var(--proof)\">Strategic Shift Example</div>\n      <div class=\"stage\" style=\"margin-top:12px\"><div class=\"sn\" style=\"font-size:17px\">Early Stage \u2014 Education &amp; Reassurance</div><div class=\"sd\">\"Here is how we help you succeed\u2026\"</div></div>\n      <div style=\"text-align:center;color:var(--exec);margin:6px 0\">\u2193</div>\n      <div class=\"stage\"><div class=\"sn\" style=\"font-size:17px\">Later Stage \u2014 Activation &amp; Habit-Building</div><div class=\"sd\">\"Unlock this feature now\u2026\"</div></div>\n    </div>\n  </div>\n  <div class=\"takeaway\" style=\"font-size:22px\">\"Relevance beats <b>frequency</b>.\"</div>\n</section>", "section": "b4", "note": "<ul>\n<li><b>Say:</b> &quot;Lifecycle = different message for where the customer <i>is</i>. Supermom nails it: pregnant mom, newborn, toddler, back-to-work \u2014 same brand, completely different needs. One email to all of them feels irrelevant, even insensitive.&quot;</li>\n<li>On 54: &quot;What changes by stage: tone, frequency, depth, the CTA. <b>Relevance beats frequency</b> \u2014 fewer, righter emails win.&quot;</li>\n</ul>"}, {"region": "dk2", "badge": "55", "div": false, "title": "Bringing Automation + Lifecycle Together", "html": "<section class=\"slide\">\n  <div class=\"kicker\"><span class=\"dot\"></span> Bringing Automation + Lifecycle Together <span class=\"num\">55</span></div>\n  <div class=\"rule\"></div>\n  <div class=\"sub2\">Smart Email = Behaviour \u00d7 Lifecycle</div>\n  <div class=\"formula\">\n    <div class=\"fterm\"><div class=\"fv\">Trigger</div><div class=\"fq\">What did user do?</div></div>\n    <div class=\"fop\">+</div>\n    <div class=\"fterm\"><div class=\"fv\">Lifecycle</div><div class=\"fq\">Where are they?</div></div>\n    <div class=\"fop\">=</div>\n    <div class=\"fterm k\"><div class=\"fv\">Relevant Email</div><div class=\"fq\">Right message</div></div>\n  </div>\n  <div style=\"font-family:'Fraunces';font-size:18px;font-weight:560;margin-top:26px\">Practical Examples:</div>\n  <div class=\"grid2\" style=\"margin-top:12px\">\n    <div class=\"gcard\"><div style=\"font-size:16px\">\ud83c\udf7c Pregnant mom + Hasn't opened emails</div><div style=\"font-family:'Fraunces';font-weight:560;color:var(--proof);margin-top:6px\">\u2192 Send Reassurance Content</div></div>\n    <div class=\"gcard\"><div style=\"font-size:16px\">\ud83d\udcbc Back-to-work mom + Clicks often</div><div style=\"font-family:'Fraunces';font-weight:560;color:var(--proof);margin-top:6px\">\u2192 Send Productivity Tips</div></div>\n  </div>\n</section>", "section": "b4", "note": "<ul>\n<li><b>Say:</b> &quot;Put the two together: <b>Behaviour \u00d7 Lifecycle = the right email.</b> What they <i>did</i> + where they <i>are</i> \u2192 what you send. That&#x27;s smart email.&quot;</li>\n</ul>"}, {"region": "dk2", "badge": "56", "div": false, "title": "Common Mistakes SMEs Make with Email", "html": "<section class=\"slide\">\n  <div class=\"kicker\"><span class=\"dot\"></span> Common Mistakes SMEs Make with Email <span class=\"num\">56</span></div>\n  <div class=\"rule\"></div>\n  <div class=\"sub2\">What to Avoid</div>\n  <div class=\"split\">\n    <ul class=\"blist\">\n      <li>Treating email like a newsletter blast</li>\n      <li>Over-emailing without delivering real value</li>\n      <li>Ignoring lifecycle differences among customers</li>\n      <li>Measuring opens instead of actual behaviour change</li>\n    </ul>\n    <div class=\"insight\"><div class=\"il\">Critical Reminder</div><div class=\"iq\">\"More emails \u2260 better results.\"</div></div>\n  </div>\n</section>", "section": "b4", "note": "<ul>\n<li><b>Say:</b> &quot;Recap of what <i>not</i> to do: blasting everyone, over-emailing, ignoring lifecycle, measuring opens instead of behaviour. <b>More emails \u2260 better results.</b>&quot;</li>\n</ul>"}, {"region": "dk2", "badge": "57", "div": true, "title": "Activity 5", "html": "<section class=\"slide divider t\">\n  <div class=\"dtag\">SMU \u00b7 Day 1 \u2014 Section 2</div>\n  <div class=\"eyebrow\">Hands-on</div>\n  <h1 class=\"d\">Activity 5</h1>\n  <div class=\"dsub\">Create a welcome email that converts the first action.</div>\n  <div class=\"dbn\">A5</div>\n</section>", "section": "a5", "note": "<ul>\n<li><b>Set up:</b> &quot;Build the one flow everyone should have \u2014 a welcome email \u2014 in Claude. Change the audience and objective to <i>your</i> business. Refine, then try another AI to compare.&quot;</li>\n<li><b>Close Section 2 on the spine:</b> &quot;Step back: this afternoon we covered how people <i>find</i> you (social, influencers), how your message <i>travels</i> (content), and how you <i>keep</i> them (email). That&#x27;s the back half of the spine \u2014 capture, convert, keep.&quot;</li>\n</ul>\n<p>---</p>"}, {"region": "dk2", "badge": "57", "div": false, "title": "Activity 5 \u2014 Welcome Email on Claude", "html": "<section class=\"slide qslide\">\n  <div class=\"time\">\u23f1 20 minutes</div>\n  <div class=\"kicker\"><span class=\"dot\"></span> Activity 5 \u2014 Welcome Email on Claude <span class=\"num\">57</span></div>\n  <div class=\"rule\"></div>\n  <div class=\"goal\"><b>Goal:</b> Create a welcome email for your brand on Claude. <b>Objective:</b> Create an email that converts users' first action. <span class=\"tools\">Suggested tools \u2014 ChatGPT, Gemini, Grok</span></div>\n  <div class=\"steps c2\" style=\"grid-template-columns:1fr 1fr\">\n    <div class=\"stp\"><div class=\"sn\">Step 1</div><div class=\"st\">Open Claude &amp; use the prompt</div><div class=\"sd\">Be sure to change the details in target audience and objective.</div></div>\n    <div class=\"stp\"><div class=\"sn\">Step 2</div><div class=\"st\">Implement tweaks &amp; compare</div><div class=\"sd\">Refine based on your preferences. Bonus: try on another AI and compare quality!</div></div>\n  </div>\n  <div class=\"prompt\"><b>Prompt to try:</b> Create a complete welcome email (HTML design + copy) for new users with key actionable content above the fold to drive product activation.\n<b>Target Audience:</b> [Insert audience]   <b>Objective:</b> [Insert goal]   Context: New users who just signed up. Job to be done: Start using the product.\n<b>Deliverables:</b> Subject line (40-50 characters) \u00b7 Preheader text \u00b7 Welcome headline \u00b7 Body copy (2-3 sentences) \u00b7 Primary CTA button text \u00b7 1-2 key benefit statements \u00b7 Full HTML email design (mobile-responsive). Tone: Welcoming, helpful, action-oriented.</div>\n</section>", "section": "a5", "note": "<ul>\n<li><b>Set up:</b> &quot;Build the one flow everyone should have \u2014 a welcome email \u2014 in Claude. Change the audience and objective to <i>your</i> business. Refine, then try another AI to compare.&quot;</li>\n<li><b>Close Section 2 on the spine:</b> &quot;Step back: this afternoon we covered how people <i>find</i> you (social, influencers), how your message <i>travels</i> (content), and how you <i>keep</i> them (email). That&#x27;s the back half of the spine \u2014 capture, convert, keep.&quot;</li>\n</ul>\n<p>---</p>"}, {"region": "dk2", "badge": "58", "div": false, "title": "Day 1 \u2014 Capstone Case Study \u00b7 Discuss", "html": "<section class=\"slide\">\n  <div class=\"kicker\"><span class=\"dot\"></span> Day 1 \u2014 Capstone Case Study \u00b7 Discuss <span class=\"num\">58</span></div>\n  <div class=\"rule\"></div>\n  <div style=\"display:grid;grid-template-columns:.95fr 1.15fr;gap:26px;flex:1;margin-top:14px;align-items:stretch\">\n    <div style=\"display:flex;flex-direction:column;border:1px solid var(--line-2);border-radius:9px;overflow:hidden;background:#fff\">\n      <img src=\"_assets/hyrox-fitness.jpg\" alt=\"A HYROX-style sled-push station\" style=\"width:100%;height:212px;object-fit:cover\">\n      <div style=\"padding:16px 22px;display:flex;flex-direction:column;gap:11px;flex:1\">\n        <div style=\"font-family:'Fraunces';font-size:32px;font-weight:600;letter-spacing:.03em;line-height:1\">HYROX</div>\n        <div style=\"font-size:14px;color:var(--ink-soft);line-height:1.35\">A standardised fitness race \u2014 8 \u00d7 1 km runs + 8 functional stations. Identical worldwide: <b style=\"color:var(--ink)\">personal, measurable, shareable.</b></div>\n        <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:auto\">\n          <div><div style=\"font-family:'Fraunces';font-size:21px;font-weight:600;color:var(--accent)\">700 \u2192 550k</div><div style=\"font-size:12px;color:var(--ink-soft)\">athletes, 2017 \u2192 2025</div></div>\n          <div><div style=\"font-family:'Fraunces';font-size:21px;font-weight:600;color:var(--accent)\">$130M</div><div style=\"font-size:12px;color:var(--ink-soft)\">revenue, 2025</div></div>\n          <div><div style=\"font-family:'Fraunces';font-size:21px;font-weight:600;color:var(--accent)\">80+ \u00b7 30</div><div style=\"font-size:12px;color:var(--ink-soft)\">races \u00b7 countries</div></div>\n          <div><div style=\"font-family:'Fraunces';font-size:21px;font-weight:600;color:var(--accent)\">390M+</div><div style=\"font-size:12px;color:var(--ink-soft)\">#Hyrox TikTok views</div></div>\n        </div>\n      </div>\n    </div>\n    <div style=\"display:flex;flex-direction:column\">\n      <h2 class=\"d\" style=\"font-size:30px\">Reverse-engineer HYROX.</h2>\n      <div class=\"lead\" style=\"font-size:15px;margin-top:6px\">You've got the whole framework now. In your groups, explain how a fitness race became a $130M brand:</div>\n      <div style=\"display:flex;flex-direction:column;gap:10px;margin-top:14px;flex:1\">\n        <div style=\"border:1px solid var(--line-2);border-left:4px solid var(--accent);border-radius:7px;padding:13px 18px;background:#fff\">\n          <div style=\"font-family:'Spline Sans Mono';font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent)\">1 \u00b7 Create demand</div>\n          <div style=\"font-size:15.5px;margin-top:5px;line-height:1.3\">What's their <b>positioning</b>? Their <b>brand</b>? What <b>job</b> is HYROX really hired to do?</div>\n        </div>\n        <div style=\"border:1px solid var(--line-2);border-left:4px solid var(--exec);border-radius:7px;padding:13px 18px;background:#fff\">\n          <div style=\"font-family:'Spline Sans Mono';font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--exec)\">2 \u00b7 Capture demand</div>\n          <div style=\"font-size:15.5px;margin-top:5px;line-height:1.3\">What <b>channels</b> do they use to reach people \u2014 and which one is doing the heavy lifting?</div>\n        </div>\n        <div style=\"border:1px solid var(--line-2);border-left:4px solid var(--proof);border-radius:7px;padding:13px 18px;background:#fff\">\n          <div style=\"font-family:'Spline Sans Mono';font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--proof)\">3 \u00b7 The growth loop</div>\n          <div style=\"font-size:15.5px;margin-top:5px;line-height:1.3\">How do they <b>acquire \u2192 convert \u2192 keep \u2192 and turn athletes into advocates</b>?</div>\n        </div>\n      </div>\n      <div style=\"font-family:'Spline Sans Mono';font-size:13px;color:var(--ink-soft);margin-top:12px\">\u23f1 10 min in groups \u00b7 then we map it together on the board</div>\n    </div>\n  </div>\n</section>", "section": "hyrox", "note": "<p><b>Format:</b> questions on screen first. Groups discuss ~10 min, then you map their answers on the board against the day&#x27;s spine (<b>create demand \u2192 capture \u2192 convert \u2192 keep \u2192 advocate</b>). The point: HYROX quietly does <i>the entire day</i> \u2014 it&#x27;s the whole framework in one brand.</p>\n<p><b>Set it up:</b> &quot;Last thing today. A fitness race nobody had heard of in 2017 is now a $130M brand with half a million athletes. You now have every tool to explain <i>why</i>. Don&#x27;t guess \u2014 use the framework.&quot;</p>\n<p><b>Let them struggle first, then reveal \u2014 answers mapped to the day:</b></p>\n<p><b>1 \u00b7 Create demand \u2014 positioning / brand / JTBD</b></p>\n<ul>\n<li><b>Positioning:</b> <i>&quot;Fitness for every body.&quot;</i> A standardised, attainable race \u2014 the opposite of CrossFit (technical barrier) or a marathon (months of solo training). Their insight: <i>the highest barrier in fitness is psychological, not physical.</i> They removed it.</li>\n<li><b>Brand:</b> community, measurable progress, and <i>&quot;feel like a pro athlete.&quot;</i> Same format worldwide = <b>personal, measurable, shareable</b> \u2014 that&#x27;s the brand promise, baked into the product.</li>\n<li><b>Job to be done:</b> &quot;Give me a real, attainable goal to train for, a community to belong to, and let me feel like an athlete.&quot; Fitness as a <i>social arena</i> (78% of younger APAC consumers train for community; 58% make friends through it). Its real rivals: marathons, CrossFit \u2014 and <i>doing nothing.</i></li>\n</ul>\n<p><b>2 \u00b7 Capture demand \u2014 channels (the clever part)</b></p>\n<ul>\n<li><b>Grassroots / owned:</b> embedded its training method into existing gym chains (e.g. F45) \u2014 distribution without heavy ad spend.</li>\n<li><b>Participant-generated social (the engine):</b> #Hyrox \u2248 <b>390M TikTok views, 469k+ posts \u2014 mostly shot by athletes themselves.</b> Each participant is their own media channel (training \u2192 race day \u2192 recap).</li>\n<li><b>Inverted influencer model:</b> celebrities (SHINee&#x27;s Minho, <i>Physical: 100</i> stars) <b>race, they don&#x27;t pose.</b> Vulnerable pre-race content, 200k+ views at minimal cost. Authentic &gt; endorsement.</li>\n<li><b>Authenticity-first partnerships:</b> Puma (co-branded Deviate NITRO shoe), Red Bull (challenges), AirAsia, Lululemon, AIA \u2014 partners must <i>belong</i> to the community.</li>\n</ul>\n<p><b>3 \u00b7 The growth loop \u2014 acquire / convert / keep / advocate</b></p>\n<ul>\n<li><b>Acquire:</b> gym integration + social proof.</li>\n<li><b>Convert:</b> low-friction entry \u2014 no prerequisites, one standardised format, shared gym training culture.</li>\n<li><b>Keep:</b> the festival model \u2014 the race draws you, &quot;Hyrox House makes you stay six hours&quot;; measurable rankings; community belonging.</li>\n<li><b>Advocate:</b> <b>550,000 participants = 550,000 content creators.</b> Every finisher shares a <i>personal victory</i> \u2192 pulls in the next cohort. A self-amplifying flywheel.</li>\n</ul>\n<p><b>The one-line payoff (write it on the board):</b> <i>&quot;Remove the psychological barrier + make the format standardised and shareable \u2192 every participant becomes a marketing channel.&quot;</i> That&#x27;s not luck \u2014 it&#x27;s the whole day&#x27;s spine, executed.</p>\n<p><b>Tie back to their own business:</b> &quot;You don&#x27;t have 550k athletes. But the move is copyable \u2014 what&#x27;s the <i>one psychological barrier</i> stopping people from choosing you, and how could you make your customers want to <i>share</i> the win?&quot;</p>\n<p><i>(Stats are from Campaign Asia, 2026: 700 athletes in 2017 \u2192 ~550k in 2025; $130M revenue (headline figure $140M); 80+ races across 30 countries; ~390M #Hyrox TikTok views. Verify before quoting exact numbers.)</i></p>"}], "sections": [{"id": "m0", "name": "Module 0 \u00b7 What Marketing Is", "mins": 15, "brk": false}, {"id": "m1", "name": "Module 1 \u00b7 Customer & Market", "mins": 28, "brk": false}, {"id": "m2", "name": "Module 2 \u00b7 Positioning & Brand", "mins": 30, "brk": false}, {"id": "m3", "name": "Module 3 \u00b7 The Offer", "mins": 27, "brk": false}, {"id": "m4", "name": "Module 4 \u00b7 Demand & Channels", "mins": 30, "brk": true}, {"id": "m5", "name": "Module 5 \u00b7 Conversion & Retention", "mins": 28, "brk": false}, {"id": "m6", "name": "Module 6 \u00b7 Measurement & Growth", "mins": 30, "brk": false}, {"id": "cap1", "name": "Capstone \u00b7 Diagnose Your Leak", "mins": 20, "brk": true}, {"id": "b1", "name": "PM Block 1 \u00b7 Social Media", "mins": 35, "brk": false}, {"id": "b2", "name": "PM Block 2 \u00b7 Influencers & UGC", "mins": 32, "brk": false}, {"id": "b3", "name": "PM Block 3 \u00b7 Content Optimisation", "mins": 16, "brk": false}, {"id": "a4", "name": "Activity 4 \u00b7 Content Plan", "mins": 20, "brk": true}, {"id": "b4", "name": "PM Block 4 \u00b7 Email Marketing", "mins": 30, "brk": false}, {"id": "a5", "name": "Activity 5 \u00b7 Welcome Email", "mins": 20, "brk": false}, {"id": "hyrox", "name": "Capstone \u00b7 HYROX", "mins": 15, "brk": false}]};
const S = DATA.slides, SECS = {}; DATA.sections.forEach(x=>SECS[x.id]=x);
let i = 0, t0 = null, running=false, secEnter=null, curSec=null, acc=0;
const $ = id=>document.getElementById(id);
function fit(){
  const L=$('stage').parentElement, pad=24;
  const s=Math.min((L.clientWidth-pad)/1280,(L.clientHeight-pad)/720);
  $('stage').style.transform='scale('+s+')';
}
function render(){
  const r=S[i];
  $('stage').innerHTML='<div class="'+r.region+'" style="width:1280px;height:720px">'+r.html+'</div>';
  $('badge').textContent = r.div ? 'DIVIDER' : ('#'+(r.badge||'—'));
  $('ttl').textContent = r.title;
  $('notes').innerHTML = r.note;
  // section
  if(r.section!==curSec){ curSec=r.section; }
  const sec=SECS[r.section]||{name:'—',mins:0};
  $('secnm').textContent = sec.name + '  ·  '+sec.mins+'m budget';
  $('count').textContent = (i+1)+' / '+S.length;
  // next
  const n = S[i+1];
  if(n){ $('thumb').innerHTML='<div class="'+n.region+'" style="width:1280px;height:720px">'+n.html+'</div>';
    $('ntxt').textContent=(n.div?'▸ ':'#'+(n.badge||'')+'  ')+n.title;
    $('nsec').textContent=(SECS[n.section]||{}).name||''; }
  else { $('thumb').innerHTML=''; $('ntxt').textContent='— end of deck —'; $('nsec').textContent=''; }
  $('brk').textContent = sec.brk ? '⏸ break after this section' : '';
  fit();
}
function go(d){ i=Math.max(0,Math.min(S.length-1,i+d)); render(); }
// timers
function fmt(ms){ const s=Math.floor(ms/1000),m=Math.floor(s/60); return m+':'+String(s%60).padStart(2,'0'); }
function tick(){
  if(running){ const e=acc+(Date.now()-t0); $('clock').textContent=fmt(e); }
  // section bar: time spent in current section vs budget
  const sec=SECS[S[i].section]; if(sec){
    if(secEnter===null) secEnter=Date.now();
    const spent=(Date.now()-secEnter)/1000; const pct=Math.min(100,spent/(sec.mins*60)*100);
    const bar=$('secbar'); bar.querySelector('i').style.width=pct+'%';
    bar.classList.toggle('over', spent>sec.mins*60);
    $('sect').textContent=Math.floor(spent/60)+':'+String(Math.floor(spent%60)).padStart(2,'0')+' / '+sec.mins+':00';
  }
}
let lastSecForTimer=null;
setInterval(()=>{ if(S[i].section!==lastSecForTimer){ lastSecForTimer=S[i].section; secEnter=Date.now(); } tick(); },250);
$('se').onclick=()=>{ if(running){ acc+=Date.now()-t0; running=false; $('se').textContent='▶ Resume'; } else { t0=Date.now(); running=true; $('se').textContent='⏸ Pause'; } };
$('rs').onclick=()=>{ acc=0; running=false; t0=null; $('se').textContent='▶ Start'; $('clock').textContent='0:00'; secEnter=Date.now(); };
addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key===' '||e.key==='ArrowDown'){e.preventDefault();go(1);}
  else if(e.key==='ArrowLeft'||e.key==='ArrowUp'){e.preventDefault();go(-1);}
  else if(e.key.toLowerCase()==='s'){$('se').click();}
  else if(e.key.toLowerCase()==='f'){window.open('smu-day1-full-deck.html','_blank');}
});
addEventListener('resize',fit);
render();
</script></body></html>
