\n    <div class=\"tri\"><div class=\"th\">Advocate</div><div class=\"td\">Happy customers bring in the next ones at low cost.</div></div>\n  </div>\n</section>", "section": "m5", "note": "<p><b>Lecturer script:</b> &quot;Two halves. <b>Conversion</b> = remove friction so an interested person actually buys (CRO). <b>Retention</b> = Reforge&#x27;s three jobs \u2014 <b>Activate</b> (first value), <b>Engage</b> (build the habit), <b>Resurrect</b> (win back). Habits run on a loop: <b>Trigger \u2192 Action \u2192 Reward.</b> And the cheapest customer is the one you already have \u2014 retention compounds LTV.&quot;</p>\n<p><b>On the slide:</b> the <b>conversion \u2192 retention \u2192 advocacy flywheel</b> + the habit loop (Trigger\u2192Action\u2192Reward).</p>\n<p><b>Infographic:</b> flywheel + habit-loop diagram. _(source: [[Reforge Growth Model &amp; Loops]])_</p>"}, {"region": "dk1", "badge": "26", "div": false, "title": "Module 5 \u2014 Example", "html": "<section class=\"slide\">\n  <div class=\"kicker\"><span class=\"dot\"></span> Module 5 \u2014 Example <span class=\"num\">26</span></div>\n  <div class=\"rule\"></div>\n  <div class=\"duo\" style=\"margin-top:30px\">\n    <div class=\"pane g\"><div class=\"pl\">Convert and retain</div><div class=\"ph\">Amazon</div><div class=\"pd\">1-click checkout makes buying effortless. Prime makes leaving costly.</div></div>\n    <div class=\"pane g\"><div class=\"pl\">Retain and advocate</div><div class=\"ph\">Spotify Wrapped</div><div class=\"pd\">It turns a year of listening into a shareable moment that keeps users and brings in new ones at the same time.</div></div>\n  </div>\n  <div class=\"takeaway\">Removing friction and giving people a reason to return often beats a bigger ad budget.</div>\n</section>", "section": "m5", "note": "<ul>\n<li><b>Amazon</b> \u2014 <b>1-click checkout</b> removes conversion friction; <b>Prime</b> makes leaving costly (retention/lock-in). _(wiki)_</li>\n<li><b>Spotify Wrapped</b> \u2014 turns usage data into a yearly shareable moment: retention <i>and</i> advocacy in one mechanic. _(wiki [[Claude Code Insights PLG]])_</li>\n<li><b>Habit triggers</b> \u2014 Jira&#x27;s daily summary email (manufactured trigger); Uber&#x27;s &quot;need to get somewhere now&quot; (organic). _(wiki [[Reforge Growth Model &amp; Loops]])_</li>\n</ul>\n<p><b>Image:</b> a one-tap checkout / a &quot;Wrapped&quot;-style share card.</p>"}, {"region": "dk1", "badge": "27", "div": false, "title": "Your Turn \u2014 Discuss", "html": "<section class=\"slide qslide\">\n  <div class=\"kicker\"><span class=\"dot\"></span> Your Turn \u2014 Discuss <span class=\"num\">27</span></div>\n  <div class=\"rule\"></div>\n  <div class=\"qbody\">\n    <div class=\"qmark\">Q.</div>\n    <h1 class=\"d\">Where do you lose people, and why don't they come back?</h1>\n    <ol>\n      <li>Walk your own buying process. Name <b>one point of friction</b> to remove this week.</li>\n      <li>Give customers <b>one reason</b> to return.</li>\n    </ol>\n    <div class=\"time\">7 min \u00b7 3 min to share</div>\n  </div>\n</section>", "section": "m5", "note": "<p><b>Exercise (you do):</b> &quot;1) Walk your own buying process and name <b>one point of friction</b> to remove this week. 2) Design <b>one retention trigger</b> for your business (manufactured or environmental).&quot; 7 min + 3 share.</p>\n<p><b>Takeaway:</b> <i>&quot;A small friction cut and one good trigger usually beat a bigger ad budget.&quot;</i></p>\n<p>---</p>"}, {"region": "dk1", "badge": null, "div": false, "title": "Did it actually work?", "html": "<section class=\"slide\" style=\"background:var(--ink);justify-content:center\">\n  <div style=\"position:absolute;top:52px;right:64px;font-family:'Spline Sans Mono';font-size:12px;letter-spacing:.2em;color:#8a8273;text-transform:uppercase\">SMU Academy \u00b7 Day 1</div>\n  <div style=\"font-family:'Spline Sans Mono';font-size:14px;letter-spacing:.32em;color:#c9a89c;text-transform:uppercase\">Module 6 \u2014 Measurement &amp; Growth</div>\n  <h1 class=\"d\" style=\"font-size:78px;font-weight:560;color:var(--paper);line-height:1.0;margin-top:18px;letter-spacing:-.02em\">Did it actually <span style=\"color:var(--apricot)\">work?</span></h1>\n  <div style=\"font-size:21px;color:#b8b0a0;margin-top:24px;max-width:860px;line-height:1.45\">You've created demand, converted, and kept customers. Now the one question that funds the next round: is this a <em style=\"color:var(--apricot);font-style:italic\">machine</em>, or a money pit?</div>\n  <div style=\"font-family:'Spline Sans Mono';font-size:120px;font-weight:600;color:rgba(232,160,140,.15);position:absolute;bottom:18px;right:64px;line-height:.8\">06</div>\n</section>", "section": "m5", "note": "<p class=\"pv-empty\">\u2014 no scripted note for this slide; speak to what is on screen \u2014</p>"}, {"region": "dk1", "badge": "28", "div": false, "title": "Module 6 \u2014 Measurement & Growth", "html": "<section class=\"slide\">\n  <div class=\"kicker\"><span class=\"dot\"></span> Module 6 \u2014 Measurement & Growth <span class=\"num\">28</span></div>\n  <div class=\"rule\"></div>\n  <h2 class=\"d\" style=\"font-size:36px;margin-top:8px\">Input. Output. <em class=\"i\">Outcome.</em></h2>\n  <div class=\"lead\" style=\"margin-top:8px;font-size:17px\">Every marketing number is one of three things \u2014 what you <b>put in</b>, what the campaign <b>produced</b>, and what the business actually <b>got</b>. Most owners confuse the middle one for the last.</div>\n  <div style=\"display:flex;align-items:stretch;gap:12px;margin-top:20px;flex:1\">\n    <div style=\"flex:1;border:1px solid var(--line-2);border-radius:8px;padding:20px 22px;background:#fff;display:flex;flex-direction:column\">\n      <div style=\"font-family:'Spline Sans Mono';font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--exec)\">1 \u00b7 Campaign Input</div>\n      <div style=\"font-family:'Fraunces';font-size:20px;font-weight:560;margin-top:5px;line-height:1.1\">What you put in</div>\n      <ul style=\"list-style:none;margin-top:15px;display:flex;flex-direction:column;gap:11px\">\n        <li style=\"font-size:15.5px;line-height:1.3;color:var(--ink-soft);display:flex;gap:9px\"><span style=\"color:var(--exec)\">\u2022</span>Ad spend / budget</li>\n        <li style=\"font-size:15.5px;line-height:1.3;color:var(--ink-soft);display:flex;gap:9px\"><span style=\"color:var(--exec)\">\u2022</span>Content produced \u2014 posts, emails, ads</li>\n        <li style=\"font-size:15.5px;line-height:1.3;color:var(--ink-soft);display:flex;gap:9px\"><span style=\"color:var(--exec)\">\u2022</span>Channels &amp; time</li>\n      </ul>\n    </div>\n    <div style=\"display:flex;align-items:center;color:var(--accent);font-family:'Fraunces';font-size:28px\">\u2192</div>\n    <div style=\"flex:1;border:1px solid var(--line-2);border-radius:8px;padding:20px 22px;background:#fff;display:flex;flex-direction:column\">\n      <div style=\"font-family:'Spline Sans Mono';font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--accent)\">2 \u00b7 Campaign Output</div>\n      <div style=\"font-family:'Fraunces';font-size:20px;font-weight:560;margin-top:5px;line-height:1.1\">How efficiently it ran</div>\n      <ul style=\"list-style:none;margin-top:15px;display:flex;flex-direction:column;gap:11px\">\n        <li style=\"font-size:15.5px;line-height:1.3;color:var(--ink-soft);display:flex;gap:9px\"><span style=\"color:var(--accent)\">\u2022</span>Impressions &amp; reach</li>\n        <li style=\"font-size:15.5px;line-height:1.3;color:var(--ink-soft);display:flex;gap:9px\"><span style=\"color:var(--accent)\">\u2022</span>CTR \u00b7 CPC</li>\n        <li style=\"font-size:15.5px;line-height:1.3;color:var(--ink-soft);display:flex;gap:9px\"><span style=\"color:var(--accent)\">\u2022</span>CAC \u00b7 ROAS</li>\n        <li style=\"font-size:15.5px;line-height:1.3;color:var(--ink-soft);display:flex;gap:9px\"><span style=\"color:var(--accent)\">\u2022</span>LTV \u00b7 LTV : CAC</li>\n      </ul>\n    </div>\n    <div style=\"display:flex;align-items:center;color:var(--accent);font-family:'Fraunces';font-size:28px\">\u2192</div>\n    <div style=\"flex:1;border:1px solid var(--proof);border-radius:8px;padding:20px 22px;background:#eef4f2;display:flex;flex-direction:column\">\n      <div style=\"font-family:'Spline Sans Mono';font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--proof)\">3 \u00b7 Business Outcome</div>\n      <div style=\"font-family:'Fraunces';font-size:20px;font-weight:560;margin-top:5px;line-height:1.1\">What the business got</div>\n      <ul style=\"list-style:none;margin-top:15px;display:flex;flex-direction:column;gap:11px\">\n        <li style=\"font-size:15.5px;line-height:1.3;color:var(--ink);display:flex;gap:9px\"><span style=\"color:var(--proof)\">\u2022</span># of new customers</li>\n        <li style=\"font-size:15.5px;line-height:1.3;color:var(--ink);display:flex;gap:9px\"><span style=\"color:var(--proof)\">\u2022</span>Active users</li>\n        <li style=\"font-size:15.5px;line-height:1.3;color:var(--ink);display:flex;gap:9px\"><span style=\"color:var(--proof)\">\u2022</span>Revenue &amp; growth</li>\n      </ul>\n    </div>\n  </div>\n  <div class=\"takeaway\">Outputs feel good. <b>Outcomes pay the bills.</b> Never report one as if it were the other.</div>\n</section>", "section": "m6", "note": "<p><b>Lecturer script:</b> &quot;Owners drown in metrics. Don&#x27;t. Every number is one of three things \u2014 <b>what you put IN, what the campaign put OUT, or what the business actually GOT.</b></p>\n<p>1. <b>Campaign Input</b> \u2014 what you control: ad spend / budget, content produced, channels &amp;amp; time.</p>\n<p>2. <b>Campaign Output</b> \u2014 how efficiently the campaign ran (the marketing metrics): impressions &amp;amp; reach, CTR, CPC, CAC, ROAS, LTV : CAC.</p>\n<p>3. <b>Business Outcome</b> \u2014 what the business actually got: number of new customers, active users, revenue &amp;amp; growth.</p>\n<p>The trap: reporting <b>outputs</b> as if they were <b>outcomes</b>. &#x27;We got 2 million impressions!&#x27; is an output \u2014 it doesn&#x27;t pay rent. Tie every output back to a business outcome, or it doesn&#x27;t count.&quot;</p>\n<p><b>Ask the room:</b> &quot;Which bucket do you usually report? Most owners live in outputs (likes, reach) and never connect them to outcomes (customers, revenue).&quot;</p>\n<p><b>Takeaway:</b> <i>&quot;Outputs feel good. Outcomes pay the bills.&quot;</i></p>"}, {"region": "dk1", "badge": "29", "div": false, "title": "Module 6 \u2014 Measurement & Growth", "html": "<section class=\"slide\">\n  <div class=\"kicker\"><span class=\"dot\"></span> Module 6 \u2014 Measurement & Growth <span class=\"num\">29</span></div>\n  <div class=\"rule\"></div>\n  <h2 class=\"d\" style=\"font-size:36px;margin-top:8px\">What you measure is what you <em class=\"i\">chase</em>.</h2>\n  <div class=\"lead\" style=\"margin-top:6px;font-size:17px\">Measurement steers strategy \u2014 chase the wrong number and you optimise toward the wrong business. There's even a law for it:</div>\n  <div style=\"background:var(--ink);color:var(--paper);border-radius:7px;padding:11px 20px;margin-top:10px;display:flex;align-items:baseline;gap:16px\">\n    <span style=\"font-family:'Spline Sans Mono';font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--apricot);white-space:nowrap\">\u2696 Goodhart's Law</span>\n    <span style=\"font-size:15.5px;line-height:1.4;color:#dcd5c7\"><i style=\"color:var(--paper)\">\"When a measure becomes a target, it stops being a good measure.\"</i> &nbsp;Reward the team on leads \u2192 a CRM full of junk. Chase impressions \u2192 reach that never buys.</span>\n  </div>\n  <div class=\"duo\" style=\"margin-top:16px\">\n    <div class=\"pane a\"><div class=\"pl\">\u25c6 Vanity metrics</div><div class=\"ph\" style=\"font-size:23px\">Look impressive. Guide nothing.</div>\n      <ul style=\"list-style:none;margin-top:12px;display:flex;flex-direction:column;gap:9px\">\n        <li style=\"font-size:16px;line-height:1.3;color:var(--ink-soft);display:flex;gap:9px\"><span style=\"color:var(--accent)\">\u2022</span>Impressions &amp; reach</li>\n        <li style=\"font-size:16px;line-height:1.3;color:var(--ink-soft);display:flex;gap:9px\"><span style=\"color:var(--accent)\">\u2022</span>Likes &amp; followers</li>\n        <li style=\"font-size:16px;line-height:1.3;color:var(--ink-soft);display:flex;gap:9px\"><span style=\"color:var(--accent)\">\u2022</span>Email open rate</li>\n        <li style=\"font-size:16px;line-height:1.3;color:var(--ink-soft);display:flex;gap:9px\"><span style=\"color:var(--accent)\">\u2022</span>\"We went viral\"</li>\n      </ul>\n    </div>\n    <div class=\"pane g\"><div class=\"pl\">\u25cf Actionable metrics</div><div class=\"ph\" style=\"font-size:23px\">Tie to a decision.</div>\n      <ul style=\"list-style:none;margin-top:12px;display:flex;flex-direction:column;gap:9px\">\n        <li style=\"font-size:16px;line-height:1.3;color:var(--ink);display:flex;gap:9px\"><span style=\"color:var(--proof)\">\u2022</span>Conversion rate</li>\n        <li style=\"font-size:16px;line-height:1.3;color:var(--ink);display:flex;gap:9px\"><span style=\"color:var(--proof)\">\u2022</span>CAC &amp; LTV : CAC</li>\n        <li style=\"font-size:16px;line-height:1.3;color:var(--ink);display:flex;gap:9px\"><span style=\"color:var(--proof)\">\u2022</span>Repeat purchase / retention</li>\n        <li style=\"font-size:16px;line-height:1.3;color:var(--ink);display:flex;gap:9px\"><span style=\"color:var(--proof)\">\u2022</span>Revenue per customer</li>\n      </ul>\n    </div>\n  </div>\n  <div class=\"takeaway\">If a number can't change a decision, it's <b>decoration</b>.</div>\n</section>", "section": "m6", "note": "<p><b>Open with the why (this is the important bit):</b> &quot;Measurement isn&#x27;t admin \u2014 it <i>steers the whole business</i>. There&#x27;s a law for this \u2014 <b>Goodhart&#x27;s Law: the moment a number becomes your target, you start chasing it instead of the goal it stood for.</b> Reward the team on leads \u2192 a CRM full of junk leads. Chase impressions \u2192 reach nobody buys from. <b>Measure the wrong thing and you&#x27;ll build the wrong strategy.</b>&quot;</p>\n<p><b>The distinction to teach:</b> &quot;<b>Vanity metrics</b> look impressive but guide nothing \u2014 impressions, likes, followers, open rates, &#x27;we went viral.&#x27; <b>Actionable metrics</b> tie to a decision \u2014 conversion rate, CAC and LTV:CAC, repeat purchase, revenue per customer. Vanity numbers are what you screenshot; actionable numbers are what you act on.&quot;</p>\n<p><b>Land it:</b> <i>&quot;If a number can&#x27;t change a decision, it&#x27;s decoration.&quot;</i></p>\n<p><b>Note:</b> the CAC / LTV / LTV:CAC \u22653:1 / payback-under-12-months detail lives in the worked example (next page) \u2014 keep these two slides about the <i>thinking</i>, not the formulae. _(sources: Goodhart&#x27;s Law; vanity-vs-actionable metrics \u2014 Eric Ries / John Cutler / Amplitude; [[Reforge Channel Investment &amp; Budgeting]])_</p>"}, {"region": "dk1", "badge": "30", "div": false, "title": "Module 6 \u2014 Example", "html": "<section class=\"slide\">\n  <div class=\"kicker\"><span class=\"dot\"></span> Module 6 \u2014 Example <span class=\"num\">30</span></div>\n  <div class=\"rule\"></div>\n  <div class=\"center\">\n    <h1 class=\"d\" style=\"font-size:60px\">Spend <span class=\"accent\">$200</span> to win a customer<br>worth <span class=\"accent\">$800</span>.</h1>\n    <div class=\"lead\" style=\"margin-top:24px;font-size:21px\">That is a healthy 4 to 1. Two things to check next: how long until you earn the $200 back, and which stage leaks the most.</div>\n  </div>\n  <div class=\"takeaway\">You don't need perfect data. Know your <b>CAC, your LTV, and your biggest leak</b>.</div>\n</section>", "section": "m6", "note": "<ul>\n<li><b>The 4:1 rule</b> \u2014 spend $200 to win a customer worth $800 over their life = healthy 4:1. _(wiki)_</li>\n<li><b>Marginal returns</b> \u2014 Monday.com re-optimised 7 channels on the margin (\u00b110% bids) for <b>+14.6% net return</b> without spending a dollar more. _(wiki [[Reforge Channel Investment &amp; Budgeting]])_</li>\n<li><b>Payback beats ratio</b> \u2014 4:1 with 6-month payback beats 5:1 with 1-year payback (faster reinvestment). _(wiki)_</li>\n</ul>\n<p><b>Image:</b> a simple dashboard / a gauge.</p>"}, {"region": "dk1", "badge": "31", "div": false, "title": "Activity 2 \u2014 Diagnose Your Leak", "html": "<section class=\"slide\">\n  <div class=\"kicker\"><span class=\"dot\"></span> Activity 2 \u2014 Diagnose Your Leak <span class=\"num\">31</span></div>\n  <div class=\"rule\"></div>\n  <h1 class=\"d\" style=\"font-size:60px;margin-top:14px\">Where's your <em class=\"i\">leak?</em></h1>\n  <div class=\"leaks\">\n    <div class=\"leak\"><div class=\"ln\">01</div><div class=\"lt\">Demand</div><div class=\"ld\">No one finds you.</div><div class=\"lf\">\u21b3 fix channels</div></div>\n    <div class=\"leak\"><div class=\"ln\">02</div><div class=\"lt\">Positioning</div><div class=\"ld\">They find you but don't get why you.</div><div class=\"lf\">\u21b3 fix the message</div></div>\n    <div class=\"leak\"><div class=\"ln\">03</div><div class=\"lt\">Conversion</div><div class=\"ld\">Interested, but they don't buy.</div><div class=\"lf\">\u21b3 fix the offer</div></div>\n    <div class=\"leak\"><div class=\"ln\">04</div><div class=\"lt\">Retention</div><div class=\"ld\">They buy once, then leave.</div><div class=\"lf\">\u21b3 fix the experience</div></div>\n  </div>\n  <div class=\"takeaway\">Fix the <b>earliest serious leak</b> first. It is rarely the loudest one.</div>\n</section>", "section": "cap1", "note": "<p><b>Lecturer script:</b> &quot;Now stitch it together. Every business is leaking somewhere on the spine. Find the <b>earliest severe leak</b> and fix that first \u2014 not the loudest one.&quot;</p>\n<p><b>On the slide:</b> four leaks \u2014 <b>Demand</b> (no one finds you) \u00b7 <b>Positioning</b> (they find you, don&#x27;t get why you) \u00b7 <b>Conversion</b> (interested, don&#x27;t buy) \u00b7 <b>Retention</b> (buy once, leave).</p>\n<p><b>Infographic:</b> the funnel with a &quot;leak&quot; marker at each stage _(matches `marketing-101-fundamentals.html` slide 4)_.</p>"}, {"region": "dk2", "badge": null, "div": false, "title": "Channels &amp; Social Media", "html": "<section class=\"slide\" style=\"background:#17140f;color:#f3efe6;justify-content:center;align-items:flex-start\">\n  <div style=\"font-family:'Spline Sans Mono',monospace;font-size:15px;letter-spacing:.34em;text-transform:uppercase;color:#c9a89c\">Section 2</div>\n  <h1 style=\"font-family:'Fraunces',serif;font-size:84px;font-weight:560;line-height:1.0;margin-top:22px;letter-spacing:-.02em\">Channels &amp; Social Media</h1>\n  <div style=\"font-size:21px;color:#b8b0a0;margin-top:24px;max-width:760px;line-height:1.4\">Social media, influencers and UGC, content optimisation, and email \u2014 where the demand you create actually reaches people.</div>\n</section>", "section": "b1", "note": "<p class=\"pv-empty\">\u2014 no scripted note for this slide; speak to what is on screen \u2014</p>"}, {"region": "dk2", "badge": "02", "div": true, "title": "Social Media Marketing", "html": "<section class=\"slide divider\">\n  <div class=\"dtag\">SMU \u00b7 Day 1 \u2014 Section 2</div>\n  <div class=\"eyebrow\">Part 1 of 4</div>\n  <h1 class=\"d\">Social Media<br>Marketing</h1>\n  <div class=\"dsub\">Your shop that's open 24 hours a day \u2014 where attention becomes enquiries and sales.</div>\n  <div class=\"dbn\">01</div>\n</section>", "section": "b1", "note": "<ul>\n<li><b>Ask first:</b> &quot;Who runs their own Instagram or Facebook for the business? What do you actually use it for?&quot; (Most say <i>posting</i>.)</li>\n<li><b>Say:</b> &quot;Your account is a shop open 24 hours \u2014 an extension of your website. But &#x27;social media marketing&#x27; is actually <i>three</i> jobs people lump together: <b>owned</b> (your account \u2014 talking to people who already follow you), <b>paid</b> (ads you buy to reach <i>new</i> prospects), and <b>influencers</b> (renting someone else&#x27;s audience and trust). Different money, different jobs.&quot;</li>\n<li><b>Spine tie:</b> owned = keep the loyal warm; paid + influencers = create new demand.</li>\n<li>\u25b8 <i>Interactive:</i> one-hand poll \u2014 &quot;Mostly owned, paid, or influencer right now?&quot; Most SMEs only do owned \u2192 that&#x27;s the gap you&#x27;ll name later.</li>\n</ul>"}, {"region": "dk2", "badge": "02", "div": false, "title": "Social Media Marketing", "html": "<section class=\"slide\">\n  <div class=\"kicker\"><span class=\"dot\"></span> Social Media Marketing <span class=\"num\">02</span></div>\n  <div class=\"rule\"></div>\n  <h2 class=\"d\" style=\"font-size:34px;margin-top:10px\">Social media marketing is usually <em class=\"i\">three</em> workstreams.</h2>\n  <div class=\"lead\" style=\"margin-top:8px\">Most owners think \"social\" is one thing \u2014 posting. It's really three different jobs, each reaching a different audience.</div>\n  <div class=\"grid3 auto\">\n    <div class=\"gcard\">\n      <div style=\"font-family:'Spline Sans Mono';font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--accent);margin-bottom:9px\">01 \u00b7 Owned</div>\n      <div class=\"gh\">Your own social accounts</div>\n      <ul>\n        <li>The shop that's open 24 hours \u2014 an <b>extension of your website</b></li>\n        <li>Most followers are your <b>loyal community</b>, or people just learning about you</li>\n        <li>Use it for <b>product announcements</b> and to engage your most frequent, loyal customers</li>\n      </ul>\n    </div>\n    <div class=\"gcard\">\n      <div style=\"font-family:'Spline Sans Mono';font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--accent);margin-bottom:9px\">02 \u00b7 Paid Social</div>\n      <div class=\"gh\">Ads you buy on the platforms</div>\n      <ul>\n        <li>You <b>buy ads</b> on Instagram or Facebook</li>\n        <li>Mostly used for <b>user acquisition</b> \u2014 reaching new users and prospects</li>\n        <li>Puts you in front of people who don't follow you yet</li>\n      </ul>\n    </div>\n    <div class=\"gcard\">\n      <div style=\"font-family:'Spline Sans Mono';font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--accent);margin-bottom:9px\">03 \u00b7 Influencers</div>\n      <div class=\"gh\">Third-party creators</div>\n      <ul>\n        <li>You engage <b>influencers</b> on the social platforms</li>\n        <li>They expose <b>their own audience</b> to your products and services</li>\n        <li>Borrowed reach and borrowed trust, beyond your own following</li>\n      </ul>\n    </div>\n  </div>\n</section>", "section": "b1", "note": "<ul>\n<li><b>Ask first:</b> &quot;Who runs their own Instagram or Facebook for the business? What do you actually use it for?&quot; (Most say <i>posting</i>.)</li>\n<li><b>Say:</b> &quot;Your account is a shop open 24 hours \u2014 an extension of your website. But &#x27;social media marketing&#x27; is actually <i>three</i> jobs people lump together: <b>owned</b> (your account \u2014 talking to people who already follow you), <b>paid</b> (ads you buy to reach <i>new</i> prospects), and <b>influencers</b> (renting someone else&#x27;s audience and trust). Different money, different jobs.&quot;</li>\n<li><b>Spine tie:</b> owned = keep the loyal warm; paid + influencers = create new demand.</li>\n<li>\u25b8 <i>Interactive:</i> one-hand poll \u2014 &quot;Mostly owned, paid, or influencer right now?&quot; Most SMEs only do owned \u2192 that&#x27;s the gap you&#x27;ll name later.</li>\n</ul>"}, {"region": "dk2", "badge": "03", "div": false, "title": "Social Media Marketing", "html": "<section class=\"slide\">\n  <div class=\"kicker\"><span class=\"dot\"></span> Social Media Marketing <span class=\"num\">03</span></div>\n  <div class=\"rule\"></div>\n  <div class=\"split\">\n    <div>\n      <div class=\"copylead\"><span class=\"mk\">Social media</span> is like having a <b>shop that is open 24 hours a day</b>. It allows you to:</div>\n      <ul class=\"blist\">\n        <li>Show your products and services</li>\n        <li>Talk to customers directly</li>\n        <li>Build trust before they ever visit your store or website</li>\n        <li>Turn attention into enquiries and sales</li>\n      </ul>\n    </div>\n    <div style=\"display:flex;flex-direction:column;gap:18px;align-items:center\">\n      <img class=\"illus\" src=\"_assets/src/s106_0.png\" alt=\"Facebook on phone\" style=\"width:280px\">\n      <img class=\"illus\" src=\"_assets/src/s106_1.png\" alt=\"Video with like\" style=\"width:220px\">\n    </div>\n  </div>\n</section>", "section": "b1", "note": "<ul>\n<li><b>Ask first:</b> &quot;Who runs their own Instagram or Facebook for the business? What do you actually use it for?&quot; (Most say <i>posting</i>.)</li>\n<li><b>Say:</b> &quot;Your account is a shop open 24 hours \u2014 an extension of your website. But &#x27;social media marketing&#x27; is actually <i>three</i> jobs people lump together: <b>owned</b> (your account \u2014 talking to people who already follow you), <b>paid</b> (ads you buy to reach <i>new</i> prospects), and <b>influencers</b> (renting someone else&#x27;s audience and trust). Different money, different jobs.&quot;</li>\n<li><b>Spine tie:</b> owned = keep the loyal warm; paid + influencers = create new demand.</li>\n<li>\u25b8 <i>Interactive:</i> one-hand poll \u2014 &quot;Mostly owned, paid, or influencer right now?&quot; Most SMEs only do owned \u2192 that&#x27;s the gap you&#x27;ll name later.</li>\n</ul>"}, {"region": "dk2", "badge": "04", "div": false, "title": "Social Media Channels", "html": "<section class=\"slide\">\n  <div class=\"kicker\"><span class=\"dot\"></span> Social Media Channels <span class=\"num\">04</span></div>\n  <div class=\"rule\"></div>\n  <div class=\"chgrid\">\n    <div class=\"chcard\"><img class=\"logo\" src=\"_assets/src/s107_2.png\" alt=\"Facebook\"><div class=\"nm\">Facebook</div></div>\n    <div class=\"chcard\"><img class=\"logo\" src=\"_assets/src/s107_0.png\" alt=\"Instagram\"><div class=\"nm\">Instagram</div></div>\n    <div class=\"chcard\"><img class=\"logo\" src=\"_assets/src/s107_1.png\" alt=\"Tiktok\"><div class=\"nm\">Tiktok</div></div>\n    <div class=\"chcard\"><img class=\"logo\" src=\"_assets/src/s107_4.png\" alt=\"Google\"><div class=\"nm\">Google</div></div>\n    <div class=\"chcard\"><img class=\"logo\" src=\"_assets/src/s107_3.png\" alt=\"Xiao Hong Shu\"><div class=\"nm\">Xiao Hong Shu</div><div class=\"ds\">(rednote)</div></div>\n    <div class=\"chcard\"><img class=\"logo\" src=\"_assets/src/s107_5.png\" alt=\"Lemon8\"><div class=\"nm\">Lemon8</div></div>\n    <div class=\"chcard\"><img class=\"logo\" src=\"_assets/src/s107_6.png\" alt=\"Whatsapp\"><div class=\"nm\">Whatsapp</div></div>\n    <div class=\"chcard\"><img class=\"logo\" src=\"_assets/src/s107_7.png\" alt=\"Linkedin\"><div class=\"nm\">Linkedin</div></div>\n    <div class=\"chcard\"><img class=\"logo\" src=\"_assets/src/s107_8.png\" alt=\"Telegram\"><div class=\"nm\">Telegram</div></div>\n  </div>\n</section>", "section": "b1", "note": "<ul>\n<li><b>Say:</b> &quot;You don&#x27;t need to be on all of these \u2014 be where <i>your</i> buyer already is.&quot; Kill the FOMO.</li>\n<li><b>Ask:</b> &quot;Where does your customer actually spend time \u2014 Facebook groups? TikTok? Xiaohongshu?&quot; One sentence each.</li>\n</ul>"}, {"region": "dk2", "badge": "05", "div": false, "title": "15 Most Popular Social Networks", "html": "<section class=\"slide\">\n  <div class=\"kicker\"><span class=\"dot\"></span> 15 Most Popular Social Networks <span class=\"num\">05</span></div>\n  <div class=\"rule\"></div>\n  <div style=\"flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;margin-top:6px\">\n    <img src=\"_assets/src/s108_0.png\" alt=\"15 most popular social networks by monthly active users\" style=\"max-height:540px;width:auto;border-radius:8px\">\n    <div style=\"font-family:'Spline Sans Mono';font-size:11px;color:var(--ink-soft);margin-top:10px\">Credits: Statusbrew \u2014 statusbrew.com/insights/social-media-statistics</div>\n  </div>\n</section>", "section": "b1", "note": "<ul>\n<li><b>Say (don&#x27;t read the chart):</b> &quot;The point isn&#x27;t the ranking \u2014 it&#x27;s that &#x27;social media&#x27; is a dozen rooms with different crowds. Pick the room your customer is in, not the biggest room.&quot;</li>\n</ul>"}, {"region": "dk2", "badge": "06", "div": false, "title": "Social Media Channels \u2014 Facebook", "html": "<section class=\"slide\">\n  <div class=\"kicker\"><span class=\"dot\"></span> Social Media Channels \u2014 Facebook <span class=\"num\">06</span></div>\n  <div class=\"rule\"></div>\n  <div class=\"guide\">\n    <div>\n      <div class=\"ghead\"><img class=\"logo\" src=\"_assets/src/s107_2.png\" alt=\"Facebook\"><div class=\"gn\">Facebook</div></div>\n      <div class=\"glist\">\n        <div class=\"gl\">Best for</div>\n        <ul><li>Older Audience</li><li>Service Businesses</li><li>Community-based Brands</li></ul>\n        <div class=\"gl\">Good for</div>\n        <ul><li>Promotions</li><li>Customer messages</li><li>Reviews</li><li>Groups</li></ul>\n      </div>\n    </div>\n    <div class=\"gshots\">\n      <img class=\"shot\" src=\"_assets/src/s109_1.png\" alt=\"Facebook video post\">\n      <img class=\"shot\" src=\"_assets/src/s109_0.png\" alt=\"Facebook event page\">\n      <img class=\"shot\" src=\"_assets/src/s109_3.png\" alt=\"Facebook photo album\">\n    </div>\n  </div>\n</section>", "section": "b1", "note": "<ul>\n<li>Run fast, as a <i>matching</i> exercise. <b>Ask each:</b> &quot;Whose business fits this one?&quot; Facebook = older, service, community; Instagram = visual (food/beauty/fitness/fashion/travel); TikTok = reach + younger + entertainment.</li>\n<li><b>Say:</b> &quot;Same content does <i>not</i> work everywhere \u2014 that&#x27;s the whole next block.&quot;</li>\n</ul>"}, {"region": "dk2", "badge": "07", "div": false, "title": "Social Media Channels \u2014 Instagram", "html": "<section class=\"slide\">\n  <div class=\"kicker\"><span class=\"dot\"></span> Social Media Channels \u2014 Instagram <span class=\"num\">07</span></div>\n  <div class=\"rule\"></div>\n  <div class=\"guide\">\n    <div>\n      <div class=\"ghead\"><img class=\"logo\" src=\"_assets/src/s107_0.png\" alt=\"Instagram\"><div class=\"gn\">Instagram</div></div>\n      <div class=\"glist\">\n        <div class=\"gl\">Best for</div>\n        <ul><li>Visual Businesses (eg. food, beauty, fitness, fashion, travel)</li></ul>\n        <div class=\"gl\">Good for</div>\n        <ul><li>Photos and short videos</li><li>Behind-the-scenes content</li><li>Influencer marketing</li></ul>\n      </div>\n    </div>\n    <div class=\"gshots\">\n      <img class=\"shot\" src=\"_assets/src/s110_0.png\" alt=\"Instagram post\">\n      <img class=\"shot\" src=\"_assets/src/s110_2.png\" alt=\"Instagram product\">\n      <img class=\"shot\" src=\"_assets/src/s110_3.png\" alt=\"Instagram stories\">\n    </div>\n  </div>\n</section>", "section": "b1", "note": "<ul>\n<li>Run fast, as a <i>matching</i> exercise. <b>Ask each:</b> &quot;Whose business fits this one?&quot; Facebook = older, service, community; Instagram = visual (food/beauty/fitness/fashion/travel); TikTok = reach + younger + entertainment.</li>\n<li><b>Say:</b> &quot;Same content does <i>not</i> work everywhere \u2014 that&#x27;s the whole next block.&quot;</li>\n</ul>"}, {"region": "dk2", "badge": "08", "div": false, "title": "Social Media Channels \u2014 Tiktok", "html": "<section class=\"slide\">\n  <div class=\"kicker\"><span class=\"dot\"></span> Social Media Channels \u2014 Tiktok <span class=\"num\">08</span></div>\n  <div class=\"rule\"></div>\n  <div class=\"guide\">\n    <div>\n      <div class=\"ghead\"><img class=\"logo\" src=\"_assets/src/s107_1.png\" alt=\"Tiktok\"><div class=\"gn\">Tiktok</div></div>\n      <div class=\"glist\">\n        <div class=\"gl\">Best for</div>\n        <ul><li>Larger reach</li><li>Targeting younger audiences</li></ul>\n        <div class=\"gl\">Good for</div>\n        <ul><li>Short videos</li><li>Education</li><li>Entertainment</li><li>Viral exposure</li></ul>\n      </div>\n    </div>\n    <div class=\"gshots\">\n      <img class=\"shot\" src=\"_assets/src/s111_0.png\" alt=\"TikTok post\">\n      <img class=\"shot\" src=\"_assets/src/s111_1.png\" alt=\"TikTok video\">\n    </div>\n  </div>\n</section>", "section": "b1", "note": "<ul>\n<li>Run fast, as a <i>matching</i> exercise. <b>Ask each:</b> &quot;Whose business fits this one?&quot; Facebook = older, service, community; Instagram = visual (food/beauty/fitness/fashion/travel); TikTok = reach + younger + entertainment.</li>\n<li><b>Say:</b> &quot;Same content does <i>not</i> work everywhere \u2014 that&#x27;s the whole next block.&quot;</li>\n</ul>"}, {"region": "dk2", "badge": "09", "div": false, "title": "TikTok \u2014 From Feed to Checkout", "html": "<section class=\"slide\">\n  <div class=\"kicker\"><span class=\"dot\"></span> TikTok \u2014 From Feed to Checkout <span class=\"num\">09</span></div>\n  <div class=\"rule\"></div>\n  <h2 class=\"d\" style=\"font-size:33px;margin-top:8px\">TikTok isn't a video app any more \u2014 it's a <em class=\"i\">storefront</em>.</h2>\n  <div class=\"lead\" style=\"margin-top:6px;font-size:16px\">Discovery, entertainment and <b>buying</b> now happen in the same feed \u2014 without ever leaving the app.</div>\n  <div class=\"grid3\" style=\"margin-top:16px\">\n    <div class=\"gcard\"><div class=\"gh\">\ud83d\udecd TikTok Shop</div><div style=\"font-size:14px;color:var(--ink-soft);margin-top:8px;line-height:1.35\">Tap a product inside a video and check out in-app. Creators earn commission to promote it (affiliate).</div></div>\n    <div class=\"gcard\"><div class=\"gh\">\ud83d\udcfa Live Shopping</div><div style=\"font-size:14px;color:var(--ink-soft);margin-top:8px;line-height:1.35\">Hosts sell in real time \u2014 demos, Q&amp;A, limited-time drops. The engine of Southeast Asian commerce.</div></div>\n    <div class=\"gcard\"><div class=\"gh\">\ud83d\udccd Local Services <span style=\"font-family:'Spline Sans Mono';font-size:10px;color:var(--exec);border:1px solid var(--exec);border-radius:999px;padding:1px 7px;vertical-align:middle\">emerging</span></div><div style=\"font-size:14px;color:var(--ink-soft);margin-top:8px;line-height:1.35\">Group-buy vouchers for restaurants, salons, gyms \u2014 booked in-app, redeemed in store. Already huge on Douyin (China).</div></div>\n  </div>\n  <div style=\"background:var(--ink);color:var(--paper);border-radius:8px;padding:15px 22px;margin-top:auto;font-size:16px;line-height:1.4\">Southeast Asia TikTok Shop: <b style=\"color:var(--apricot)\">$45.6B</b> GMV in 2025 \u2014 <b style=\"color:var(--apricot)\">10\u00d7 in three years</b>. Indonesia alone: <b style=\"color:var(--apricot)\">$13.1B</b> (its #2 market worldwide).</div>\n</section>", "section": "b1", "note": "<ul>\n<li><b>Say:</b> &quot;Here&#x27;s what changed. TikTok isn&#x27;t a video app any more \u2014 it&#x27;s a <i>storefront</i>. Three things now live in the feed: <b>TikTok Shop</b> (tap a product in a video, buy in-app; creators earn commission), <b>Live Shopping</b> (hosts sell in real time \u2014 demos, Q&amp;A, limited drops), and <b>Local Services</b>, still emerging \u2014 group-buy vouchers for restaurants and salons, redeemed in store (already huge on Douyin in China).&quot;</li>\n<li><b>The number that lands it:</b> &quot;Southeast Asia TikTok Shop did <b>$45.6 billion</b> in 2025 \u2014 <i>ten times</i> what it did three years ago. Indonesia alone is $13.1B, its #2 market in the world. This isn&#x27;t a Western thing \u2014 it&#x27;s <i>our</i> region leading it.&quot; _(source: TNGlobal / DealStreetAsia, 2026)_</li>\n</ul>"}, {"region": "dk2", "badge": "10", "div": false, "title": "How Brands Win on TikTok", "html": "<section class=\"slide\">\n  <div class=\"kicker\"><span class=\"dot\"></span> How Brands Win on TikTok <span class=\"num\">10</span></div>\n  <div class=\"rule\"></div>\n  <h2 class=\"d\" style=\"font-size:34px;margin-top:8px\">You don't buy your way onto TikTok. You <em class=\"i\">earn</em> it.</h2>\n  <div class=\"lead\" style=\"margin-top:6px;font-size:16px\">The algorithm rewards native, entertaining content \u2014 not polished ads. Two levers do the heavy lifting:</div>\n  <div class=\"duo\" style=\"margin-top:14px\">\n    <div class=\"pane a\"><div class=\"pl\">\ud83c\udfb5 Ride the sound</div><div class=\"pd\" style=\"margin-top:0\">Trending audio + original sounds. Trend-jacking earns ~<b style=\"color:var(--ink)\">376% more reach</b> than your average post.</div><div style=\"margin-top:auto;padding-top:12px;border-top:1px solid var(--line);font-size:14.5px\"><b>e.l.f. #eyeslipsface:</b> one original song \u2192 5M+ user videos, ~7B views, a sales spike.</div></div>\n    <div class=\"pane g\"><div class=\"pl\">\ud83e\udd1d Hire the right creators</div><div class=\"pd\" style=\"margin-top:0\">Micro/nano creators with real trust <b style=\"color:var(--ink)\">out-convert celebrities</b> (8%+ engagement). Affiliate links make every sale trackable.</div><div style=\"margin-top:auto;padding-top:12px;border-top:1px solid var(--line);font-size:14.5px\"><b>Dunkin':</b> micro-influencers \u2192 1B+ views. <b>Tarte:</b> trend-jack + live \u2192 600k units.</div></div>\n  </div>\n  <div class=\"takeaway\">Raw and real beats polished. The algorithm gives unknown brands a fair shot \u2014 <b>if the content earns it.</b></div>\n</section>", "section": "b1", "note": "<ul>\n<li><b>Frame:</b> &quot;You don&#x27;t <i>buy</i> your way onto TikTok \u2014 you earn it. The algorithm rewards native, entertaining content, not polished ads. Two levers:&quot;</li>\n<li><b>1 \u00b7 Ride the sound:</b> &quot;Trending audio and original sounds. Jumping on a trend early gets ~376% more reach than your normal post. <b>e.l.f. Cosmetics</b> made an <i>original song</i> (#eyeslipsface) \u2192 5M+ user videos, ~7 billion views, a real sales spike.&quot;</li>\n<li><b>2 \u00b7 Hire the right creators:</b> &quot;Micro and nano creators with genuine trust out-convert celebrities \u2014 8%+ engagement. Use affiliate links so every sale is trackable. <b>Dunkin&#x27;</b> went micro-influencer \u2192 1B+ views; <b>Tarte</b> trend-jacked + went live \u2192 600k units sold.&quot;</li>\n<li><b>Land it:</b> &quot;Raw and real beats polished. The algorithm gives an unknown brand a fair shot \u2014 <i>if the content earns it.</i>&quot; _(sources: AnyRoad case studies; Influee; StackInfluence)_</li>\n</ul>"}, {"region": "dk2", "badge": "11", "div": false, "title": "TikTok \u2014 Resources &amp; Tooling", "html": "<section class=\"slide\">\n  <div class=\"kicker\"><span class=\"dot\"></span> TikTok \u2014 Resources &amp; Tooling <span class=\"num\">11</span></div>\n  <div class=\"rule\"></div>\n  <h2 class=\"d\" style=\"font-size:31px;margin-top:8px\">Resources &amp; tooling for influencer intelligence on TikTok</h2>\n  <div class=\"lead\" style=\"margin-top:6px;font-size:16px\">Don't pay until you need to. Match the tool to what you're actually <em class=\"i\">doing</em>.</div>\n  <div class=\"grid3\" style=\"margin-top:18px\">\n    <div class=\"gcard\">\n      <div style=\"font-family:'Spline Sans Mono';font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent)\">1 \u00b7 Find creators &amp; ideas</div>\n      <div style=\"display:flex;align-items:center;gap:8px;margin-top:9px;flex-wrap:wrap\"><span style=\"font-family:'Fraunces';font-size:20px;font-weight:560;color:var(--proof)\">TikTok Creative Center</span><span style=\"font-family:'Spline Sans Mono';font-size:10px;letter-spacing:.08em;color:var(--proof);border:1px solid var(--proof);border-radius:999px;padding:1px 8px\">FREE</span></div>\n      <div style=\"font-size:14px;color:var(--ink-soft);margin-top:10px;line-height:1.35\">Trending organic videos, sounds, hashtags &amp; creators \u2014 by region. Your starting point for what's working.</div>\n    </div>\n    <div class=\"gcard\">\n      <div style=\"font-family:'Spline Sans Mono';font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent)\">2 \u00b7 Manage &amp; vet influencers</div>\n      <div style=\"display:flex;align-items:center;gap:8px;margin-top:9px;flex-wrap:wrap\"><span style=\"font-family:'Fraunces';font-size:19px;font-weight:560;color:var(--proof)\">Organic analytics</span><span style=\"font-family:'Spline Sans Mono';font-size:10px;letter-spacing:.08em;color:var(--exec);border:1px solid var(--exec);border-radius:999px;padding:1px 8px\">PAID</span></div>\n      <div style=\"font-size:13px;color:var(--ink);margin-top:6px;font-weight:600\">Exolyt \u00b7 Trendpop \u00b7 Analisa.io \u00b7 EnsembleData</div>\n      <div style=\"font-size:14px;color:var(--ink-soft);margin-top:8px;line-height:1.35\">Check real engagement, spot fake followers, track performance &amp; report. Pay once you're handing creators money.</div>\n    </div>\n    <div class=\"gcard\">\n      <div style=\"font-family:'Spline Sans Mono';font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent)\">3 \u00b7 Sell on TikTok Shop</div>\n      <div style=\"display:flex;align-items:center;gap:8px;margin-top:9px;flex-wrap:wrap\"><span style=\"font-family:'Fraunces';font-size:19px;font-weight:560;color:var(--proof)\">E-commerce intel</span><span style=\"font-family:'Spline Sans Mono';font-size:10px;letter-spacing:.08em;color:var(--exec);border:1px solid var(--exec);border-radius:999px;padding:1px 8px\">PAID</span></div>\n      <div style=\"font-size:13px;color:var(--ink);margin-top:6px;font-weight:600\">Kalodata \u00b7 FastMoss \u00b7 Pipiads \u00b7 Shoplus</div>\n      <div style=\"font-size:14px;color:var(--ink-soft);margin-top:8px;line-height:1.35\">What's selling, which creators drive sales (GMV), competitor intel. Pay once you open a Shop.</div>\n    </div>\n  </div>\n  <div class=\"takeaway\">Free for <b>inspiration</b> \u2192 analytics when you <b>hire a creator</b> \u2192 Shop intel when you <b>start selling</b>.</div>\n</section>", "section": "b1", "note": "<ul>\n<li><b>Say:</b> &quot;Don&#x27;t pay until you need to. Three jobs, three toolkits. <b>(1) Find creators &amp;amp; ideas \u2192 TikTok Creative Center \u2014 free.</b> Trending organic videos, sounds, hashtags &amp;amp; creators by region \u2014 filter it to Singapore. It&#x27;s effectively &#x27;an ad library, but for organic.&#x27; <b>(2) Manage &amp;amp; vet influencers \u2192 organic analytics</b> (Exolyt, Trendpop, Analisa.io, EnsembleData) \u2014 check real engagement and spot fake followers <i>before</i> you pay a creator. <b>(3) Sell on TikTok Shop \u2192 e-commerce intel</b> (Kalodata, FastMoss, Pipiads, Shoplus) \u2014 what&#x27;s selling, which creators drive the most GMV, competitor intel.&quot;</li>\n<li><b>Rule of thumb:</b> &quot;Free Creative Center for inspiration \u2192 an analytics tool the moment you hand a creator money \u2192 a Shop spy tool the moment you open a TikTok Shop. <b>Most owners never need beyond free.</b>&quot; _(source: TikTok Creative Center \u2014 ads.tiktok.com/business/creativecenter)_</li>\n</ul>"}, {"region": "dk2", "badge": "12", "div": false, "title": "Instagram vs TikTok", "html": "<section class=\"slide\">\n  <div class=\"kicker\"><span class=\"dot\"></span> Instagram vs TikTok <span class=\"num\">12</span></div>\n  <div class=\"rule\"></div>\n  <h2 class=\"d\" style=\"font-size:38px;margin-top:8px\">The same post won't work on both.</h2>\n  <div class=\"duo\" style=\"margin-top:14px\">\n    <div class=\"pane g\"><div class=\"pl\">\ud83d\udcf7 Instagram \u2014 the shop window</div><ul style=\"margin-top:4px\"><li>Polished &amp; aspirational</li><li>You follow brands you already know</li><li>Aesthetic grid \u00b7 Reels \u00b7 Stories</li><li>Best for a curated brand image &amp; considered buys</li></ul><div style=\"margin-top:auto;padding-top:12px;border-top:1px solid var(--line);font-size:14.5px\"><b>A caf\u00e9:</b> beautiful flat-lays build the brand's look.</div></div>\n    <div class=\"pane b\"><div class=\"pl\">\ud83c\udfac TikTok \u2014 the street performer</div><ul style=\"margin-top:4px\"><li>Raw &amp; entertaining</li><li>The algorithm shows you to strangers</li><li>Trends \u00b7 sounds \u00b7 native video</li><li>Best for discovery, virality, impulse + live sales</li></ul><div style=\"margin-top:auto;padding-top:12px;border-top:1px solid rgba(243,239,230,.2);font-size:14.5px;color:#cfc8ba\"><b style=\"color:var(--paper)\">Same caf\u00e9:</b> a messy \"how it's made\" clip goes viral \u2192 queue out the door.</div></div>\n  </div>\n  <div class=\"takeaway\">Instagram is your <b>shop window</b>. TikTok is the <b>street performer</b> that pulls in the crowd.</div>\n</section>", "section": "b1", "note": "<ul>\n<li><b>The one-liner to teach:</b> &quot;<b>Instagram is your shop window. TikTok is the street performer that pulls in the crowd.</b>&quot;</li>\n<li><b>Say:</b> &quot;Instagram \u2014 polished, aspirational; people <i>follow</i> brands they already know; the aesthetic grid builds a curated image. TikTok \u2014 raw, entertaining; the <i>algorithm</i> shows you to strangers who don&#x27;t follow you; trends and sounds make unknowns blow up. A caf\u00e9&#x27;s job on Instagram is a beautiful flat-lay; on TikTok it&#x27;s a messy &#x27;how it&#x27;s made&#x27; clip that goes viral and puts a queue out the door.&quot;</li>\n<li>\u25b8 <i>Interactive:</i> &quot;Which one are you treating like the other? Most owners post Instagram-perfect content on TikTok and wonder why it flops.&quot;</li>\n</ul>"}, {"region": "dk2", "badge": "13", "div": false, "title": "Social Media Channels \u2014 Xiaohongshu (RedNote)", "html": "<section class=\"slide\">\n  <div class=\"kicker\"><span class=\"dot\"></span> Social Media Channels \u2014 Xiaohongshu (RedNote) <span class=\"num\">13</span></div>\n  <div class=\"rule\"></div>\n  <div class=\"guide\">\n    <div>\n      <div class=\"ghead\"><img class=\"logo\" src=\"_assets/src/s107_3.png\" alt=\"Xiaohongshu\"><div class=\"gn\">Xiaohongshu <span style=\"font-size:15px;color:var(--ink-soft);font-weight:400\">\u00b7 RedNote</span></div></div>\n      <div class=\"glist\">\n        <div class=\"gl\">Best for</div>\n        <ul>\n          <li>Mandarin-speaking, young (18\u201335), mostly women</li>\n          <li>The Chinese diaspora &amp; tourists \u2014 SG-Chinese, Hongkongers, mainlanders are one crowd</li>\n          <li>Beauty, fashion, travel, F&amp;B, wellness</li>\n        </ul>\n        <div class=\"gl\">Good for</div>\n        <ul>\n          <li>Detailed \"notes\" \u2014 reviews, how-tos, guides</li>\n          <li>Getting found in <b>search</b> \u2014 every post is an SEO asset that lives for months</li>\n          <li>KOC seeding \u2014 many small, authentic reviews (\u79cd\u8349)</li>\n        </ul>\n      </div>\n    </div>\n    <div class=\"gshots\">\n      <div style=\"border:1px dashed var(--line-2);border-radius:9px;background:var(--paper-2);display:flex;align-items:center;justify-content:center;text-align:center\"><div style=\"color:var(--ink-soft);font-family:'Spline Sans Mono';font-size:12px;line-height:1.7;padding:24px\">[ IMAGE TO ADD ]<br><span style=\"color:var(--accent);font-size:14px\">Xiaohongshu app</span><br>the notes / search feed</div></div>\n    </div>\n  </div>\n</section>", "section": "b1", "note": "<ul>\n<li><b>The differentiator (lead with this):</b> &quot;Don&#x27;t think of it as another video feed. Xiaohongshu \u2014 RedNote \u2014 is a <i>search engine for buying decisions</i>. Before a facial, a stroller, a trip, a restaurant, people <b>search it and read real users&#x27; &#x27;notes&#x27;</b> to decide. And the killer bit: <b>every post is an SEO asset</b> \u2014 a good note keeps pulling traffic for <i>months</i>, while IG/TikTok content dies in days. One line for the room: <b>Instagram = pretty \u00b7 TikTok = fun \u00b7 Xiaohongshu = useful &amp; searchable.</b>&quot;</li>\n<li><b>Who&#x27;s on it \u2014 it&#x27;s a <i>language</i>, not a nationality:</b> &quot;~78% women, 18\u201335, mid-to-upper income. The audience is defined by <b>Mandarin language + Chinese consumer culture, not the passport</b> \u2014 a Singaporean-Chinese, a Hongkonger and a mainlander are the <i>same</i> XHS crowd. Strongest for beauty, fashion, travel, F&amp;B, wellness. And practically: <b>Chinese tourists plan their Singapore trip on it.</b> In SEA, Malaysia is its #2 market outside China; Malaysia + Singapore \u2248 4.3M users.&quot;</li>\n<li><b>How brands win \u2014 KOC seeding (the specific tactic):</b> &quot;Not one big KOL. You seed <b>many small &#x27;Key Opinion Consumers&#x27;</b> \u2014 real users posting authentic notes (\u79cd\u8349, &#x27;planting the desire&#x27;) \u2014 plus keyword-searchable content, so you surface when someone looks you up. Volume of genuine reviews &gt; one polished ad.&quot;</li>\n<li><b>Land it:</b> &quot;In Singapore, SMEs and luxury labels are already shifting budget here in 2026. If you sell beauty, food, travel or wellness to affluent, Chinese-speaking women \u2014 this is your channel, in their words, not your ad.&quot; _(sources: Fortune; Hashmeta; Halo Tech / WE Interactive SG; Comms8, 2025\u201326)_</li>\n</ul>"}, {"region": "dk2", "badge": "14", "div": false, "title": "Xiaohongshu \u2014 See It Live", "html": "<section class=\"slide\">\n  <div class=\"kicker\"><span class=\"dot\"></span> Xiaohongshu \u2014 See It Live <span class=\"num\">14</span></div>\n  <div class=\"rule\"></div>\n  <h2 class=\"d\" style=\"font-size:34px;margin-top:8px\">See how people actually <em class=\"i\">search</em> it.</h2>\n  <div class=\"lead\" style=\"margin-top:6px;font-size:16px\">Open the Xiaohongshu app and search the way a customer would \u2014 you'll watch the research happen in real time.</div>\n  <div class=\"duo\" style=\"margin-top:14px\">\n    <div class=\"pane a\"><div class=\"pl\">1 \u00b7 Search like a buyer</div><div class=\"pd\" style=\"margin-top:0\">Type a real query \u2014 you'll get a grid of \"notes,\" not ads:</div>\n      <ul style=\"list-style:none;margin-top:10px;display:flex;flex-direction:column;gap:8px\">\n        <li style=\"font-size:16px;display:flex;gap:9px\"><span style=\"color:var(--accent)\">\u203a</span><b>\u65b0\u52a0\u5761\u7f8e\u98df</b> <span style=\"color:var(--ink-soft)\">\u2014 \"Singapore food\"</span></li>\n        <li style=\"font-size:16px;display:flex;gap:9px\"><span style=\"color:var(--accent)\">\u203a</span><b>\u65b0\u52a0\u5761\u597d\u53bb\u5904</b> <span style=\"color:var(--ink-soft)\">\u2014 \"places to go in SG\"</span></li>\n        <li style=\"font-size:16px;display:flex;gap:9px\"><span style=\"color:var(--accent)\">\u203a</span><b>\u65b0\u52a0\u5761 facial</b> <span style=\"color:var(--ink-soft)\">\u2014 a buying decision</span></li>\n      </ul>\n    </div>\n    <div class=\"pane g\"><div class=\"pl\">2 \u00b7 What a <i>good</i> note looks like</div>\n      <ul style=\"list-style:none;margin-top:4px;display:flex;flex-direction:column;gap:9px\">\n        <li style=\"font-size:15px;display:flex;gap:9px\"><span style=\"color:var(--proof)\">\u2022</span>Keyword-rich title (so it's found in search)</li>\n        <li style=\"font-size:15px;display:flex;gap:9px\"><span style=\"color:var(--proof)\">\u2022</span>Strong cover image \u2014 the thumbnail earns the tap</li>\n        <li style=\"font-size:15px;display:flex;gap:9px\"><span style=\"color:var(--proof)\">\u2022</span>Honest, detailed guide: price \u00b7 must-order \u00b7 best time</li>\n        <li style=\"font-size:15px;display:flex;gap:9px\"><span style=\"color:var(--proof)\">\u2022</span>Lots of <b>saves</b> \u2014 people bookmark it for later</li>\n      </ul>\n      <div style=\"margin-top:auto;padding-top:10px;border-top:1px solid var(--line);font-size:13.5px;color:var(--ink-soft)\">Real XHS-driven SG hits: Fort Canning's tree tunnel, Old Hill Street Police Station, Jumbo chilli crab.</div>\n    </div>\n  </div>\n  <div style=\"margin-top:12px;font-family:'Spline Sans Mono';font-size:12px;color:var(--ink-soft)\">\u25b6 Demo in the app (most reliable) \u2014 the web (xiaohongshu.com) makes you log in first.</div>\n</section>", "section": "b1", "note": "<ul>\n<li><b>Set it up:</b> &quot;Let me show you the research actually happening. I&#x27;ll search the way a customer would.&quot; Open the <b>Xiaohongshu app</b> (web makes you log in \u2014 don&#x27;t fight it live) and search a real query: <b>\u65b0\u52a0\u5761\u7f8e\u98df</b> (&quot;Singapore food&quot;), <b>\u65b0\u52a0\u5761\u597d\u53bb\u5904</b> (&quot;places to go in SG&quot;), or <b>\u65b0\u52a0\u5761 facial</b> (a buying decision).</li>\n<li><b>Narrate what they see:</b> &quot;Look \u2014 a grid of <i>notes</i>, not ads. This is people researching. Now open a good one and notice why it works: a <b>keyword-rich title</b> (so search finds it), a <b>strong cover image</b> (the thumbnail earns the tap), an <b>honest, detailed guide</b> (price, must-order, best time to avoid the crowd), and <b>lots of saves</b> \u2014 people bookmark it for later.&quot;</li>\n<li><b>Make it concrete:</b> &quot;These aren&#x27;t theoretical \u2014 XHS sent waves of tourists to Singapore spots like <b>Fort Canning&#x27;s tree tunnel</b>, the <b>Old Hill Street Police Station</b>, and <b>Jumbo&#x27;s chilli crab.</b> A single good note moved real foot traffic.&quot;</li>\n<li><b>Tie back:</b> &quot;So a &#x27;good post&#x27; here isn&#x27;t a pretty photo \u2014 it&#x27;s a <i>useful, searchable guide</i>. Write the thing your customer is already searching for.&quot; _(source: SmartLocal / Malay Mail on XHS-driven SG tourism, 2024\u201325)_</li>\n</ul>"}, {"region": "dk2", "badge": "15", "div": false, "title": "Types of Posts on Social that Engages", "html": "<section class=\"slide\">\n  <div class=\"kicker\"><span class=\"dot\"></span> Types of Posts on Social that Engages <span class=\"num\">15</span></div>\n  <div class=\"rule\"></div>\n  <div class=\"quad\">\n    <div class=\"qcell\"><img src=\"_assets/src/s112_0.png\" alt=\"How to posts\"><div><div class=\"ql\">\"How to\u2026\"</div><div class=\"qs\">Teach something useful, step by step.</div></div></div>\n    <div class=\"qcell\"><img src=\"_assets/src/s112_1.png\" alt=\"Behind the scenes\"><div><div class=\"ql\">\"Behind-the-Scenes\"</div><div class=\"qs\">Show the people and process.</div></div></div>\n    <div class=\"qcell\"><img src=\"_assets/src/s112_2.png\" alt=\"Memes\"><div><div class=\"ql\">\"Memes / Entertaining Post\"</div><div class=\"qs\">Be human and worth sharing.</div></div></div>\n    <div class=\"qcell\"><img src=\"_assets/src/s112_3.png\" alt=\"Sales announcements\"><div><div class=\"ql\">\"Sales / Announcements\"</div><div class=\"qs\">Offers, launches and news.</div></div></div>\n  </div>\n</section>", "section": "b1", "note": "<ul>\n<li><b>Say:</b> &quot;Four formats that earn attention: How-to (teach), Behind-the-scenes (show the humans), Sales/Announcements (the ask), Memes/Entertaining (be likeable). Most SMEs only post the <i>ask</i> \u2014 then wonder why no one engages.&quot;</li>\n<li>\u25b8 <i>Interactive:</i> &quot;Which of the four do you <i>never</i> post? That&#x27;s probably your quickest win.&quot;</li>\n</ul>"}, {"region": "dk2", "badge": "16", "div": false, "title": "Social Media Marketing \u2014 Readiness", "html": "<section class=\"slide\">\n  <div class=\"kicker\"><span class=\"dot\"></span> Social Media Marketing \u2014 Readiness <span class=\"num\">16</span></div>\n  <div class=\"rule\"></div>\n  <h2 class=\"d\" style=\"font-size:34px;margin-top:10px\">Are you ready for social media? <span style=\"font-family:'Archivo';font-size:18px;font-weight:400;color:var(--ink-soft)\">(Readiness checklist)</span></h2>\n  <div class=\"checks\">\n    <div class=\"chk\"><div class=\"ct\">Purpose &amp; Role</div><ul><li>Why are you on social media?</li><li>What business outcome should it support?</li><li>What is social media not responsible for?</li></ul></div>\n    <div class=\"chk\"><div class=\"ct\">Audience Reality</div><ul><li>Where is your audience actually active?</li><li>How do they consume and engage with content?</li><li>What do they care about enough to react to?</li></ul></div>\n    <div class=\"chk\"><div class=\"ct\">Capability &amp; Commitment</div><ul><li>Can you commit consistently over time?</li><li>Do you have a clear owner and process?</li><li>Do you have something meaningful to say?</li></ul></div>\n    <div class=\"chk\"><div class=\"ct\">Governance &amp; Risk</div><ul><li>How will you respond to negative feedback?</li><li>Who decides what to reply publicly vs privately?</li><li>Are you prepared to listen and adapt?</li></ul></div>\n    <div class=\"chk\"><div class=\"ct\">Measurement &amp; Integration</div><ul><li>How will you measure success?</li><li>How does social connect to the rest of your marketing?</li></ul></div>\n  </div>\n</section>", "section": "b1", "note": "<ul>\n<li><b>Say:</b> &quot;Five honest checks before you commit \u2014 purpose, audience, capability, governance, measurement. The killer is <i>capability</i>: can you post consistently for a year? If not, do <i>one</i> channel well, not three badly.&quot;</li>\n<li>Frame as a gut-check, not a quiz \u2014 read the five headers, let it sit.</li>\n</ul>"}, {"region": "dk2", "badge": "17", "div": false, "title": "What Success Looks Like on Social Media", "html": "<section class=\"slide\">\n  <div class=\"kicker\"><span class=\"dot\"></span> What Success Looks Like on Social Media <span class=\"num\">17</span></div>\n  <div class=\"rule\"></div>\n  <div class=\"sub2\">Aligning Objectives with Reality</div>\n  <div class=\"tbl\">\n    <div class=\"tr thr\"><div>Objective</div><div>What social media is actually doing</div></div>\n    <div class=\"tr\"><div class=\"tk\">Awareness</div><div class=\"tv\">Reach, recall, familiarity</div></div>\n    <div class=\"tr\"><div class=\"tk\">Trust</div><div class=\"tv\">Credibility, social proof</div></div>\n    <div class=\"tr\"><div class=\"tk\">Consideration</div><div class=\"tv\">Education, reassurance</div></div>\n    <div class=\"tr\"><div class=\"tk\">Retention</div><div class=\"tv\">Ongoing relationship</div></div>\n    <div class=\"tr\"><div class=\"tk\">Conversion</div><div class=\"tv\">Supportive, not primary</div></div>\n  </div>\n</section>", "section": "b1", "note": "<ul>\n<li><b>Say:</b> &quot;Social mostly does awareness, trust, consideration, retention. Notice what&#x27;s at the bottom: <b>conversion is supportive, not primary.</b> Don&#x27;t judge a brand post by direct sales \u2014 that&#x27;s email&#x27;s job. Judge it by whether the right people remember you.&quot;</li>\n<li><b>Spine tie:</b> this is <i>See / Think</i>, not <i>Do</i>.</li>\n</ul>\n<p>---</p>"}, {"region": "dk2", "badge": null, "div": false, "title": "How to do influencer marketing.", "html": "<section class=\"slide\" style=\"background:#3a2722;justify-content:center\">\n  <div style=\"position:absolute;top:52px;right:64px;font-family:'Spline Sans Mono';font-size:12px;letter-spacing:.2em;color:#b08a7a;text-transform:uppercase\">SMU Academy \u00b7 Day 1</div>\n  <div style=\"font-family:'Spline Sans Mono';font-size:14px;letter-spacing:.32em;color:var(--apricot);text-transform:uppercase\">Social Media \u00b7 Subsection</div>\n  <h1 class=\"d\" style=\"font-size:76px;font-weight:560;color:var(--paper);line-height:1.02;margin-top:18px;letter-spacing:-.02em\">How to do<br>influencer marketing.</h1>\n  <div style=\"font-size:21px;color:#cdb8ad;margin-top:24px;max-width:820px;line-height:1.45\">Borrowing trust you haven't built yet \u2014 from the <em style=\"color:var(--apricot);font-style:italic\">right</em> creators, the right way.</div>\n</section>", "section": "b1", "note": "<p class=\"pv-empty\">\u2014 no scripted note for this slide; speak to what is on screen \u2014</p>"}, {"region": "dk2", "badge": "18", "div": false, "title": "AI Influencer / Content Creators", "html": "<section class=\"slide\">\n  <div class=\"kicker\"><span class=\"dot\"></span> AI Influencer / Content Creators <span class=\"num\">18</span></div>\n  <div class=\"rule\"></div>\n  <div class=\"aicards\">\n    <div class=\"aicard\">\n      <img src=\"_assets/src/s116_0.png\" alt=\"imma.gram\">\n      <div>\n        <div class=\"hd\">imma.gram <span class=\"vb\">\u2713</span></div>\n        <div class=\"nm\">imma</div>\n        <div class=\"stats\"><div><b>901</b>posts</div><div><b>387K</b>followers</div><div><b>850</b>following</div></div>\n      </div>\n    </div>\n    <div class=\"aicard\">\n      <img src=\"_assets/src/s116_1.png\" alt=\"fit_aitana\">\n      <div>\n        <div class=\"hd\">fit_aitana <span class=\"vb\">\u2713</span></div>\n        <div class=\"nm\">Aitana Lopez \u2726 | Virtual Soul</div>\n        <div class=\"stats\"><div><b>194</b>posts</div><div><b>385K</b>followers</div><div><b>462</b>following</div></div>\n      </div>\n    </div>\n  </div>\n</section>", "section": "b2", "note": "<ul>\n<li><b>Hook:</b> &quot;Marketing&#x27;s oldest trick: if people don&#x27;t trust <i>you</i> yet, stand next to someone they already trust.&quot; That&#x27;s influencers in one line.</li>\n<li>On 18: &quot;And now some of those &#x27;people&#x27; aren&#x27;t people \u2014 virtual/AI creators with hundreds of thousands of followers. The judgement is identical: does <i>their</i> audience trust them for <i>this</i> decision?&quot;</li>\n<li><b>Types, fast (folded in here):</b> &quot;Mega \u2192 Macro \u2192 Micro \u2192 Nano. Counter-intuition: <i>smaller is often better.</i> A nano creator with 8k followers who genuinely loves you out-converts a celebrity, because the trust is real.&quot;</li>\n</ul>"}, {"region": "dk2", "badge": "19", "div": false, "title": "Influencer / Content Creators", "html": "<section class=\"slide\">\n  <div class=\"kicker\"><span class=\"dot\"></span> Influencer / Content Creators <span class=\"num\">19</span></div>\n  <div class=\"rule\"></div>\n  <div class=\"sub2\" style=\"color:var(--proof)\">What It Is</div>\n  <div class=\"lead\" style=\"margin-top:6px;color:var(--ink)\">Collaborating with individuals who have a <b>strong, engaged following</b> on social media to promote a brand, product, or service.</div>\n  <div class=\"grid3\">\n    <div class=\"gcard\"><div class=\"gh\">Types of Influencers</div><ul>\n      <li><b>Mega:</b> 1M+ followers (broad reach)</li>\n      <li><b>Macro:</b> 100K\u20131M followers (wider niche reach)</li>\n      <li><b>Micro:</b> 10K\u2013100K followers (high engagement)</li>\n      <li><b>Nano:</b> 1K\u201310K followers (very niche, highly trusted)</li></ul></div>\n    <div class=\"gcard\"><div class=\"gh\">Benefits</div><ul>\n      <li>Builds <b>trust and credibility</b> through personal endorsements</li>\n      <li>Reaches <b>targeted audiences</b> more effectively than generic ads</li>\n      <li>Potential to boost <b>brand awareness, engagement and sales</b></li></ul></div>\n    <div class=\"gcard\"><div class=\"gh\">Strategies</div><ul>\n      <li>Sponsored posts or videos</li>\n      <li>Product reviews/unboxing</li>\n      <li>Giveaways or contests</li>\n      <li>Affiliate partnerships</li></ul></div>\n  </div>\n</section>", "section": "b2", "note": "<ul>\n<li><b>Hook:</b> &quot;Marketing&#x27;s oldest trick: if people don&#x27;t trust <i>you</i> yet, stand next to someone they already trust.&quot; That&#x27;s influencers in one line.</li>\n<li>On 18: &quot;And now some of those &#x27;people&#x27; aren&#x27;t people \u2014 virtual/AI creators with hundreds of thousands of followers. The judgement is identical: does <i>their</i> audience trust them for <i>this</i> decision?&quot;</li>\n<li><b>Types, fast (folded in here):</b> &quot;Mega \u2192 Macro \u2192 Micro \u2192 Nano. Counter-intuition: <i>smaller is often better.</i> A nano creator with 8k followers who genuinely loves you out-converts a celebrity, because the trust is real.&quot;</li>\n</ul>"}, {"region": "dk2", "badge": "20", "div": false, "title": "Why Are You Using Influencers?", "html": "<section class=\"slide\">\n  <div class=\"kicker\"><span class=\"dot\"></span> Why Are You Using Influencers? <span class=\"num\">20</span></div>\n  <div class=\"rule\"></div>\n  <div class=\"sub2\">Start Here: Defining Objectives</div>\n  <div class=\"split\" style=\"grid-template-columns:.85fr 1.15fr\">\n    <div class=\"pane g\" style=\"min-height:0;align-self:center\">\n      <div class=\"pl\">Are you trying to:</div>\n      <ul><li>Build awareness?</li><li>Borrow trust?</li><li>Drive trial?</li><li>Create content?</li><li>Influence consideration?</li></ul>\n      <div style=\"font-family:'Fraunces';font-style:italic;font-weight:540;color:var(--proof);margin-top:16px;font-size:18px\">\"Different objectives = different influencer choices.\"</div>\n    </div>\n    <div class=\"ladder\">\n      <div class=\"rung bad\"><div class=\"rl\">\u2715 Bad Strategy</div><div class=\"rt\">\"Let's find influencers with big followings.\"</div></div>\n      <div class=\"rung better\"><div class=\"rl\">\u2014 Better Strategy</div><div class=\"rt\">\"Let's find influencers in our category.\"</div></div>\n      <div class=\"rung best\"><div class=\"rl\">\u2713 Best Strategy</div><div class=\"rt\">\"Let's find creators whose audience already trusts them for this specific decision.\"</div></div>\n    </div>\n  </div>\n</section>", "section": "b2", "note": "<ul>\n<li><b>Ask first:</b> &quot;If you hired an influencer tomorrow, how would you pick them?&quot; Most say <i>biggest following</i> \u2192 that&#x27;s the <b>bad</b> answer.</li>\n<li><b>Walk the ladder:</b> Bad = big following. Better = in our category. <b>Best = whose audience already trusts them for this specific decision.</b> &quot;Different objective, different creator.&quot;</li>\n</ul>"}, {"region": "dk2", "badge": "21", "div": false, "title": "Not All Influencers Are Equal", "html": "<section class=\"slide\">\n  <div class=\"kicker\"><span class=\"dot\"></span> Not All Influencers Are Equal <span class=\"num\">21</span></div>\n  <div class=\"rule\"></div>\n  <div class=\"sub2\">Vetting for Authenticity &amp; Impact</div>\n  <div class=\"split\">\n    <div>\n      <div style=\"font-family:'Fraunces';font-size:22px;font-weight:560;color:var(--proof)\">What to Audit <span style=\"font-size:14px;font-style:italic;color:var(--ink-soft);font-weight:400\">(Beyond just follower count)</span></div>\n      <div style=\"margin-top:16px\">\n        <div class=\"auditcard\">Content tone and authenticity</div>\n        <div class=\"auditcard\">How often they do sponsored posts</div>\n        <div class=\"auditcard\">Audience comments (real vs generic)</div>\n        <div class=\"auditcard\">Whether their content feels forced or natural</div>\n      </div>\n    </div>\n    <div class=\"insight\">\n      <div class=\"il\">\u26a0 Critical Insight</div>\n      <div class=\"iq\">\"Influencers who are overly commercial tend to deliver lower trust and weaker results.\"</div>\n      <div class=\"if\">\u2192 Prioritize trust over reach</div>\n    </div>\n  </div>\n</section>", "section": "b2", "note": "<ul>\n<li><b>Say:</b> &quot;Look past follower count. Read the <i>comments</i> \u2014 real conversation or generic emojis? Too many #ad posts? Over-commercial creators leak trust, and you&#x27;re <i>paying</i> for that trust.&quot; Prioritise trust over reach.</li>\n</ul>"}, {"region": "dk2", "badge": "22", "div": false, "title": "Using Influencers for Campaigns vs Building Brand Ambassadors", "html": "<section class=\"slide\">\n  <div class=\"kicker\"><span class=\"dot\"></span> Using Influencers for Campaigns vs Building Brand Ambassadors <span class=\"num\">22</span></div>\n  <div class=\"rule\"></div>\n  <div class=\"sub2\">Strategic Approaches &amp; Hybrid Models</div>\n  <div class=\"cmp3\">\n    <div class=\"cmpcol c1\">\n      <div class=\"chd\">\ud83d\udce3 Campaigns</div>\n      <div class=\"cmpbody\">\n        <div class=\"cseg\"><div class=\"sl ok\">\u2713 What works</div><ul><li>Creative storytelling, not forced placement</li><li>Content fits naturally in creator's style</li><li>Clear narrative (launch, feature, occasion)</li><li>Authentic usage that feels genuine</li></ul></div>\n        <div class=\"cseg\"><div class=\"sl\">\u26a1 Strengths</div><ul><li>Flexibility with wider range of creators</li><li>Ideal for specific launches or products</li><li>Quick testing of formats and angles</li><li>More control over cost and scope</li></ul></div>\n        <div class=\"cseg\"><div class=\"sl warn\">\u26a0 Risk to watch</div><ul><li>Feels transactional if over-scripted</li><li>Weak results if creator\u2013brand fit is poor</li></ul><div class=\"q\" style=\"margin-top:6px\">\"A campaign fails not because it's one-off \u2014 but because it feels like an ad.\"</div></div>\n      </div>\n    </div>\n    <div class=\"cmpcol c2\">\n      <div class=\"chd\">\u2605 Brand Ambassadors</div>\n      <div class=\"cmpbody\">\n        <div class=\"cseg\"><div class=\"sl ok\">\u2713 What works</div><ul><li>Ongoing, natural integration</li><li>Repeated exposure builds familiarity</li><li>Strong creator\u2013brand alignment</li><li>Less \"selling\", more lived experience</li></ul></div>\n        <div class=\"cseg\"><div class=\"sl\">\u26a1 Strengths</div><ul><li>Trust compounds over time</li><li>Content feels more organic and credible</li><li>Higher long-term ROI</li><li>Easier content reuse across channels</li></ul></div>\n        <div class=\"cseg\"><div class=\"sl warn\">\u21c4 Trade-offs</div><ul><li>Requires longer commitment</li><li>Smaller creator pool &amp; less flexibility</li></ul><div class=\"q\" style=\"margin-top:6px\">\"Ambassadors don't sell faster \u2014 they sell more convincingly.\"</div></div>\n      </div>\n    </div>\n    <div class=\"cmpcol c3\">\n      <div class=\"chd\">\u292c Hybrid Strategy</div>\n      <div class=\"cmpbody\">\n        <div class=\"cseg\"><div class=\"sl ok\">Launch &amp; awareness</div><ul><li>Use macro influencers to kickstart visibility</li><li>Create cultural or conversational momentum</li></ul></div>\n        <div class=\"cseg\"><div class=\"sl ok\">Sustained trust</div><ul><li>Use mid-tier or nano as ambassadors</li><li>Better engagement &amp; cost-efficiency</li><li>Builds stronger trust over time</li></ul></div>\n      </div>\n      <div class=\"golden\"><div class=\"gt\">The Golden Rule</div><div class=\"gv\">Scale awareness fast. Build trust steadily.</div></div>\n    </div>\n  </div>\n</section>", "section": "b2", "note": "<ul>\n<li><b>Say:</b> &quot;Two ways to work with creators: short <b>campaigns</b> (fast, flexible, for a launch) vs ongoing <b>ambassadors</b> (slow, compounding, more believable). Golden rule: <b>scale awareness fast with campaigns, build trust steadily with ambassadors.</b>&quot;</li>\n<li>\u25b8 <i>Interactive:</i> &quot;For your business \u2014 launch moment or slow trust? That tells you which to start with.&quot;</li>\n</ul>"}, {"region": "dk2", "badge": "23", "div": false, "title": "Good Influencer Content Feels Natural \u2014 Not Directed", "html": "<section class=\"slide\">\n  <div class=\"kicker\"><span class=\"dot\"></span> Good Influencer Content Feels Natural \u2014 Not Directed <span class=\"num\">23</span></div>\n  <div class=\"rule\"></div>\n  <div class=\"duo\">\n    <div class=\"pane a\"><div class=\"pl\">\u2715 What Often Goes Wrong</div><ul style=\"margin-top:6px\"><li>Over-scripted briefs that kill spontaneity</li><li>Forcing corporate brand language</li><li>Too many mandatory talking points</li></ul></div>\n    <div class=\"pane g\"><div class=\"pl\">\u2713 Better Approach</div><ul style=\"margin-top:6px\"><li>Clear objective aligned with creator style</li><li>Clear boundaries on what not to say</li><li>Creative freedom within guardrails</li></ul></div>\n  </div>\n  <div class=\"takeaway\"><b>\"If it doesn't sound like them, it won't work</b> \u2014 no matter how perfect the brief is.\"</div>\n</section>", "section": "b2", "note": "<ul>\n<li><b>Say:</b> &quot;The #1 way brands waste influencer money: over-scripting. If it doesn&#x27;t sound like them, their audience smells the ad instantly. Give a clear objective and guardrails \u2014 then let them talk like themselves.&quot;</li>\n</ul>\n<p><i>(Divider \u2014 &quot;Find influencers with AI&quot;)</i></p>"}, {"region": "dk2", "badge": "24", "div": true, "title": "Find influencers with AI.", "html": "<section class=\"slide divider t\">\n  <div class=\"dtag\">SMU \u00b7 Day 1 \u2014 Influencer Marketing</div>\n  <div class=\"eyebrow\">Demo</div>\n  <h1 class=\"d\">Find influencers<br>with AI.</h1>\n  <div class=\"dsub\">Vetting by hand is a day's work. One good prompt does the first pass in minutes.</div>\n  <div class=\"dbn\">AI</div>\n</section>", "section": "b2", "note": "<ul>\n<li><b>Frame:</b> &quot;Vetting by hand is slow. Here&#x27;s how AI does the first pass. The skill is the <i>prompt</i> \u2014 brief the AI like a junior researcher: the niche, the market, and exactly how to vet.&quot;</li>\n<li><b>Read the prompt:</b> &quot;Find TikTok influencers in Singapore/Malaysia who are pregnant or new mums with viral videos \u2192 for each, pull followers, median views, engagement, views-per-follower, viral hits \u2192 judge fit for a maternity/baby brand, find a contact, score /10 with a verdict \u2192 return a ranked shortlist mixing big accounts and high-potential nanos.&quot;</li>\n<li><b>The honesty caveat (say it):</b> &quot;The chatbot is great for the <i>shortlist and the analysis</i> \u2014 but it <b>hallucinates follower counts and &#x27;viral&#x27; claims.</b> The real numbers come from a scraper (Apify) or an analytics tool. AI is the brains; the tool is the truth.&quot;</li>\n</ul>"}, {"region": "dk2", "badge": "24", "div": false, "title": "Find Influencers with AI \u2014 The Prompt", "html": "<section class=\"slide\" style=\"background:var(--teal)\">\n  <div class=\"kicker\" style=\"color:var(--teal-soft)\"><span class=\"dot\" style=\"background:var(--apricot)\"></span> Find Influencers with AI \u2014 The Prompt <span class=\"num\" style=\"color:var(--paper)\">24</span></div>\n  <div class=\"rule\" style=\"background:rgba(243,239,230,.22)\"></div>\n  <h2 class=\"d\" style=\"font-size:34px;margin-top:8px;color:var(--paper)\">Demo: find the right creators with <em style=\"color:var(--apricot);font-style:italic\">one prompt</em>.</h2>\n  <div style=\"margin-top:6px;font-size:16px;color:#cfd8d4;line-height:1.4\">Brief the AI like a junior researcher \u2014 be specific about the niche, the market, and exactly how to vet.</div>\n  <div style=\"background:rgba(0,0,0,.28);border:1px solid rgba(243,239,230,.2);color:#eaf1ee;border-radius:9px;padding:24px 30px;margin-top:16px;flex:1;display:flex;flex-direction:column;justify-content:center;font-family:'Spline Sans Mono';font-size:16px;line-height:1.6\">\n    <div style=\"color:var(--apricot);font-size:11px;letter-spacing:.18em;text-transform:uppercase;margin-bottom:14px\">&#9654; The prompt</div>\n    \"Find TikTok influencers in <b style=\"color:#fff\">Singapore or Malaysia</b> who are <b style=\"color:#fff\">currently pregnant or new mums</b> and have a track record of <b style=\"color:#fff\">viral videos</b>. For each, pull and analyse follower count, recent median views, engagement rate, views-per-follower and recent viral hits. Judge <b style=\"color:#fff\">content fit for a maternity / baby brand</b>, find a business contact, and give a <b style=\"color:#fff\">fit score /10 + a verdict</b> (Priority / Consider / Watch). Return a <b style=\"color:#fff\">ranked shortlist \u2014 mix big accounts with high-potential nano creators.</b>\"\n  </div>\n  <div style=\"margin-top:12px;font-family:'Spline Sans Mono';font-size:12px;color:var(--teal-soft)\">ChatGPT / Claude / Perplexity build the shortlist &middot; TikTok Creative Center validates &middot; Apify or an analytics tool pulls the real numbers.</div>\n</section>", "section": "b2", "note": "<ul>\n<li><b>Frame:</b> &quot;Vetting by hand is slow. Here&#x27;s how AI does the first pass. The skill is the <i>prompt</i> \u2014 brief the AI like a junior researcher: the niche, the market, and exactly how to vet.&quot;</li>\n<li><b>Read the prompt:</b> &quot;Find TikTok influencers in Singapore/Malaysia who are pregnant or new mums with viral videos \u2192 for each, pull followers, median views, engagement, views-per-follower, viral hits \u2192 judge fit for a maternity/baby brand, find a contact, score /10 with a verdict \u2192 return a ranked shortlist mixing big accounts and high-potential nanos.&quot;</li>\n<li><b>The honesty caveat (say it):</b> &quot;The chatbot is great for the <i>shortlist and the analysis</i> \u2014 but it <b>hallucinates follower counts and &#x27;viral&#x27; claims.</b> The real numbers come from a scraper (Apify) or an analytics tool. AI is the brains; the tool is the truth.&quot;</li>\n</ul>"}, {"region": "dk2", "badge": "25", "div": false, "title": "Find Influencers with AI \u2014 The Output", "html": "<section class=\"slide\" style=\"background:var(--teal);justify-content:center\">\n  <div class=\"kicker\" style=\"color:var(--teal-soft);position:absolute;top:58px;left:70px;right:70px\"><span class=\"dot\" style=\"background:var(--apricot)\"></span> Find Influencers with AI \u2014 The Output <span class=\"num\" style=\"color:var(--paper)\">25</span></div>\n  <div>\n    <h2 class=\"d\" style=\"font-size:46px;color:var(--paper);line-height:1.05\">\u2026and you get a vetted,<br><em style=\"color:var(--apricot);font-style:italic\">ranked</em> shortlist.</h2>\n    <div style=\"font-size:19px;color:#cfd8d4;margin-top:18px;max-width:840px;line-height:1.45\">Real numbers, a fit score and a verdict per creator \u2014 9 candidates, from a 281k account to a 120-follower nano bet.</div>\n    <a href=\"https://docs.google.com/spreadsheets/d/1grzg9l4FBkPrCInCok8hPUzE4k2xj8xdpVDbaO_5qf0/edit\" target=\"_blank\" rel=\"noopener\" style=\"display:inline-block;margin-top:28px;background:var(--apricot);color:var(--ink);border-radius:999px;padding:15px 32px;font-family:'Spline Sans Mono';font-size:14px;font-weight:600;text-decoration:none\">&#9654; Open the live shortlist \u2014 9 creators, all the data &#8599;</a>\n  </div>\n</section>", "section": "b2", "note": "<ul>\n<li><b>Walk the result:</b> &quot;And out comes a <i>ranked, vetted</i> shortlist. Look at the spread \u2014 <b>@silvyheng, 281k followers, 4.66% engagement, 11 viral hits \u2192 Priority.</b> And right at the bottom, <b>@muminpogress, 120 followers</b> \u2014 but ~100% pregnancy content \u2192 a <i>nano bet</i>. That&#x27;s the mix you want: a proven big account <i>and</i> a cheap high-potential nano.&quot;</li>\n<li><b>Why it&#x27;s trustworthy:</b> &quot;Not just follower count \u2014 <b>engagement rate, views-per-follower, viral-hit count, content fit, a business contact, and a verdict.</b> That&#x27;s the difference between &#x27;a big account&#x27; and &#x27;the <i>right</i> account.&#x27;&quot;</li>\n<li><b>Click the button:</b> open the full Google Sheet (9 creators, all columns) \u2014 <i>&quot;this took the AI minutes; by hand it&#x27;s a day.&quot;</i></li>\n</ul>"}, {"re
