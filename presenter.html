<!doctype html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SMU Day 1 — Presenter View (live)</title>
<style id="pvchrome">
  html,body{margin:0;background:#0e0c09;color:#f3efe6;font-family:'Archivo',system-ui,sans-serif;height:100%;overflow:hidden}
  *{box-sizing:border-box}
  .pv-top{display:flex;align-items:center;gap:18px;padding:8px 16px;background:#17140f;border-bottom:1px solid #2a261f;height:58px}
  .pv-top .clock{font-family:'Spline Sans Mono',monospace;font-size:26px;font-weight:600;letter-spacing:.02em}
  .pv-sec{flex:1;min-width:0}
  .pv-sec .nm{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .pv-bar{height:7px;border-radius:4px;background:#2a261f;margin-top:5px;overflow:hidden}
  .pv-bar i{display:block;height:100%;width:0;background:#2f6b5e;transition:width .3s}
  .pv-bar.over i{background:#d8442a}
  .pv-secT{font-family:'Spline Sans Mono',monospace;font-size:13px;color:#cdb8ad;white-space:nowrap}
  .pv-btn{background:#2a261f;border:1px solid #3a352c;color:#f3efe6;border-radius:7px;padding:7px 12px;font-size:13px;cursor:pointer;font-family:'Spline Sans Mono',monospace}
  .pv-btn:hover{background:#3a352c}
  .pv-count{font-family:'Spline Sans Mono',monospace;font-size:13px;color:#8c8378;white-space:nowrap}
  .pv-main{display:grid;grid-template-columns:1.05fr .95fr;gap:0;height:calc(100% - 58px - 92px)}
  .pv-left{background:#000;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;border-right:1px solid #2a261f}
  .pv-stage{width:1280px;height:720px;transform-origin:center center;flex:none;background:#f3efe6}
  /* fix: presenter chrome's light body color was overriding the deck's default ink text,
     making black slide text invisible (only explicitly-coloured words like the accent showed).
     Restore the deck's own body default (--ink) on the injected slide + thumb so inherited text is dark.
     Dark slides set their light colour explicitly (title, qslide, divider rules), so they're unaffected. */
  .pv-stage .dk1,.pv-stage .dk2,.pv-thumb .dk1,.pv-thumb .dk2{color:var(--ink,#17140f)}
  .pv-right{padding:16px 20px;overflow-y:auto}
  .pv-badge{display:inline-block;font-family:'Spline Sans Mono',monospace;font-size:12px;color:#0e0c09;background:#e8a08c;border-radius:5px;padding:3px 9px;font-weight:600}
  .pv-stitle{font-size:13px;color:#8c8378;margin:10px 0 2px;font-family:'Spline Sans Mono',monospace;text-transform:uppercase;letter-spacing:.1em}
  .pv-notes{font-size:32px;line-height:1.5}
  .pv-notes p{margin:8px 0}
  .pv-notes ul{margin:8px 0;padding-left:20px}
  .pv-notes li{margin:5px 0}
  .pv-notes b{color:#e8a08c}
  .pv-notes i{color:#cdb8ad;font-style:italic}
  .pv-empty{font-style:italic;color:#6f675b}
  .pv-next{height:92px;background:#17140f;border-top:1px solid #2a261f;display:flex;align-items:center;gap:14px;padding:8px 16px}
  .pv-nextlabel{font-family:'Spline Sans Mono',monospace;font-size:12px;color:#8c8378;writing-mode:vertical-rl;transform:rotate(180deg);text-align:center}
  .pv-thumbwrap{width:135px;height:76px;flex:none;background:#000;overflow:hidden;border-radius:5px;position:relative;border:1px solid #2a261f}
  .pv-thumb{width:1280px;height:720px;transform:scale(.10546875);transform-origin:top left;background:#f3efe6}
  .pv-nexttxt .t{font-size:15px;font-weight:600}
  .pv-nexttxt .s{font-size:12px;color:#8c8378;font-family:'Spline Sans Mono',monospace;margin-top:3px}
  .pv-brk{color:#e8a08c;font-family:'Spline Sans Mono',monospace;font-size:12px;margin-left:auto;padding-right:8px}
  kbd{background:#2a261f;border:1px solid #3a352c;border-radius:4px;padding:1px 6px;font-size:11px;font-family:'Spline Sans Mono',monospace}
  .pv-load{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;background:#0e0c09;z-index:50;text-align:center;padding:30px}
  .pv-load h2{font-family:'Spline Sans Mono',monospace;font-weight:500;font-size:16px;color:#cdb8ad;line-height:1.6}
  .pv-live{font-family:'Spline Sans Mono',monospace;font-size:11px;color:#2f6b5e;border:1px solid #2f6b5e;border-radius:5px;padding:3px 8px}
  /* audience mode (?audience=1): clean full-screen slide for the projector, no notes/chrome */
  body.audience .pv-top,body.audience .pv-right,body.audience .pv-next{display:none!important}
  body.audience .pv-main{grid-template-columns:1fr!important;height:100vh!important}
  body.audience .pv-left{border:none!important;background:#000}
  body.audience .pv-load{background:#000}
</style></head><body>
<div class="pv-load" id="load"><h2 id="loadmsg">Loading live deck + script…</h2></div>
<div class="pv-top">
  <div class="clock" id="clock">0:00</div>
  <button class="pv-btn" id="se">▶ Start</button>
  <div class="pv-sec">
    <div class="nm" id="secnm">—</div>
    <div class="pv-bar" id="secbar"><i></i></div>
  </div>
  <div class="pv-secT" id="sect">—</div>
  <button class="pv-btn" id="rs">⟲</button>
  <span class="pv-live" title="reads the live files on every load">● LIVE</span>
  <button class="pv-btn" id="rl">⟳ reload files</button>
  <button class="pv-btn" id="aud" title="Open a clean full-screen slide window to drag onto the projector — it follows this presenter">⧉ Audience screen</button>
  <div class="pv-count" id="count">—</div>
</div>
<div class="pv-main">
  <div class="pv-left"><div class="pv-stage" id="stage"></div></div>
  <div class="pv-right">
    <div><span class="pv-badge" id="badge">—</span> &nbsp;<span id="ttl" style="font-size:13px;color:#cdb8ad"></span></div>
    <div class="pv-stitle">Speaker notes</div>
    <div class="pv-notes" id="notes"></div>
  </div>
</div>
<div class="pv-next">
  <div class="pv-nextlabel">NEXT</div>
  <div class="pv-thumbwrap"><div class="pv-thumb" id="thumb"></div></div>
  <div class="pv-nexttxt"><div class="t" id="ntxt">—</div><div class="s" id="nsec"></div></div>
  <div class="pv-brk" id="brk"></div>
  <div style="margin-left:auto;color:#6f675b;font-size:12px">◀ ▶ / Space navigate · <kbd>R</kbd> reload files · <kbd>F</kbd> deck · <kbd>S</kbd> timer</div>
</div>
<script>
const DECK_URL='smu-day1-full-deck.html', SCRIPT_URL='marketing-101-course-script.md';
const $=id=>document.getElementById(id);
// ── presenter↔projector sync ──
const AUDIENCE=new URLSearchParams(location.search).has('audience');
const CH=('BroadcastChannel' in window)?new BroadcastChannel('smu-present-day1'):null;
if(AUDIENCE) document.body.classList.add('audience');

const SECTIONS=[
 ['m0','1.1 · What Marketing Actually Is',15,false],['m1','1.2 · Customer & Market',28,false],
 ['m2','1.3 · Positioning & Brand',30,false],['m3','1.4 · The Offer',27,false],
 ['m4','1.5 · Demand & Channels',30,true],['m5','1.6 · Conversion & Retention',28,false],
 ['m6','1.7 · Measurement & Growth',30,false],['cap1','1.7 · Diagnose Your Leak',20,true],
 ['b1','2.1 · Social Media',35,false],['b2','2.1 · Influencers & UGC',32,false],
 ['b3','2.1 · Content Optimisation',16,false],['a4','2.1 · Activity: Content Plan',20,true],
 ['b4','2.2 · Email Marketing',30,false],['a5','2.2 · Activity: Welcome Email',20,false],
 ['hyrox','Day 1 Capstone · HYROX',15,false]];
const SECS={}; SECTIONS.forEach(x=>SECS[x[0]]={id:x[0],name:x[1],mins:x[2],brk:x[3]});
const dk1sec=b=> b==null?null : b<=4?'m0':b<=10?'m1':b<=15?'m2':b<=17?'m3':b<=24?'m4':b<=27?'m5':b<=30?'m6':'cap1';
const dk2sec=b=> b==null?null : b<=17?'b1':b<=29?'b2':b<=37?'b3':b==38?'a4':b<=56?'b4':b==57?'a5':'hyrox';

const dec=s=>s.replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&nbsp;/g,' ');
const strip=s=>dec(s.replace(/<[^>]+>/g,' ')).replace(/\s+/g,' ').trim();
const esc=s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
function md2html(s){
  if(!s) return '<p class="pv-empty">— no scripted note for this slide; speak to what is on screen —</p>';
  s=esc(s).replace(/\*\*(.+?)\*\*/g,'<b>$1</b>').replace(/\*([^*\n]+)\*/g,'<i>$1</i>');
  const out=[]; let ul=false;
  for(const ln of s.split('\n')){ const t=ln.trim();
    if(!t){ if(ul){out.push('</ul>');ul=false;} continue; }
    if(t.startsWith('- ')){ if(!ul){out.push('<ul>');ul=true;} out.push('<li>'+t.slice(2)+'</li>'); }
    else { if(ul){out.push('</ul>');ul=false;} out.push('<p>'+t+'</p>'); } }
  if(ul)out.push('</ul>'); return out.join('\n');
}
function parseDeck(html){
  const idx=html.indexOf('<div class="dk2"'); const out=[];
  const re=/<section\b[^>]*class="([^"]*)"[^>]*>/g; let m;
  while((m=re.exec(html))){
    const cls=m[1], start=m.index, end=html.indexOf('</section>',re.lastIndex)+10;
    const sec=html.slice(start,end), region=start<idx?'dk1':'dk2', isdiv=/divider/.test(cls);
    const badge=(sec.match(/<span class="num"[^>]*>(\d+)<\/span>/)||[])[1]||null;
    const kick=sec.match(/class="kicker"[^>]*>([\s\S]*?)<span class="num/);
    const h1=sec.match(/<h1[^>]*>([\s\S]*?)<\/h1>/), h2=sec.match(/<h2[^>]*>([\s\S]*?)<\/h2>/);
    let title= isdiv ? strip(h1?h1[1]:'(divider)') : strip(kick?kick[1]:(h2?h2[1]:(h1?h1[1]:''))).replace('●','').trim();
    out.push({region,badge,div:isdiv,title,html:sec}); re.lastIndex=end;
  } return out;
}
function parseNotes(text){
  const blocks={}; let keys=null,buf=[];
  const flush=()=>{ if(keys){const b=buf.join('\n').trim(); keys.forEach(k=>blocks[k]=b);} buf=[]; };
  for(const l of text.split('\n')){
    const sm=l.match(/^\*\*Slide ([0-9–\-]+) /);
    if(sm){ flush(); const tok=sm[1].replace(/–/g,'-'); let ks=[];
      if(tok.includes('-')){const a=Number(tok.split('-')[0]),b=Number(tok.split('-')[1]); for(let n=a;n<=b;n++)ks.push('Slide '+n);} else ks=['Slide '+Number(tok)];
      keys=ks; continue; }
    if(/^# DAY 1 CAPSTONE/.test(l)){ flush(); keys=['HYROX']; continue; }
    if(/^#{1,3}\s/.test(l)){ flush(); keys=null; continue; }
    if(keys) buf.push(l);
  } flush(); return blocks;
}
function injectDeckCSS(deckHTML){
  const head=deckHTML.slice(deckHTML.indexOf('<head'), deckHTML.indexOf('</head>'));
  const blocks=head.match(/<link\b[^>]*rel=["']?stylesheet[\s\S]*?>|<style[\s\S]*?<\/style>/gi)||[];
  const anchor=$('pvchrome');
  blocks.forEach(b=>{ const t=document.createElement('div'); t.innerHTML=b; const n=t.firstChild; if(n) document.head.insertBefore(n,anchor); });
}

let S=[], i=0, t0=null, running=false, acc=0, secEnter=null, lastSec=null, cssDone=false;
let _ls1='m0',_ls2='b1';
async function load(){
  $('load').style.display='flex'; $('loadmsg').textContent='Loading live deck + script…';
  let deckHTML, scriptMD;
  try{
    [deckHTML, scriptMD]=await Promise.all([
      fetch(DECK_URL+'?'+Date.now()).then(r=>r.text()),
      fetch(SCRIPT_URL+'?'+Date.now()).then(r=>r.text())]);
  }catch(e){
    $('loadmsg').innerHTML='⚠ Could not read the files.<br><br>Open this page over a <b>server</b>, not a file:// path —<br>e.g. <b>http://localhost:8753/presenter.html</b><br>or the published GitHub Pages URL.<br><br>'+e;
    return;
  }
  if(!cssDone){ injectDeckCSS(deckHTML); cssDone=true; }
  const slides=parseDeck(deckHTML);
  const cut=scriptMD.indexOf('# SECTION 2');
  const n1=parseNotes(cut>0?scriptMD.slice(0,cut):scriptMD);
  const n2=parseNotes(cut>0?scriptMD.slice(cut):'');
  _ls1='m0'; _ls2='b1';
  S=slides.map(s=>{
    const b=s.badge?parseInt(s.badge):null; let sec, note;
    if(s.region==='dk1'){ sec=dk1sec(b)||_ls1; note=b?n1['Slide '+b]:''; _ls1=sec; }
    else { sec=dk2sec(b)||_ls2; note=b?(n2['Slide '+b]||(b===58?n2['HYROX']:'')):''; _ls2=sec; }
    return {region:s.region,badge:s.badge,div:s.div,title:s.title,html:s.html,section:sec,note:md2html(note||'')};
  });
  i=Math.min(i,S.length-1); $('load').style.display='none'; render();
}
function fit(){ const L=$('stage').parentElement,p=24; const s=Math.min((L.clientWidth-p)/1280,(L.clientHeight-p)/720); $('stage').style.transform='scale('+s+')'; }
function render(_bcast){
  if(!S.length) return; const r=S[i];
  $('stage').innerHTML='<div class="'+r.region+'" style="width:1280px;height:720px">'+r.html+'</div>';
  $('badge').textContent=r.div?'DIVIDER':('#'+(r.badge||'—'));
  $('ttl').textContent=r.title; $('notes').innerHTML=r.note;
  const sec=SECS[r.section]||{name:'—',mins:0};
  $('secnm').textContent=sec.name+'  ·  '+sec.mins+'m budget';
  $('count').textContent=(i+1)+' / '+S.length;
  const n=S[i+1];
  if(n){ $('thumb').innerHTML='<div class="'+n.region+'" style="width:1280px;height:720px">'+n.html+'</div>';
    $('ntxt').textContent=(n.div?'▸ ':'#'+(n.badge||'')+'  ')+n.title; $('nsec').textContent=(SECS[n.section]||{}).name||''; }
  else{ $('thumb').innerHTML=''; $('ntxt').textContent='— end of deck —'; $('nsec').textContent=''; }
  $('brk').textContent=sec.brk?'⏸ break after this section':'';
  fit();
  if(CH && _bcast!==false && !AUDIENCE) CH.postMessage({idx:i});
}
function go(d){ i=Math.max(0,Math.min(S.length-1,i+d)); render(); }
const fmt=ms=>{const s=Math.floor(ms/1000),m=Math.floor(s/60);return m+':'+String(s%60).padStart(2,'0');};
setInterval(()=>{
  if(!S.length) return;
  if(running){ $('clock').textContent=fmt(acc+(Date.now()-t0)); }
  if(S[i].section!==lastSec){ lastSec=S[i].section; secEnter=Date.now(); }
  const sec=SECS[S[i].section]; if(sec){ if(secEnter==null)secEnter=Date.now();
    const sp=(Date.now()-secEnter)/1000, pct=Math.min(100,sp/(sec.mins*60)*100);
    $('secbar').querySelector('i').style.width=pct+'%'; $('secbar').classList.toggle('over',sp>sec.mins*60);
    $('sect').textContent=Math.floor(sp/60)+':'+String(Math.floor(sp%60)).padStart(2,'0')+' / '+sec.mins+':00'; }
},250);
$('se').onclick=()=>{ if(running){acc+=Date.now()-t0;running=false;$('se').textContent='▶ Resume';} else {t0=Date.now();running=true;$('se').textContent='⏸ Pause';} };
$('rs').onclick=()=>{ acc=0;running=false;t0=null;$('se').textContent='▶ Start';$('clock').textContent='0:00';secEnter=Date.now(); };
$('rl').onclick=load;
$('aud').onclick=()=>{ window.open(location.pathname+'?audience=1','smu-audience','width=1280,height=740'); if(CH) setTimeout(()=>CH.postMessage({idx:i}),1200); };
if(CH){ CH.onmessage=e=>{ const d=e.data||{};
  if(d.req){ if(!AUDIENCE && S.length) CH.postMessage({idx:i}); return; }
  if(d.idx!=null && d.idx!==i){ i=d.idx; render(false); } };
  if(AUDIENCE){ let n=0,t=setInterval(()=>{ CH.postMessage({req:1}); if(++n>6)clearInterval(t); },500); } }
addEventListener('keydown',e=>{
  if(AUDIENCE) return;
  if(e.key==='ArrowRight'||e.key===' '||e.key==='ArrowDown'){e.preventDefault();go(1);}
  else if(e.key==='ArrowLeft'||e.key==='ArrowUp'){e.preventDefault();go(-1);}
  else if(e.key.toLowerCase()==='s')$('se').click();
  else if(e.key.toLowerCase()==='r')load();
  else if(e.key.toLowerCase()==='f')window.open(DECK_URL,'_blank');
});
addEventListener('resize',fit);
load();
</script></body></html>
