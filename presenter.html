<!doctype html><html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SMU Day 1 — Presenter View</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=Archivo:wght@400;500;600;700&family=Spline+Sans+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
    --paper:#f3efe6; --paper-2:#ece5d6;
    --ink:#17140f; --ink-soft:#6a6253;
    --accent:#d8442a; --proof:#2f6b5e; --exec:#b07a1e;
    --teal:#234b43; --teal-soft:#9ec7bd; --apricot:#e8a08c;
    --line:rgba(23,20,15,.16); --line-2:rgba(23,20,15,.30);
  }
*{box-sizing:border-box;margin:0;padding:0}
html{font-size:17px}
html,body{background:#2a2620}
body{font-family:'Archivo',sans-serif;color:var(--ink);font-size:1rem;
    display:flex;flex-direction:column;align-items:center;gap:30px;padding:40px 20px}
img{display:block;max-width:100%}
@keyframes spin{to{transform:rotate(360deg)}}
.dk1,.dk2{display:contents}
/* ===== Section 1 — Marketing 101 (scoped .dk1) ===== */
.dk1 .slide{position:relative;width:1280px;height:720px;background:var(--paper);
    overflow:hidden;box-shadow:0 28px 64px -28px rgba(0,0,0,.7);
    padding:58px 70px;display:flex;flex-direction:column}
.dk1 .slide::after{content:"";position:absolute;inset:0;pointer-events:none;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix type='saturate' values='0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.4'/></svg>");
    opacity:.05;mix-blend-mode:multiply}
.dk1 .slide>*{position:relative;z-index:1}
.dk1 .kicker{font-family:'Spline Sans Mono',monospace;font-size:13px;letter-spacing:.3em;
    text-transform:uppercase;color:var(--ink-soft);display:flex;align-items:center;gap:13px}
.dk1 .kicker .dot{width:7px;height:7px;border-radius:50%;background:var(--accent)}
.dk1 .kicker .num{margin-left:auto;color:var(--ink)}
.dk1 .rule{height:1px;background:var(--line);width:100%;margin:16px 0 0}
.dk1 h1.d{font-family:'Fraunces',serif;font-weight:560;line-height:1.0;letter-spacing:-.015em;font-optical-sizing:auto}
.dk1 h2.d{font-family:'Fraunces',serif;font-weight:540;line-height:1.05;letter-spacing:-.01em}
.dk1 .lead{font-size:19px;color:var(--ink-soft);line-height:1.4;max-width:900px}
.dk1 .center{flex:1;display:flex;flex-direction:column;justify-content:center}
.dk1 .accent{color:var(--accent)}
.dk1 em.i{color:var(--accent);font-style:italic;font-weight:430}
.dk1 .flow{display:grid;gap:0;margin-top:26px}
.dk1 .flow.c5{grid-template-columns:repeat(5,1fr)}
.dk1 .step{padding:20px 18px 18px 0;position:relative}
.dk1 .flow .step:not(:last-child)::after{content:"→";position:absolute;right:10px;top:22px;color:var(--accent);font-size:18px}
.dk1 .step .lab{font-family:'Spline Sans Mono';font-size:11px;letter-spacing:.14em;color:var(--ink-soft);margin-bottom:8px}
.dk1 .step .big{font-family:'Fraunces',serif;font-size:21px;line-height:1.12;font-weight:480}
.dk1 .band{margin-top:10px;height:3px;width:32px;border-radius:2px}
.dk1 .b1{background:var(--accent)}
.dk1 .b2{background:var(--exec)}
.dk1 .b3{background:var(--proof)}
.dk1 .duo{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-top:auto;margin-bottom:auto}
.dk1 .pane{border-radius:5px;padding:30px 32px;min-height:300px;display:flex;flex-direction:column}
.dk1 .pane .pl{font-family:'Spline Sans Mono';font-size:12px;letter-spacing:.22em;text-transform:uppercase;margin-bottom:16px}
.dk1 .pane .ph{font-family:'Fraunces';font-size:30px;font-weight:540;line-height:1.08}
.dk1 .pane .pd{font-size:17px;margin-top:14px;line-height:1.4;color:var(--ink-soft)}
.dk1 .pane.a{background:#fff;border:1px solid rgba(216,68,42,.4)}
.dk1 .pane.a .pl{color:var(--accent)}
.dk1 .pane.b{background:var(--ink);color:var(--paper)}
.dk1 .pane.b .pl{color:#c9a89c}
.dk1 .pane.b .pd{color:#b8b0a0}
.dk1 .pane.g{background:var(--paper-2);border:1px solid var(--line)}
.dk1 .pane.g .pl{color:var(--proof)}
.dk1 .takeaway{margin-top:auto;background:var(--ink);color:var(--paper);border-radius:5px;padding:22px 28px;
    font-family:'Fraunces',serif;font-size:24px;font-weight:470;line-height:1.25}
.dk1 .takeaway b{color:var(--apricot);font-weight:560}
.dk1 /* TITLE */
  .title{justify-content:center;background:var(--ink)}
.dk1 .title::after{opacity:.08}
.dk1 .title *{color:var(--paper)}
.dk1 .title .eyebrow{font-family:'Spline Sans Mono';font-size:15px;letter-spacing:.34em;color:#c9a89c;text-transform:uppercase}
.dk1 .title h1{font-family:'Fraunces',serif;font-size:96px;font-weight:560;line-height:.98;margin-top:24px;letter-spacing:-.02em}
.dk1 .title .sub{font-size:22px;color:#b8b0a0;margin-top:26px;max-width:740px;line-height:1.4}
.dk1 .title .foot{margin-top:42px;font-family:'Spline Sans Mono';font-size:14px;letter-spacing:.1em;color:#8a8273}
.dk1 /* QUESTION / DISCUSSION slides — distinct teal background */
  .qslide{background:var(--teal);justify-content:flex-start}
.dk1 .qslide::after{opacity:.07}
.dk1 .qslide *{color:var(--paper)}
.dk1 .qslide .kicker{color:var(--teal-soft)}
.dk1 .qslide .kicker .dot{background:var(--apricot)}
.dk1 .qslide .kicker .num{color:var(--paper)}
.dk1 .qslide .rule{background:rgba(243,239,230,.22)}
.dk1 .qslide .qbody{flex:1;display:flex;flex-direction:column;justify-content:center}
.dk1 .qslide .qmark{font-family:'Fraunces';font-size:90px;line-height:.8;color:var(--apricot);font-weight:560;margin-bottom:14px}
.dk1 .qslide h1{font-family:'Fraunces';font-size:48px;font-weight:560;line-height:1.08;max-width:1000px}
.dk1 .qslide ol{margin:26px 0 0 24px;font-size:19px;line-height:1.7;color:#dfe9e4}
.dk1 .qslide ol b{color:#fff;font-weight:600}
.dk1 .qslide .time{margin-top:26px;font-family:'Spline Sans Mono';font-size:14px;letter-spacing:.08em;color:var(--teal-soft)}
.dk1 /* ORBIT */
  .two{display:grid;grid-template-columns:1fr 1.05fr;gap:36px;flex:1;align-items:center;margin-top:6px}
.dk1 .orbit{position:relative;width:440px;height:440px;margin:0 auto}
.dk1 .ring{position:absolute;border-radius:50%;border:1px dashed var(--line-2);inset:54px}
.dk1 .ring.r2{inset:4px;border-style:dotted;opacity:.5;animation:spin 90s linear infinite}
.dk1 .core{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:160px;height:160px;border-radius:50%;
    background:var(--accent);color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;
    box-shadow:0 16px 32px -12px rgba(216,68,42,.7)}
.dk1 .core .l{font-family:'Spline Sans Mono';font-size:10px;letter-spacing:.24em;opacity:.85;margin-bottom:4px}
.dk1 .core .w{font-family:'Fraunces';font-size:32px;font-weight:560}
.dk1 .chip{position:absolute;top:50%;left:50%;background:var(--paper);border:1px solid var(--line-2);
    padding:8px 14px;border-radius:999px;font-size:15px;font-weight:500;white-space:nowrap;box-shadow:0 6px 14px -8px rgba(0,0,0,.4)}
.dk1 .cN{transform:translate(-50%,-50%) translateY(-188px)}
.dk1 .cE{transform:translate(-50%,-50%) translateX(150px) translateY(-64px)}
.dk1 .cS{transform:translate(-50%,-50%) translateX(136px) translateY(88px)}
.dk1 .cW{transform:translate(-50%,-50%) translateX(-150px) translateY(72px)}
.dk1 .def{margin-top:18px}
.dk1 .def .t{font-family:'Spline Sans Mono';font-size:12px;letter-spacing:.24em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:6px}
.dk1 .def.p .t{color:var(--accent)}
.dk1 .def .dd{font-family:'Fraunces';font-size:25px;font-weight:430;line-height:1.18}
.dk1 .stack{display:flex;flex-direction:column;gap:12px;margin-top:24px}
.dk1 .layer{display:grid;grid-template-columns:180px 1fr;gap:24px;align-items:center;border:1px solid var(--line-2);border-radius:5px;padding:18px 24px}
.dk1 .layer .verb{font-family:'Spline Sans Mono';font-size:11px;letter-spacing:.2em;color:var(--accent)}
.dk1 .layer .name{font-family:'Fraunces';font-size:26px;font-weight:560;line-height:1}
.dk1 .layer .what{font-family:'Fraunces';font-size:20px;font-weight:430;line-height:1.2}
.dk1 .layer .eg{font-size:16px;color:var(--ink-soft);margin-top:6px}
.dk1 .l1{background:linear-gradient(90deg,rgba(216,68,42,.08),transparent)}
.dk1 .l1 .name{color:var(--accent)}
.dk1 .l2{background:linear-gradient(90deg,rgba(176,122,30,.09),transparent)}
.dk1 .l2 .name{color:var(--exec)}
.dk1 .l3{background:linear-gradient(90deg,rgba(47,107,94,.09),transparent)}
.dk1 .l3 .name{color:var(--proof)}
.dk1 .moves{display:flex;flex-direction:column;gap:0;margin-top:18px}
.dk1 .move{display:grid;grid-template-columns:50px 1fr;gap:20px;align-items:baseline;padding:14px 0;border-top:1px solid var(--line)}
.dk1 .move .mvn{font-family:'Fraunces';font-size:30px;font-weight:560;color:var(--accent);line-height:1}
.dk1 .move .mvt{font-family:'Fraunces';font-size:24px;font-weight:540;line-height:1.08}
.dk1 .move .mvd{font-size:16px;color:var(--ink-soft);margin-top:4px;line-height:1.3}
.dk1 .move .mvtag{font-family:'Spline Sans Mono';font-size:10px;letter-spacing:.06em;color:var(--accent);margin-left:10px;white-space:nowrap}
.dk1 .ucm{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:24px;flex:1;align-content:center}
.dk1 .cell{border:1px solid var(--line-2);border-radius:5px;padding:18px 18px;background:#fff}
.dk1 .cell.w{grid-column:span 2}
.dk1 .cell .cl{font-family:'Spline Sans Mono';font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);margin-bottom:7px}
.dk1 .cell .cv{font-size:17px;line-height:1.3}
.dk1 .vpc{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-top:24px;flex:1;align-items:center}
.dk1 .vside{border:1px solid var(--line-2);border-radius:8px;padding:26px 28px;min-height:320px;display:flex;flex-direction:column}
.dk1 .vside.sq{background:var(--paper-2)}
.dk1 .vside.ci{background:#fff;border-radius:200px 8px 8px 200px}
.dk1 .vside .vh{font-family:'Fraunces';font-size:24px;font-weight:560;margin-bottom:16px}
.dk1 .vside.sq .vh{color:var(--accent)}
.dk1 .vside.ci .vh{color:var(--proof)}
.dk1 .vside ul{list-style:none;display:flex;flex-direction:column;gap:12px}
.dk1 .vside li{font-size:17px;line-height:1.3;padding-left:18px;position:relative}
.dk1 .vside li::before{content:"";position:absolute;left:0;top:9px;width:7px;height:7px;border-radius:50%;background:var(--ink-soft)}
.dk1 .vside .lab{font-family:'Spline Sans Mono';font-size:11px;letter-spacing:.12em;color:var(--ink-soft);text-transform:uppercase}
.dk1 .funnel{display:flex;flex-direction:column;gap:8px;margin-top:22px;align-items:center}
.dk1 .frow{display:flex;align-items:center;gap:22px;width:100%}
.dk1 .fbar{border-radius:6px;padding:16px 24px;color:#fff;display:flex;justify-content:space-between;align-items:center}
.dk1 .fbar .fn{font-family:'Fraunces';font-size:22px;font-weight:560}
.dk1 .fbar .fg{font-size:15px;opacity:.9}
.dk1 .f1{background:#caa46e;width:100%}
.dk1 .f2{background:#b07a1e;width:84%}
.dk1 .f3{background:#9a5a2a;width:64%}
.dk1 .f4{background:var(--proof);width:46%}
.dk1 .fch{font-size:15px;color:var(--ink-soft);white-space:nowrap}
.dk1 .triad{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:18px}
.dk1 .tri{border:1px solid var(--line-2);border-radius:5px;padding:16px 18px}
.dk1 .tri .th{font-family:'Fraunces';font-size:20px;font-weight:540}
.dk1 .tri .td{font-size:15px;color:var(--ink-soft);margin-top:5px;line-height:1.3}
.dk1 .fly{display:flex;align-items:center;justify-content:center;gap:18px;margin-top:30px;flex-wrap:wrap}
.dk1 .node{background:#fff;border:1px solid var(--line-2);border-radius:999px;padding:18px 30px;font-family:'Fraunces';font-size:23px;font-weight:540}
.dk1 .node.k{background:var(--accent);color:#fff;border-color:var(--accent)}
.dk1 .fly .ar{color:var(--accent);font-size:26px}
.dk1 .mmap{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-top:22px}
.dk1 .mcell{background:var(--paper-2);border:1px solid var(--line);border-radius:5px;padding:14px}
.dk1 .mcell .ms{font-family:'Spline Sans Mono';font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-soft)}
.dk1 .mcell .mm{font-family:'Fraunces';font-size:18px;font-weight:540;margin-top:6px;line-height:1.1}
.dk1 .nums{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-top:18px}
.dk1 .nt{border:1px solid var(--line-2);border-radius:5px;padding:16px 18px}
.dk1 .nt .nk{font-family:'Spline Sans Mono';font-size:12px;letter-spacing:.08em;color:var(--accent)}
.dk1 .nt .nv{font-family:'Fraunces';font-size:19px;font-weight:540;margin-top:6px;line-height:1.15}
.dk1 .leaks{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-top:auto;margin-bottom:24px}
.dk1 .leak{border:1px solid var(--line-2);border-radius:6px;padding:24px 22px;min-height:210px;display:flex;flex-direction:column}
.dk1 .leak .ln{font-family:'Spline Sans Mono';font-size:12px;color:var(--ink-soft);letter-spacing:.14em}
.dk1 .leak .lt{font-family:'Fraunces';font-size:26px;font-weight:560;margin-top:10px;line-height:1.05}
.dk1 .leak .ld{font-size:16px;color:var(--ink-soft);margin-top:10px;line-height:1.35}
.dk1 .leak .lf{margin-top:auto;font-family:'Spline Sans Mono';font-size:11px;letter-spacing:.1em;color:var(--accent);padding-top:14px}
.dk1 /* demand demo (create vs capture, .dk1 equal hierarchy with visuals) */
  .demo{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-top:14px}
.dk1 .dcol{border:1px solid var(--line-2);border-radius:8px;padding:18px 22px;display:flex;flex-direction:column;background:#fff}
.dk1 .dcol .dlabel{font-family:'Spline Sans Mono';font-size:13px;letter-spacing:.16em;text-transform:uppercase;margin-bottom:12px}
.dk1 .dcol.create .dlabel{color:var(--accent)}
.dk1 .dcol.capture .dlabel{color:var(--proof)}
.dk1 .dcol .dimg{display:flex;align-items:center;justify-content:center;background:var(--paper-2);border-radius:6px;overflow:hidden;height:150px;border:1px solid var(--line)}
.dk1 .dcol.create .dimg img{max-width:74%;max-height:104px;object-fit:contain}
.dk1 .dcol.capture .dimg img{width:100%;height:100%;object-fit:cover;object-position:top left}
.dk1 .dcol .dbrand{font-family:'Fraunces';font-size:22px;font-weight:560;margin-top:16px}
.dk1 .dcol .dtext{font-size:15.5px;color:var(--ink-soft);margin-top:6px;line-height:1.35}
.dk1 /* JTBD milkshake — 4 components */
  .jtbd{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:18px}
.dk1 .jcard{border:1px solid var(--line-2);border-radius:6px;padding:18px 22px;background:#fff}
.dk1 .jcard.jcore{background:linear-gradient(120deg,rgba(216,68,42,.10),rgba(216,68,42,0));border-color:rgba(216,68,42,.45)}
.dk1 .jcard .jl{font-family:'Spline Sans Mono';font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:7px}
.dk1 .jcard.jcore .jl{color:var(--accent)}
.dk1 .jcard .jv{font-size:17px;line-height:1.3}
.dk1 .jcard.jcore .jv{font-family:'Fraunces';font-size:20px;font-weight:540;line-height:1.2;color:var(--ink)}
.dk1 /* Red Bull gallery */
  .gallery{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-top:24px;flex:1;align-content:center}
.dk1 .gtile{display:flex;flex-direction:column}
.dk1 .gtile img{width:100%;height:210px;object-fit:cover;border-radius:6px;border:1px solid var(--line-2);background:var(--paper-2)}
.dk1 .gtile .gc{font-family:'Spline Sans Mono';font-size:11px;letter-spacing:.1em;color:var(--accent);margin-top:11px;text-transform:uppercase}
.dk1 .gtile .gn{font-family:'Fraunces';font-size:18px;font-weight:540;margin-top:3px;line-height:1.1}
.dk1 /* embedded video */
  .vid{display:grid;grid-template-columns:1.45fr 1fr;gap:38px;align-items:center;flex:1;margin-top:6px}
.dk1 .vid .frame{position:relative;width:100%;aspect-ratio:16/9;border-radius:8px;overflow:hidden;border:1px solid var(--line-2);box-shadow:0 18px 40px -20px rgba(0,0,0,.5)}
.dk1 .vid .frame iframe{position:absolute;inset:0;width:100%;height:100%;border:0}
.dk1 .vid .vbig{font-family:'Fraunces';font-size:52px;font-weight:560;line-height:1.0}
.dk1 .vid .vsm{font-size:18px;color:var(--ink-soft);margin-top:16px;line-height:1.4}
/* ===== Section 2 — Channels & Social (scoped .dk2) ===== */
.dk2 .slide{position:relative;width:1280px;height:720px;background:var(--paper);
    overflow:hidden;box-shadow:0 28px 64px -28px rgba(0,0,0,.7);
    padding:52px 64px;display:flex;flex-direction:column}
.dk2 .slide::after{content:"";position:absolute;inset:0;pointer-events:none;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='160' height='160'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix type='saturate' values='0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.4'/></svg>");
    opacity:.05;mix-blend-mode:multiply}
.dk2 .slide>*{position:relative;z-index:1}
.dk2 .kicker{font-family:'Spline Sans Mono',monospace;font-size:12.5px;letter-spacing:.28em;
    text-transform:uppercase;color:var(--ink-soft);display:flex;align-items:center;gap:13px}
.dk2 .kicker .dot{width:7px;height:7px;border-radius:50%;background:var(--accent)}
.dk2 .kicker .num{margin-left:auto;color:var(--ink)}
.dk2 .rule{height:1px;background:var(--line);width:100%;margin:14px 0 0}
.dk2 h1.d{font-family:'Fraunces',serif;font-weight:560;line-height:1.0;letter-spacing:-.015em;font-optical-sizing:auto}
.dk2 h2.d{font-family:'Fraunces',serif;font-weight:540;line-height:1.05;letter-spacing:-.01em}
.dk2 .sub2{font-family:'Spline Sans Mono';font-size:13px;letter-spacing:.12em;text-transform:uppercase;color:var(--exec);margin-top:8px}
.dk2 .lead{font-size:19px;color:var(--ink-soft);line-height:1.4;max-width:980px}
.dk2 .center{flex:1;display:flex;flex-direction:column;justify-content:center}
.dk2 .accent{color:var(--accent)}
.dk2 em.i{color:var(--accent);font-style:italic;font-weight:430}
.dk2 b.hl{background:var(--proof);color:#fff;padding:0 6px;border-radius:3px;font-weight:600}
.dk2 .takeaway{margin-top:auto;background:var(--ink);color:var(--paper);border-radius:5px;padding:18px 26px;
    font-family:'Fraunces',serif;font-size:22px;font-weight:470;line-height:1.25}
.dk2 .takeaway b{color:var(--apricot);font-weight:560}
.dk2 /* DIVIDER */
  .divider{justify-content:center;background:var(--ink)}
.dk2 .divider::after{opacity:.08}
.dk2 .divider *{color:var(--paper)}
.dk2 .divider .eyebrow{font-family:'Spline Sans Mono';font-size:14px;letter-spacing:.32em;color:#c9a89c;text-transform:uppercase}
.dk2 .divider h1{font-family:'Fraunces',serif;font-size:76px;font-weight:560;line-height:1.0;margin-top:20px;letter-spacing:-.02em}
.dk2 .divider .dsub{font-size:20px;color:#b8b0a0;margin-top:22px;max-width:760px;line-height:1.4}
.dk2 .divider .dtag{position:absolute;top:52px;right:64px;z-index:2;font-family:'Spline Sans Mono';font-size:12px;letter-spacing:.2em;color:#8a8273;text-transform:uppercase}
.dk2 .divider .dbn{font-family:'Spline Sans Mono';font-size:118px;font-weight:600;color:rgba(232,160,140,.16);position:absolute;bottom:20px;right:64px;z-index:1;line-height:.8}
.dk2 .divider.t{background:var(--teal)}
.dk2 .divider.t .eyebrow{color:var(--teal-soft)}

<script>
const DATA = {"slides": [{"region": "dk1", "badge": "01", "div": false, "title": "Module 0 \u2014 Hook", "html": "<section class=\"slide title\">\n  <div class=\"eyebrow\">SMU Academy \u00b7 Day 1</div>\n  <h1 class=\"d\" style=\"font-size:58px\">Content Creation, Digital Marketing<br>and the Use of Gen AI</h1>\n  <div class=\"sub\">How marketing actually works for a small business \u2014 the whole picture, in six short modules, with Gen AI doing the heavy lifting.</div>\n  <div class=\"foot\">Novastacks AI \u00b7 for SMU Academy</div>\n</section>", "section": "m0", "note": "<p><b>Lecturer script:</b> &quot;Before we start \u2014 in one word, what is marketing?&quot; (Take answers; you&#x27;ll get <i>ads, posting, logo, social media</i>.) &quot;Hold that thought. Those are <i>tactics</i>. None of them is what marketing <b>is</b> \u2014 and confusing the two is why most marketing budgets leak.&quot;</p>\n<p><b>On the slide:</b> <i>&quot;Marketing \u2260 ads. Marketing \u2260 posting.&quot;</i></p>\n<p><b>Image:</b> a messy wall of social/ad icons (conceptual) \u2014 to be replaced by clarity next page.</p>"}, {"region": "dk1", "badge": "01", "div": false, "title": "Module 0 \u2014 Hook", "html": "<section class=\"slide qslide\">\n  <div class=\"kicker\"><span class=\"dot\"></span> Module 0 \u2014 Hook <span class=\"num\">01</span></div>\n  <div class=\"rule\"></div>\n  <div class=\"qbody\">\n    <div class=\"qmark\">Q.</div>\n    <h1 class=\"d\">In one word \u2014 what is marketing?</h1>\n  </div>\n</section>", "section": "m0", "note": "<p><b>Lecturer script:</b> &quot;Before we start \u2014 in one word, what is marketing?&quot; (Take answers; you&#x27;ll get <i>ads, posting, logo, social media</i>.) &quot;Hold that thought. Those are <i>tactics</i>. None of them is what marketing <b>is</b> \u2014 and confusing the two is why most marketing budgets leak.&quot;</p>\n<p><b>On the slide:</b> <i>&quot;Marketing \u2260 ads. Marketing \u2260 posting.&quot;</i></p>\n<p><b>Image:</b> a messy wall of social/ad icons (conceptual) \u2014 to be replaced by clarity next page.</p>"}, {"region": "dk1", "badge": "02", "div": false, "title": "Module 0 \u2014 What Marketing Actually Is", "html": "<section class=\"slide\">\n  <div class=\"kicker\"><span class=\"dot\"></span> Module 0 \u2014 What Marketing Actually Is <span class=\"num\">02</span></div>\n  <div class=\"rule\"></div>\n  <h1 class=\"d\" style=\"font-size:56px;margin-top:18px\">Marketing = create <em class=\"i\">demand</em>,<br>then capture it.</h1>\n  <div class=\"lead\" style=\"margin-top:16px\">Getting the right people to choose you, again and again, at a profit. Most owners think marketing means ads or posting. It is bigger than that.</div>\n  <div class=\"flow c5\">\n    <div class=\"step\"><div class=\"lab\">WHO FOR</div><div class=\"big\">Who is it for?</div><div class=\"band b1\"></div></div>\n    <div class=\"step\"><div class=\"lab\">WHY YOU</div><div class=\"big\">Why you?</div><div class=\"band b1\"></div></div>\n    <div class=\"step\"><div class=\"lab\">THE OFFER</div><div class=\"big\">What, at what price?</div><div class=\"band b1\"></div></div>\n    <div class=\"step\"><div class=\"lab\">DEMAND</div><div class=\"big\">How do they find you?</div><div class=\"band b2\"></div></div>\n    <div class=\"step\"><div class=\"lab\">PROOF</div><div class=\"big\">Did it work?</div><div class=\"band b3\"></div></div>\n  </div>\n</section>", "section": "m0", "note": "<p><b>Lecturer script:</b> &quot;Marketing does two jobs. <b>Create demand</b> \u2014 make people <i>want</i> something they weren&#x27;t searching for. And <b>capture demand</b> \u2014 be there when they&#x27;re already looking. You need both. Capture has a hard ceiling: if 500 people search for your thing a month, you can&#x27;t capture 501. Creation is how you grow the market itself.&quot;</p>\n<p><b>On the slide:</b> the spine \u2014 <b>Who for? \u2192 Why you? \u2192 What + at what price? \u2192 How do they find &amp; choose you? \u2192 Did it work?</b> + a demand-creation\u2194capture arrow</p>\n<p><b>Example:</b> <b>Red Bull vs Google Search.</b> Red Bull <i>creates</i> demand \u2014 events, stunts, stories (&quot;story over product, proof over claims, series over one-off&quot;); you weren&#x27;t searching for an energy drink. Google Search/SEO <i>captures</i> demand \u2014 it&#x27;s there the moment you type &quot;buy running shoes.&quot; _(source: research \u2014 Warmly/Kalungi demand-gen vs capture; Red Bull system)_</p>\n<p>).&quot;</p>"}, {"region": "dk1", "badge": "03", "div": false, "title": "Module 0 \u2014 Example", "html": "<section class=\"slide\">\n  <div class=\"kicker\"><span class=\"dot\"></span> Module 0 \u2014 Example <span class=\"num\">03</span></div>\n  <div class=\"rule\"></div>\n  <h2 class=\"d\" style=\"font-size:40px;margin-top:14px\">Create demand. And capture demand.</h2>\n  <div class=\"demo\">\n    <div class=\"dcol create\">\n      <div class=\"dlabel\">\u25c6 Create demand</div>\n      <a class=\"dimg\" href=\"https://www.instagram.com/reel/DYAOQBoN0q2/\" target=\"_blank\" rel=\"noopener\" title=\"Watch the Red Bull reel on Instagram\"><img src=\"_assets/redbull-logo.png\" alt=\"Red Bull logo\"></a>\n      <div class=\"dbrand\">Red Bull <a href=\"https://www.instagram.com/reel/DYAOQBoN0q2/\" target=\"_blank\" rel=\"noopener\" style=\"font-size:14px;font-weight:600;color:var(--accent);text-decoration:none\">\u25b6 Watch reel</a></div>\n      <div class=\"dtext\">Makes events, stunts, and videos people seek out. You weren't looking for an energy drink. They made you want one.</div>\n    </div>\n    <div class=\"dcol capture\">\n      <div class=\"dlabel\">\u25cf Capture demand</div>\n      <div class=\"dimg\"><img src=\"_assets/google-search.jpg\" alt=\"Google search results for buy running shoes\"></div>\n      <div class=\"dbrand\">Google Search</div>\n      <div class=\"dtext\">Shows up the moment you search \"buy running shoes.\" It captures demand that already exists. It can't create new demand.</div>\n    </div>\n  </div>\n  <div class=\"takeaway\">Most small businesses <b>only capture</b> demand, then wonder why growth stalls.</div>\n</section>", "section": "m0", "note": "<p><b>Lecturer script:</b> &quot;Marketing does two jobs. <b>Create demand</b> \u2014 make people <i>want</i> something they weren&#x27;t searching for. And <b>capture demand</b> \u2014 be there when they&#x27;re already looking. You need both. Capture has a hard ceiling: if 500 people search for your thing a month, you can&#x27;t capture 501. Creation is how you grow the market itself.&quot;</p>\n<p><b>On the slide:</b> the spine \u2014 <b>Who for? \u2192 Why you? \u2192 What + at what price? \u2192 How do they find &amp; choose you? \u2192 Did it work?</b> + a demand-creation\u2194capture arrow</p>\n<p><b>Example:</b> <b>Red Bull vs Google Search.</b> Red Bull <i>creates</i> demand \u2014 events, stunts, stories (&quot;story over product, proof over claims, series over one-off&quot;); you weren&#x27;t searching for an energy drink. Google Search/SEO <i>captures</i> demand \u2014 it&#x27;s there the moment you type &quot;buy running shoes.&quot; _(source: research \u2014 Warmly/Kalungi demand-gen vs capture; Red Bull system)_</p>\n<p>).&quot;</p>"}, {"region": "dk1", "badge": "04", "div": false, "title": "Module 0 \u2014 Red Bull In The Wild", "html": "<section class=\"slide\">\n  <div class=\"kicker\"><span class=\"dot\"></span> Module 0 \u2014 Red Bull In The Wild <span class=\"num\">04</span></div>\n  <div class=\"rule\"></div>\n  <h2 class=\"d\" style=\"font-size:38px;margin-top:12px\">Red Bull sells cans by making <em class=\"i\">media</em>.</h2>\n  <div class=\"gallery\">\n    <div class=\"gtile\"><img src=\"_assets/redbull-f1.jpg\" alt=\"Red Bull Racing F1 car\"><div class=\"gc\">Sponsorship</div><div class=\"gn\">A Formula 1 team</div></div>\n    <div class=\"gtile\"><img src=\"_assets/redbull-stratos.jpg\" alt=\"Red Bull Stratos balloon ascent\"><div class=\"gc\">Stunt</div><div class=\"gn\">The Stratos space jump</div></div>\n    <div class=\"gtile\"><img src=\"_assets/redbull-airrace.jpg\" alt=\"Red Bull Air Race plane\"><div class=\"gc\">Owned event</div><div class=\"gn\">The Air Race series</div></div>\n    <div class=\"gtile\"><img src=\"_assets/redbull-cans.jpg\" alt=\"Red Bull cans\"><div class=\"gc\">The product</div><div class=\"gn\">What it's all selling</div></div>\n  </div>\n</section>", "section": "m0", "note": "<p><b>Exercise (think\u2013pair\u2013share):</b> &quot;On a sticky note: is your business mostly <i>creating</i> or <i>capturing</i> demand right now? Where&#x27;s the imbalance \u2014 are you only capturing (waiting to be found) or only creating (lots of noise, no conversion)?&quot; Pair up, 2 min, then 3 hands.</p>\n<p><b>Debrief takeaway:</b> &quot;Most small businesses <i>only capture</i> and wonder why they plateau. The rest of today is the system that fixes that.&quot;</p>\n<p><b>Image:</b> split-scene \u2014 a stadium event (create) vs a search bar (capture).</p>\n<p>---</p>"}, {"region": "dk1", "badge": "05", "div": false, "title": "Module 1 \u2014 Jobs To Be Done", "html": "<section class=\"slide\">\n  <div class=\"kicker\"><span class=\"dot\"></span> Module 1 \u2014 Jobs To Be Done <span class=\"num\">05</span></div>\n  <div class=\"rule\"></div>\n  <h2 class=\"d\" style=\"font-size:36px;margin-top:12px\">What is a <em class=\"i\">\"Job to be Done\"</em>?</h2>\n  <div class=\"lead\" style=\"margin-top:10px\">Customers don't really want your product. They \"hire\" it to make progress on something in their life. That progress is the job \u2014 and marketing's role is to connect what you sell to it.</div>\n  <div style=\"flex:1;display:flex;align-items:center;justify-content:center;margin:8px 0\">\n    <img src=\"_assets/jtbd-role-of-marketing.jpeg\" alt=\"The role of marketing \u2014 connecting Product to Customer through their Jobs to be Done\" style=\"max-height:330px;width:auto;border:1px solid var(--line-2);border-radius:8px;background:#fff;padding:14px 18px\">\n  </div>\n  <div class=\"takeaway\">Market the <b>features</b> and you compete on specs. Market the <b>job</b> and you understand why they choose you.</div>\n</section>", "section": "m1", "note": "<p><b>Lecturer script:</b> &quot;one tool I often used. <b>Jobs-to-be-Done</b> \u2014 what <i>job</i> is the customer hiring you to do (functional, emotional, social)? And Reforge&#x27;s <b>Use Case Map</b> \u2014 because the <i>same customer</i> can have different jobs that need totally different marketing.&quot;</p>\n<p><b>On the slide:</b> the <b>Use Case Map \u2014 7 fields:</b> Use Case \u00b7 Problem (their words) \u00b7 Who/ICP \u00b7 Alternatives \u00b7 Why \u00b7 Frequency \u00b7 Consideration Time.</p>\n<p><b>Infographic:</b> the 7-field Use Case Map template (fillable). _(source: [[Reforge Growth Model &amp; Loops]])_</p>"}, {"region": "dk1", "badge": "06", "div": false, "title": "Module 1 \u2014 The JTBD Framework", "html": "<section class=\"slide\" style=\"padding:40px 48px\">\n  <div class=\"kicker\"><span class=\"dot\"></span> Module 1 \u2014 The JTBD Framework <span class=\"num\">06</span></div>\n  <div class=\"rule\"></div>\n  <a href=\"https://miro.com/templates/jobs-to-be-done-jtbd-for-product-managers/\" target=\"_blank\" rel=\"noopener\" title=\"Open the Jobs-to-be-Done template in Miro\" style=\"flex:1;display:flex;align-items:center;justify-content:center;margin-top:14px\">\n    <img src=\"_assets/jtbd-framework-miro.jpg\" alt=\"Defining Main Job to Be Done (JTBD) \u2014 Miro framework template\" style=\"width:100%;height:auto;max-height:100%;object-fit:contain;border:1px solid var(--line-2);border-radius:8px;box-shadow:0 14px 30px -18px rgba(0,0,0,.5)\">\n  </a>\n  <div style=\"margin-top:10px;font-family:'Spline Sans Mono';font-size:12px;letter-spacing:.03em;color:var(--ink-soft)\">Source: Miro \u2014 <a href=\"https://miro.com/templates/jobs-to-be-done-jtbd-for-product-managers/\" target=\"_blank\" rel=\"noopener\" style=\"color:var(--accent);font-weight:600;text-decoration:none\">Open the JTBD for Product Managers template \u2197</a></div>\n</section>", "section": "m1", "note": "<p><b>Lecturer script:</b> &quot;one tool I often used. <b>Jobs-to-be-Done</b> \u2014 what <i>job</i> is the customer hiring you to do (functional, emotional, social)? And Reforge&#x27;s <b>Use Case Map</b> \u2014 because the <i>same customer</i> can have different jobs that need totally different marketing.&quot;</p>\n<p><b>On the slide:</b> the <b>Use Case Map \u2014 7 fields:</b> Use Case \u00b7 Problem (their words) \u00b7 Who/ICP \u00b7 Alternatives \u00b7 Why \u00b7 Frequency \u00b7 Consideration Time.</p>\n<p><b>Infographic:</b> the 7-field Use Case Map template (fillable). _(source: [[Reforge Growth Model &amp; Loops]])_</p>"}, {"region": "dk1", "badge": "07", "div": false, "title": "Module 1 \u2014 The Use Case Map", "html": "<section class=\"slide\" style=\"padding:40px 48px\">\n  <div class=\"kicker\"><span class=\"dot\"></span> Module 1 \u2014 The Use Case Map <span class=\"num\">07</span></div>\n  <div class=\"rule\"></div>\n  <h2 class=\"d\" style=\"font-size:30px;margin-top:10px\">Reforge Use Case Map</h2>\n  <div style=\"flex:1;display:flex;align-items:center;justify-content:center;margin-top:6px\">\n    <img src=\"_assets/reforge-usecase-map.jpg\" alt=\"Reforge Use Case Map \u2014 Problem, Persona, Alternatives, Frequency, Why\" style=\"max-height:430px;width:auto;border:1px solid var(--line-2);border-radius:8px;box-shadow:0 14px 30px -18px rgba(0,0,0,.5)\">\n  </div>\n  <div style=\"margin-top:8px;font-family:'Spline Sans Mono';font-size:12px;letter-spacing:.03em;color:var(--ink-soft)\">Five questions that turn \"a job to be done\" into a usable map. Source: Reforge.</div>\n</section>", "section": "m1", "note": "<p><b>Lecturer script:</b> &quot;one tool I often used. <b>Jobs-to-be-Done</b> \u2014 what <i>job</i> is the customer hiring you to do (functional, emotional, social)? And Reforge&#x27;s <b>Use Case Map</b> \u2014 because the <i>same customer</i> can have different jobs that need totally different marketing.&quot;</p>\n<p><b>On the slide:</b> the <b>Use Case Map \u2014 7 fields:</b> Use Case \u00b7 Problem (their words) \u00b7 Who/ICP \u00b7 Alternatives \u00b7 Why \u00b7 Frequency \u00b7 Consideration Time.</p>\n<p><b>Infographic:</b> the 7-field Use Case Map template (fillable). _(source: [[Reforge Growth Model &amp; Loops]])_</p>"}, {"region": "dk1", "badge": "08", "div": false, "title": "Module 1 \u2014 Customer & Market", "html": "<section class=\"slide\">\n  <div class=\"kicker\"><span class=\"dot\"></span> Module 1 \u2014 Customer & Market <span class=\"num\">08</span></div>\n  <div class=\"rule\"></div>\n  <h2 class=\"d\" style=\"font-size:38px;margin-top:12px\">People don't buy products. They <em class=\"i\">hire</em> them for a job.</h2>\n  <div class=\"lead\" style=\"margin-top:14px\">This is the \"Jobs to be Done\" idea. A customer hires your product to make progress on something in their life, and drops it the moment something does the job better. The job is rarely only practical.</div>\n  <div class=\"triad\" style=\"margin-top:26px\">\n    <div class=\"tri\"><div class=\"th\">Functional</div><div class=\"td\">The practical task. A drill that makes a clean hole.</div></div>\n    <div class=\"tri\"><div class=\"th\">Emotional</div><div class=\"td\">How they want to feel. Safe, confident, less stressed.</div></div>\n    <div class=\"tri\"><div class=\"th\">Social</div><div class=\"td\">How they want to be seen. Capable, in the know.</div></div>\n  </div>\n  <div class=\"lead\" style=\"margin-top:24px;font-size:18px\">Know the job, and you know what you're really competing against.</div>\n</section>", "section": "m1", "note": "<p><b>Lecturer script:</b> Walk the milkshake, then Ancestry.</p>\n<p><b>Example A \u2014 McDonald&#x27;s milkshake (JTBD):</b> McDonald&#x27;s discovered people &quot;hired&quot; a morning milkshake to survive a long, boring commute \u2014 thick (lasts the drive), one-handed, not messy. Competing not with other shakes but with bananas and bagels. _(source: [[Marketing Fundamentals \u2014 Teaching Framework]])_</p>\n<p><b>Example B \u2014 Ancestry (use case):</b> <i>same</i> customer, two jobs \u2014 Family Tree (historical discovery) vs DNA Kit (fast health insight) \u2192 different messaging, channels, audience. _(source: [[Reforge Growth Model &amp; Loops]])_</p>\n<p><b>Image:</b> a commuter with a milkshake in traffic.</p>"}, {"region": "dk1", "badge": "09", "div": false, "title": "Module 1 \u2014 Jobs To Be Done \u00b7 The Milkshake", "html": "<section class=\"slide\">\n  <div class=\"kicker\"><span class=\"dot\"></span> Module 1 \u2014 Jobs To Be Done \u00b7 The Milkshake <span class=\"num\">09</span></div>\n  <div class=\"rule\"></div>\n  <h2 class=\"d\" style=\"font-size:34px;margin-top:10px\">McDonald's asked: what job is a milkshake <em class=\"i\">hired</em> for?</h2>\n  <div class=\"jtbd\">\n    <div class=\"jcard\"><div class=\"jl\">Context</div><div class=\"jv\">A long, boring morning drive. Alone in the car, with only one hand free.</div></div>\n    <div class=\"jcard jcore\"><div class=\"jl\">The job</div><div class=\"jv\">\"Give me something filling that makes the commute less boring.\"</div></div>\n    <div class=\"jcard\"><div class=\"jl\">Struggles</div><div class=\"jv\">Bagels are dry and crumbly. Bananas are gone in a minute. Coffee doesn't fill you up.</div></div>\n    <div class=\"jcard\"><div class=\"jl\">Desired outcome</div><div class=\"jv\">Stay full and occupied the whole drive, with one hand and no mess.</div></div>\n  </div>\n  <div class=\"lead\" style=\"margin-top:18px;font-size:17px\">So the milkshake wins: thick enough to last, drinkable one-handed, filling. Its real rivals are bananas and bagels, not other milkshakes.</div>\n</section>", "section": "m1", "note": "<p><b>Lecturer script:</b> Walk the milkshake, then Ancestry.</p>\n<p><b>Example A \u2014 McDonald&#x27;s milkshake (JTBD):</b> McDonald&#x27;s discovered people &quot;hired&quot; a morning milkshake to survive a long, boring commute \u2014 thick (lasts the drive), one-handed, not messy. Competing not with other shakes but with bananas and bagels. _(source: [[Marketing Fundamentals \u2014 Teaching Framework]])_</p>\n<p><b>Example B \u2014 Ancestry (use case):</b> <i>same</i> customer, two jobs \u2014 Family Tree (historical discovery) vs DNA Kit (fast health insight) \u2192 different messaging, channels, audience. _(source: [[Reforge Growth Model &amp; Loops]])_</p>\n<p><b>Image:</b> a commuter with a milkshake in traffic.</p>"}, {"region": "dk1", "badge": "10", "div": false, "title": "Your Turn \u2014 Discuss", "html": "<section class=\"slide qslide\">\n  <div class=\"kicker\"><span class=\"dot\"></span> Your Turn \u2014 Discuss <span class=\"num\">10</span></div>\n  <div class=\"rule\"></div>\n  <div class=\"qbody\">\n    <div class=\"qmark\">Q.</div>\n    <h1 class=\"d\">What job is your customer really hiring you to do?</h1>\n    <ol>\n      <li>Write the <b>problem in your customer's own words</b>.</li>\n      <li>List the <b>alternatives</b>, often a spreadsheet, a rival, or doing nothing.</li>\n    </ol>\n    <div class=\"time\">6 min on your own \u00b7 3 min with a partner</div>\n  </div>\n</section>", "section": "m1", "note": "<p><b>Exercise (you do):</b> &quot;Fill the Use Case Map for <i>one</i> use case of your business. Spend most time on <b>Problem in the customer&#x27;s words</b> and <b>Alternatives</b> (what they&#x27;d use if you vanished \u2014 often a spreadsheet, a competitor, or &#x27;do nothing&#x27;).&quot; 6 min solo + 3 min pair-share.</p>\n<p><b>Debrief:</b> call on 2 owners; pressure-test &quot;is that the <i>job</i>, or just your product description?&quot;</p>\n<p><b>Takeaway:</b> <i>&quot;Define the job in their words, or you&#x27;ll market to a customer who doesn&#x27;t exist.&quot;</i></p>\n<p>---</p>"}, {"region": "dk1", "badge": null, "div": false, "title": "Positioning &amp; Brand", "html": "<section class=\"slide\" style=\"background:var(--ink);justify-content:center\">\n  <div style=\"position:absolute;top:52px;right:64px;font-family:'Spline Sans Mono';font-size:12px;letter-spacing:.2em;color:#8a8273;text-transform:uppercase\">SMU Academy \u00b7 Day 1</div>\n  <div style=\"font-family:'Spline Sans Mono';font-size:14px;letter-spacing:.32em;color:#c9a89c;text-transform:uppercase\">Module 2</div>\n  <h1 class=\"d\" style=\"font-size:80px;font-weight:560;color:var(--paper);line-height:1;margin-top:18px;letter-spacing:-.02em\">Positioning &amp; Brand</h1>\n  <div style=\"font-size:21px;color:#b8b0a0;margin-top:24px;max-width:840px;line-height:1.45\">You know <em style=\"color:var(--apricot);font-style:italic\">who</em> it's for and the job they hire you for. Now: what do you <em style=\"color:var(--apricot);font-style:italic\">stand for</em> \u2014 and how do you make them choose you, again and again?</div>\n  <div style=\"font-family:'Spline Sans Mono';font-size:120px;font-weight:600;color:rgba(232,160,140,.15);position:absolute;bottom:18px;right:64px;line-height:.8\">02</div>\n</section>", "section": "m1", "note": "<p class=\"pv-empty\">\u2014 no scripted note for this slide; speak to what is on screen \u2014</p>"}, {"region": "dk1", "badge": "11", "div": false, "title": "Module 2 \u2014 Positioning & Brand", "html": "<section class=\"slide\">\n  <div class=\"kicker\"><span class=\"dot\"></span> Module 2 \u2014 Positioning & Brand <span class=\"num\">11</span></div>\n  <div class=\"rule\"></div>\n  <div class=\"two\">\n    <div>\n      <h1 class=\"d\" style=\"font-size:68px\">Position <span class=\"accent\" style=\"font-style:italic;font-weight:400\">\u2260</span> Brand</h1>\n      <div class=\"def p\"><div class=\"t\">Position</div><div class=\"dd\">The one idea you own in a mind.</div></div>\n      <div class=\"def\"><div class=\"t\">Brand</div><div class=\"dd\">Everything that gathers around it.</div></div>\n    </div>\n    <div>\n      <div style=\"display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:6px\">\n        <img src=\"_assets/volvo-logo.png\" alt=\"Volvo\" style=\"height:26px;width:auto\">\n        <span style=\"font-family:'Spline Sans Mono';font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-soft)\">the worked example</span>\n      </div>\n      <div class=\"orbit\">\n        <div class=\"ring r2\"></div><div class=\"ring\"></div>\n        <div class=\"core\"><div class=\"l\">POSITION</div><div class=\"w\">Safety</div></div>\n        <div class=\"chip cN\">Swedish engineering</div>\n        <div class=\"chip cE\">Built to last</div>\n        <div class=\"chip cS\">Family-first</div>\n        <div class=\"chip cW\">Practical premium</div>\n      </div>\n    </div>\n  </div>\n</section>", "section": "m2", "note": "<ul>\n<li><b>Ask first:</b> &quot;Volvo \u2014 one word, what do they own in your head?&quot; (You&#x27;ll get <i>safety</i>.)</li>\n<li><b>Say:</b> &quot;That one word is the <b>position</b>. Everything around it \u2014 Swedish engineering, built-to-last, family-first \u2014 is the <b>brand</b>. You don&#x27;t &#x27;position a brand&#x27;; you take a position, and the brand forms around it.&quot;</li>\n<li><b>Spine tie:</b> the position is this morning&#x27;s <i>why you</i>, boiled down to one word you can own.</li>\n</ul>"}, {"region": "dk1", "badge": "12", "div": false, "title": "Module 2 \u2014 The Principle", "html": "<section class=\"slide\">\n  <div class=\"kicker\"><span class=\"dot\"></span> Module 2 \u2014 The Principle <span class=\"num\">12</span></div>\n  <div class=\"rule\"></div>\n  <div class=\"center\">\n    <h1 class=\"d\" style=\"font-size:64px\">Positioning is <em class=\"i\">earned</em>,<br>not announced.</h1>\n    <div class=\"def p\" style=\"margin-top:22px\"><div class=\"t\">Positioning \u00b7 the input</div><div class=\"dd\">The choice you make about how you want to be perceived relative to the alternatives.</div></div>\n    <div class=\"lead\" style=\"margin-top:20px;font-size:21px\"><b>Volvo</b> didn't say \"we're safe.\" In 1959 it invented the three-point seatbelt and gave the patent away free to every carmaker. It proved the position with a decision instead of claiming it.</div>\n  </div>\n  <div class=\"takeaway\">Claims invite doubt. <b>Proof lets people convince themselves.</b></div>\n</section>", "section": "m2", "note": "<ul>\n<li><b>Say:</b> &quot;Volvo never just <i>said</i> &#x27;we&#x27;re safe.&#x27; In 1959 they invented the three-point seatbelt and gave the patent away free to every carmaker. They <i>proved</i> safety with a decision. Claims invite doubt; proof lets people convince themselves.&quot;</li>\n<li>\u25b8 <i>Interactive:</i> &quot;Name one decision <i>you&#x27;ve</i> made that proves your position \u2014 not a slogan.&quot;</li>\n</ul>"}, {"region": "dk1", "badge": "13", "div": false, "title": "Module 2 \u2014 Cautionary Case", "html": "<section class=\"slide\">\n  <div class=\"kicker\"><span class=\"dot\"></span> Module 2 \u2014 Cautionary Case <span class=\"num\">13</span></div>\n  <div class=\"rule\"></div>\n  <h2 class=\"d\" style=\"font-size:38px;margin-top:10px\">You can't say your way out of what you <em class=\"i\">are</em>.</h2>\n  <div class=\"def\" style=\"margin-top:12px\"><div class=\"t\">Brand \u00b7 the output that compounds</div><div class=\"dd\">The actual set of meanings, feelings, and associations that end up living in people's heads over time.</div></div>\n  <div style=\"display:grid;grid-template-columns:1.05fr 1fr;gap:26px;flex:1;margin-top:14px;align-items:stretch\">\n    <div style=\"display:flex;flex-direction:column;border:1px solid var(--line-2);border-radius:9px;overflow:hidden;background:#fff\">\n      <img src=\"_assets/oldsmobile.jpg\" alt=\"1988 Oldsmobile Cutlass Ciera\" style=\"width:100%;height:250px;object-fit:cover\">\n      <div style=\"padding:13px 20px\">\n        <div style=\"font-family:'Spline Sans Mono';font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--accent);margin-bottom:5px\">\u25c6 The claim \u00b7 GM, 1988</div>\n        <div style=\"font-family:'Fraunces';font-size:22px;font-weight:500;font-style:italic;line-height:1.15\">\"This is not your father's Oldsmobile.\"</div>\n        <div style=\"font-size:13.5px;color:var(--ink-soft);margin-top:7px;line-height:1.35\">\u2026but this <i>was</i> the car. Ads paired celebrities (Ringo Starr, William Shatner) with their kids to look young.</div>\n      </div>\n    </div>\n    <div style=\"display:flex;flex-direction:column;gap:12px\">\n      <div class=\"pane b\" style=\"min-height:0;flex:1\"><div class=\"pl\">\u25cf The reality</div><div class=\"ph\" style=\"font-size:24px\">Same boxy cars. Same showroom.</div><div class=\"pd\">The tagline insulted the <b>loyal older buyers</b> who actually bought Oldsmobiles \u2014 and never won the young ones it chased. Nothing changed but the words.</div></div>\n      <div style=\"background:var(--paper-2);border:1px solid var(--line);border-radius:8px;padding:14px 18px\">\n        <div style=\"font-family:'Spline Sans Mono';font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:6px\">The proof \u2014 in the numbers</div>\n        <div style=\"font-size:15px;line-height:1.4;color:var(--ink)\"><b>1.2M cars</b> at its 1984 peak \u2192 <b>never above 500k</b> after 1990 \u2192 brand <b>dissolved in 2004</b>, after 107 years.</div>\n      </div>\n    </div>\n  </div>\n</section>", "section": "m2", "note": "<ul>\n<li><b>The setup:</b> &quot;By the late &#x27;80s, Oldsmobile had a problem \u2014 it was seen as your <i>dad&#x27;s</i> car. Reliable, boxy, dull. Sales had peaked in 1984 at ~1.2 million. So in 1988, GM ran the famous campaign: <b>&#x27;This is not your father&#x27;s Oldsmobile&#x27;</b> \u2014 ads pairing celebrities like Ringo Starr and William Shatner with their adult kids, to look young and fresh.&quot;</li>\n<li><b>The twist (why it failed):</b> &quot;But look at the car on the screen \u2014 <i>that</i> was still the car. Nothing under the tagline had really changed. So the campaign did two things at once: it <b>insulted the loyal older buyers</b> who actually bought Oldsmobiles (&#x27;your car is for old people&#x27;), and it <b>never convinced the young</b> buyers, because the product wasn&#x27;t for them. You alienate the people who chose you, without winning anyone new.&quot;</li>\n<li><b>The proof \u2014 make them feel the number:</b> &quot;After 1990, Oldsmobile <i>never again</i> sold more than 500k a year. A 107-year-old brand \u2014 founded 1897 \u2014 was <b>dead by 2004.</b> A tagline helped kill it.&quot;</li>\n<li><b>Leave them with:</b> &quot;<b>You can&#x27;t say your way out of what you are.</b> Marketing can&#x27;t fix a product or positioning problem \u2014 it just makes more people find out, faster.&quot; _(sources: SlashGear; Hagerty; Slate \u2014 see below)_</li>\n</ul>"}, {"region": "dk1", "badge": "14", "div": false, "title": "Module 2 \u2014 How A Brand Gets Built", "html": "<section class=\"slide\">\n  <div class=\"kicker\"><span class=\"dot\"></span> Module 2 \u2014 How A Brand Gets Built <span class=\"num\">14</span></div>\n  <div class=\"rule\"></div>\n  <h2 class=\"d\" style=\"font-size:34px;margin-top:12px\">Once you've chosen your position, you build the brand in three layers.</h2>\n  <div class=\"lead\" style=\"margin-top:10px\">Decide what you stand for, tell it as a story, then prove it through what you do. Each layer feeds the one below it.</div>\n  <div class=\"stack\" style=\"margin-top:16px\">\n    <div class=\"layer l1\" style=\"padding:14px 24px\"><div><div class=\"verb\">DECIDE</div><div class=\"name\">Strategy</div></div><div><div class=\"what\" style=\"font-size:18px\">The one thing you stand for.</div><div class=\"eg\" style=\"margin-top:5px\"><b style=\"color:var(--ink)\">Nike:</b> victory for every body.</div><div class=\"eg\" style=\"margin-top:3px\"><b style=\"color:var(--ink)\">Lululemon:</b> gear for the \"sweatlife.\"</div><div class=\"eg\" style=\"margin-top:3px\"><b style=\"color:var(--accent)\">Love, Bonito:</b> fashion designed for the Asian woman's body.</div></div></div>\n    <div class=\"layer l2\" style=\"padding:14px 24px\"><div><div class=\"verb\">EXPRESS</div><div class=\"name\">Narrative</div></div><div><div class=\"what\" style=\"font-size:18px\">The story, with the customer as hero and you as the guide.</div><div class=\"eg\" style=\"margin-top:5px\"><b style=\"color:var(--ink)\">Nike:</b> you vs your limits \u2014 \"Just Do It.\"</div><div class=\"eg\" style=\"margin-top:3px\"><b style=\"color:var(--ink)\">Lululemon:</b> your best self in motion; they're the coach &amp; community.</div><div class=\"eg\" style=\"margin-top:3px\"><b style=\"color:var(--accent)\">Love, Bonito:</b> the modern Asian woman, finally dressed for her real body &amp; life.</div></div></div>\n    <div class=\"layer l3\" style=\"padding:14px 24px\"><div><div class=\"verb\">PROVE</div><div class=\"name\">Marketing</div></div><div><div class=\"what\" style=\"font-size:18px\">The acts that broadcast it, year after year.</div><div class=\"eg\" style=\"margin-top:5px\"><b style=\"color:var(--ink)\">Nike:</b> athlete films, the swoosh everywhere.</div><div class=\"eg\" style=\"margin-top:3px\"><b style=\"color:var(--ink)\">Lululemon:</b> free in-store yoga, local ambassadors, run clubs.</div><div class=\"eg\" style=\"margin-top:3px\"><b style=\"color:var(--accent)\">Love, Bonito:</b> blogshop \u2192 stores across SEA, real-customer fit, community.</div></div></div>\n  </div>\n</section>", "section": "m2", "note": "<ul>\n<li><b>Say:</b> &quot;Once you&#x27;ve chosen the position, you build the brand in three layers: <b>Strategy</b> (decide what you stand for) \u2192 <b>Narrative</b> (tell it as a story \u2014 customer as hero, you as the guide) \u2192 <b>Marketing</b> (prove it, year after year). Each feeds the next.&quot;</li>\n<li><b>Walk the three:</b> &quot;Nike \u2014 victory for every body / you vs your limits (&#x27;Just Do It&#x27;) / athlete films + the swoosh. Lululemon \u2014 gear for the &#x27;sweatlife&#x27; / your best self in motion, the coach &amp; community / in-store yoga, ambassadors, run clubs. <b>Love, Bonito</b> \u2014 fashion designed for the Asian woman&#x27;s body / the modern Asian woman finally dressed for her real life / blogshop \u2192 stores across SEA, real-customer fit, community.&quot;</li>\n<li><b>The point of the third one (say it):</b> &quot;Nike and Lululemon sell <i>aspiration</i> \u2014 be the best version of you. Love, Bonito is built on a <i>product truth</i> \u2014 Western brands don&#x27;t fit Asian bodies \u2014 and it operates DTC-first with community, not big-budget ads. <b>Same framework, completely different engine.</b> Yours doesn&#x27;t have to look like Nike&#x27;s.&quot;</li>\n<li><b>If asked &#x27;what framework is this?&#x27;</b> \u2014 &quot;Not one guru&#x27;s model. It&#x27;s a synthesis: position (Ries &amp; Trout) \u2192 narrative (StoryBrand / Donald Miller) \u2192 distinctive marketing (Byron Sharp).&quot;</li>\n</ul>"}, {"region": "dk1", "badge": "15", "div": false, "title": "Module 2 \u2014 What A Brand Marketer Does", "html": "<section class=\"slide\">\n  <div class=\"kicker\"><span class=\"dot\"></span> Module 2 \u2014 What A Brand Marketer Does <span class=\"num\">15</span></div>\n  <div class=\"rule\"></div>\n  <h2 class=\"d\" style=\"font-size:36px;margin-top:10px\">Built it \u2014 now you <em class=\"i\">grow</em> it with four moves.</h2>\n  <div class=\"lead\" style=\"margin-top:8px\">The last slide was how you <b>build</b> a brand. This is what you <b>repeat</b> to grow it \u2014 the bottom \"prove it\" layer, turned into a daily job. <span style=\"color:var(--ink-soft)\">(Byron Sharp, <i>How Brands Grow</i>.)</span></div>\n  <div class=\"moves\">\n    <div class=\"move\"><div class=\"mvn\">1</div><div><div class=\"mvt\">Own the position you chose \u2014 keep proving it.<span class=\"mvtag\">POSITIONING</span></div><div class=\"mvd\">The Strategy layer from the last slide, now defended through visible decisions.</div></div></div>\n    <div class=\"move\"><div class=\"mvn\">2</div><div><div class=\"mvt\">Be impossible to forget.<span class=\"mvtag\">DISTINCTIVE ASSETS</span></div><div class=\"mvd\">Same look, name, and message everywhere, for years.</div></div></div>\n    <div class=\"move\"><div class=\"mvn\">3</div><div><div class=\"mvt\">Show up at the buying moment.<span class=\"mvtag\">MENTAL AVAILABILITY</span></div><div class=\"mvd\">Be the brand people think of first when the need hits.</div></div></div>\n    <div class=\"move\"><div class=\"mvn\">4</div><div><div class=\"mvt\">Be easy to find and buy.<span class=\"mvtag\">PHYSICAL AVAILABILITY</span></div><div class=\"mvd\">Reach your whole market, including people who barely know you.</div></div></div>\n  </div>\n</section>", "section": "m2", "note": "<ul>\n<li><b>Bridge from 14 \u2192 15 (say this first \u2014 they look similar on purpose):</b> &quot;Slide 14 was how you <i>build</i> a brand \u2014 three layers, top-down: the blueprint. This slide is what you <i>do</i> with it forever. It&#x27;s a zoom-in on the bottom layer \u2014 &#x27;prove it, year after year&#x27; \u2014 broken into four repeatable moves. <b>14 = build it; 15 = grow it.</b>&quot;</li>\n<li><b>Say:</b> &quot;Four moves: (1) own the position you chose and keep proving it, (2) be impossible to forget \u2014 same look, name, message for years, (3) show up at the buying moment, (4) be easy to find and buy. The last three are Byron Sharp \u2014 distinctiveness + mental &amp; physical availability.&quot;</li>\n<li><b>Why it&#x27;s not a repeat:</b> move 1 is the hand-off from slide 14&#x27;s Strategy layer; moves 2\u20134 are new \u2014 they&#x27;re about <i>availability</i> (being easy to recall and easy to buy), not positioning.</li>\n<li><b>Spine tie:</b> this is how you keep <i>creating demand</i> and staying top-of-mind, not a one-off campaign.</li>\n</ul>\n<p>---</p>"}, {"region": "dk1", "badge": null, "div": false, "title": "The Offer", "html": "<section class=\"slide\" style=\"background:var(--ink);justify-content:center\">\n  <div style=\"position:absolute;top:52px;right:64px;font-family:'Spline Sans Mono';font-size:12px;letter-spacing:.2em;color:#8a8273;text-transform:uppercase\">SMU Academy \u00b7 Day 1</div>\n  <div style=\"font-family:'Spline Sans Mono';font-size:14px;letter-spacing:.32em;color:#c9a89c;text-transform:uppercase\">Module 3</div>\n  <h1 class=\"d\" style=\"font-size:80px;font-weight:560;color:var(--paper);line-height:1;margin-top:18px;letter-spacing:-.02em\">The Offer</h1>\n  <div style=\"font-size:21px;color:#b8b0a0;margin-top:24px;max-width:840px;line-height:1.45\">You've decided who you're for and what you stand for. Now the thing itself \u2014 <em style=\"color:var(--apricot);font-style:italic\">what you sell, at what price, packaged how.</em></div>\n  <div style=\"font-family:'Spline Sans Mono';font-size:120px;font-weight:600;color:rgba(232,160,140,.15);position:absolute;bottom:18px;right:64px;line-height:.8\">03</div>\n</section>", "section": "m2", "note": "<p class=\"pv-empty\">\u2014 no scripted note for this slide; speak to what is on screen \u2014</p>"}, {"region": "dk1", "badge": "16", "div": false, "title": "Module 3 \u2014 The Offer", "html": "<section class=\"slide\">\n  <div class=\"kicker\"><span class=\"dot\"></span> Module 3 \u2014 The Offer <span class=\"num\">16</span></div>\n  <div class=\"rule\"></div>\n  <h2 class=\"d\" style=\"font-size:34px;margin-top:12px\">Your offer = product + price + how it's packaged.</h2>\n  <div class=\"lead\" style=\"margin-top:10px\">The offer is everything the customer weighs before buying: the product itself, the price, and the way it's bundled, guaranteed, and delivered. Change any one and you change what they decide.</div>\n  <div class=\"vpc\">\n    <div class=\"vside ci\"><div class=\"lab\">The customer</div><div class=\"vh\">Jobs \u00b7 Pains \u00b7 Gains</div><ul><li>The job they're trying to do</li><li>What frustrates them today</li><li>The win they're hoping for</li></ul></div>\n    <div class=\"vside sq\"><div class=\"lab\">Your offer</div><div class=\"vh\">Product \u00b7 Relievers \u00b7 Creators</div><ul><li>What you sell</li><li>How it removes the pain</li><li>How it delivers the gain</li></ul></div>\n  </div>\n</section>", "section": "m3", "note": "<p><b>Lecturer script:</b> &quot;Your offer = product + price + how it&#x27;s packaged. Map it with Osterwalder&#x27;s <b>Value Proposition Canvas</b>: on the customer side \u2014 <b>Jobs, Pains, Gains</b>; on your side \u2014 <b>Products, Pain-relievers, Gain-creators.</b> A strong offer is where your pain-relievers hit their real pains. Then price on <b>value, not cost-plus.</b>&quot;</p>\n<p><b>On the slide:</b> the Value Proposition Canvas (two halves: customer circle \u2194 value square).</p>\n<p><b>Infographic:</b> Value Proposition Canvas template (jobs/pains/gains \u2194 products/relievers/creators). _(source: research \u2014 Strategyzer/Osterwalder)_</p>"}, {"region": "dk1", "badge": "17", "div": false, "title": "Module 3 \u2014 Example", "html": "<section class=\"slide\">\n  <div class=\"kicker\"><span class=\"dot\"></span> Module 3 \u2014 Example <span class=\"num\">17</span></div>\n  <div class=\"rule\"></div>\n  <div class=\"duo\" style=\"margin-top:16px;align-items:stretch;gap:20px\">\n    <div style=\"border:1px solid var(--line-2);border-radius:8px;overflow:hidden;display:flex;flex-direction:column\">\n      <div style=\"display:flex;align-items:center;justify-content:center;background:var(--paper-2);min-height:370px;flex:1\"><img src=\"_assets/ikea-ad.jpg\" alt=\"IKEA \u2014 Spot the difference: same chair, lower price\" style=\"width:100%;height:auto;max-height:370px;object-fit:contain;display:block\"></div>\n      <div style=\"padding:13px 22px;background:#fff;border-top:1px solid var(--line)\">\n        <div style=\"font-family:'Spline Sans Mono';font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--proof);margin-bottom:5px\">A clear trade-off \u00b7 IKEA</div>\n        <div style=\"font-size:14.5px;color:var(--ink-soft);line-height:1.35\">Same chair, lower price \u2014 the <b style=\"color:var(--ink)\">offer</b> is the strategy.</div>\n      </div>\n    </div>\n    <div style=\"border:1px solid var(--line-2);border-radius:8px;overflow:hidden;display:flex;flex-direction:column\">\n      <div style=\"display:flex;align-items:center;justify-content:center;background:var(--paper-2);min-height:370px;flex:1\"><img src=\"_assets/dsc-ad.jpg\" alt=\"Dollar Shave Club \u2014 Our Blades Are F**king Great\" style=\"width:auto;height:100%;max-height:370px;object-fit:contain;display:block\"></div>\n      <div style=\"padding:13px 22px;background:#fff;border-top:1px solid var(--line)\">\n        <div style=\"font-family:'Spline Sans Mono';font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--proof);margin-bottom:5px\">The offer was the idea \u00b7 Dollar Shave Club</div>\n        <div style=\"font-size:14.5px;color:var(--ink-soft);line-height:1.35\">$1/month, blades to your door. The <b style=\"color:var(--ink)\">offer</b> built the brand \u2014 before a cent on ads.</div>\n      </div>\n    </div>\n  </div>\n  <div class=\"takeaway\">When marketing isn't working, the <b>offer</b> is often the real problem.</div>\n</section>", "section": "m3", "note": "<ul>\n<li><b>IKEA</b> \u2014 designer-looking furniture, flat-packed + self-assembled, at a price no one else hits. The <i>offer</i> (and the trade-off you accept) is the strategy. _(wiki)_</li>\n<li><b>Dollar Shave Club</b> \u2014 the offer <i>was</i> the innovation: &quot;$1/month, blades shipped to your door.&quot; Not a better razor \u2014 a better offer. _(wiki)_</li>\n<li><b>Freemium/tiered pricing</b> \u2014 free tier creates demand &amp; habit; paid tiers capture value as needs grow (Spotify free \u2192 Premium; Dropbox free \u2192 storage tiers). _(source: research)_</li>\n</ul>\n<p><b>Image:</b> IKEA flat-pack box / a pricing-tier menu.</p>"}, {"region": "dk1", "badge": null, "div": false, "title": "Great product. Zero awareness. Now what?", "html": "<section class=\"slide\" style=\"background:var(--ink);justify-content:center\">\n  <div style=\"position:absolute;top:52px;right:64px;font-family:'Spline Sans Mono';font-size:12px;letter-spacing:.2em;color:#8a8273;text-transform:uppercase\">SMU Academy \u00b7 Day 1</div>\n  <div style=\"font-family:'Spline Sans Mono';font-size:14px;letter-spacing:.32em;color:#c9a89c;text-transform:uppercase\">Module 4 \u2014 Demand &amp; Channels</div>\n  <h1 class=\"d\" style=\"font-size:68px;font-weight:560;color:var(--paper);line-height:1.05;margin-top:18px;letter-spacing:-.02em\">Great product. <span style=\"color:var(--apricot)\">Zero awareness.</span><br>Now what?</h1>\n  <div style=\"font-size:21px;color:#b8b0a0;margin-top:24px;max-width:840px;line-height:1.45\">The best offer in the world still loses to the one people actually <em style=\"color:var(--apricot);font-style:italic\">hear about</em>. Now: how do they find you?</div>\n  <div style=\"font-family:'Spline Sans Mono';font-size:120px;font-weight:600;color:rgba(232,160,140,.15);position:absolute;bottom:18px;right:64px;line-height:.8\">04</div>\n</section>", "section": "m3", "note": "<p class=\"pv-empty\">\u2014 no scripted note for this slide; speak to what is on screen \u2014</p>"}, {"region": "dk1", "badge": "18", "div": false, "title": "Module 4 \u2014 Demand & Channels", "html": "<section class=\"slide\">\n  <div class=\"kicker\"><span class=\"dot\"></span> Module 4 \u2014 Demand & Channels <span class=\"num\">18</span></div>\n  <div class=\"rule\"></div>\n  <h2 class=\"d\" style=\"font-size:36px;margin-top:10px\">Match the message to the <em class=\"i\">intent</em>.</h2>\n  <div class=\"funnel\">\n    <div class=\"frow\"><div class=\"fbar f1\"><span class=\"fn\">See</span><span class=\"fg\">widest audience, no intent</span></div><span class=\"fch\">social \u00b7 video \u00b7 PR</span></div>\n    <div class=\"frow\"><div class=\"fbar f2\"><span class=\"fn\">Think</span><span class=\"fg\">considering a solution</span></div><span class=\"fch\">SEO/AEO \u00b7 content \u00b7 email</span></div>\n    <div class=\"frow\"><div class=\"fbar f3\"><span class=\"fn\">Do</span><span class=\"fg\">ready to buy</span></div><span class=\"fch\">search ads \u00b7 product pages</span></div>\n    <div class=\"frow\"><div class=\"fbar f4\"><span class=\"fn\">Care</span><span class=\"fg\">existing customers</span></div><span class=\"fch\">email \u00b7 loyalty \u00b7 referral</span></div>\n  </div>\n</section>", "section": "m4", "note": "<p><b>Lecturer script:</b> &quot;Three lenses. <b>Owned / Earned / Paid</b> (your site &amp; list / PR &amp; word-of-mouth / ads). The <b>See-Think-Do-Care</b> journey (Kaushik) \u2014 match content to intent: <i>See</i> (broad, no intent), <i>Think</i> (considering), <i>Do</i> (ready to buy), <i>Care</i> (existing customers). And the big idea: the best channels are <b>loops, not funnels</b> \u2014 output feeds back into input and compounds (viral, content, paid).&quot;</p>\n<p><b>On the slide:</b> See-Think-Do-Care funnel + Owned/Earned/Paid triad + a simple acquisition-loop diagram.</p>\n<p><b>Infographic:</b> STDC four-stage funnel (intent \u2191 as it narrows). _(source: research \u2014 Kaushik 2013)_ + loop diagram _(wiki [[Reforge Growth Model &amp; Loops]])_</p>"}, {"region": "dk1", "badge": "19", "div": false, "title": "Module 4 \u2014 Example", "html": "<section class=\"slide\">\n  <div class=\"kicker\"><span class=\"dot\"></span> Module 4 \u2014 Example <span class=\"num\">19</span></div>\n  <div class=\"rule\"></div>\n  <div class=\"duo\" style=\"margin-top:30px\">\n    <div class=\"pane g\"><div class=\"pl\">One channel, big spike</div><div class=\"ph\">Dollar Shave Club</div><div class=\"pd\">One launch video, made for about $4,500, brought 12,000 sign-ups in 48 hours.</div></div>\n    <div class=\"pane g\"><div class=\"pl\">Stay present until they're ready</div><div class=\"ph\">HubSpot</div><div class=\"pd\">Software gets bought once every few years, so they built a content habit to stay top of mind through the long wait.</div></div>\n  </div>\n  <div class=\"takeaway\">Find the stage you're missing, then build <b>one channel</b> that keeps paying off.</div>\n</section>", "section": "m4", "note": "<ul>\n<li><b>Dollar Shave Club</b> \u2014 one $4,500 launch video \u2192 12,000 sign-ups in 48 hours (earned + paid amplification). _(wiki)_</li>\n<li><b>HubSpot \u2014 the &quot;Forgettable Zone&quot; fix</b> \u2014 software bought once every few years, so HubSpot built a <i>high-frequency</i> content/webinar relationship to stay present until the buying window opens. _(wiki [[Reforge Growth Model &amp; Loops]])_</li>\n<li><b>Where SEO/AEO fits now</b> \u2014 being recommended by AI (ChatGPT/Google AI) is the new &quot;found&quot; \u2014 earned visibility at the <i>Think/Do</i> stage. _(wiki [[AEO Fundamentals]])_</li>\n</ul>\n<p><b>Image:</b> a creator filming a phone video / a content-to-leads loop.</p>"}, {"region": "dk1", "badge": "20", "div": false, "title": "Module 4 \u2014 Campaign Teardown \u00b7 Guess the Objective", "html": "<section class=\"slide\">\n  <div class=\"kicker\"><span class=\"dot\"></span> Module 4 \u2014 Campaign Teardown \u00b7 Guess the Objective <span class=\"num\">20</span></div>\n  <div class=\"rule\"></div>\n  <div class=\"vid\">\n    <div class=\"frame\"><iframe src=\"https://www.youtube.com/embed/ZUG9qYTJMsI\" title=\"Dollar Shave Club launch video\" allow=\"accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture\" allowfullscreen></iframe></div>\n    <div class=\"vtxt\">\n      <div style=\"font-family:'Spline Sans Mono';font-size:12px;letter-spacing:.2em;text-transform:uppercase;color:var(--proof);margin-bottom:10px\">Dollar Shave Club</div>\n      <div class=\"vbig\">One video.<br>12,000 sign-ups<br>in 48 hours.</div>\n      <div class=\"vsm\">A 2012 launch video, made for about $4,500. It built the whole brand before they spent a cent on traditional ads.</div>\n      <div style=\"margin-top:20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap\"><span style=\"font-family:'Spline Sans Mono';font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent)\">\ud83c\udfaf Objective?</span><span style=\"font-family:'Spline Sans Mono';font-size:12px;color:var(--ink-soft);border:1px dashed var(--line-2);border-radius:999px;padding:4px 13px\">\u21b3 Acquisition \u00b7 a launch</span></div>\n    </div>\n  </div>\n</section>", "section": "m4", "note": "<ul>\n<li><b>Dollar Shave Club</b> \u2014 one $4,500 launch video \u2192 12,000 sign-ups in 48 hours (earned + paid amplification). _(wiki)_</li>\n<li><b>HubSpot \u2014 the &quot;Forgettable Zone&quot; fix</b> \u2014 software bought once every few years, so HubSpot built a <i>high-frequency</i> content/webinar relationship to stay present until the buying window opens. _(wiki [[Reforge Growth Model &amp; Loops]])_</li>\n<li><b>Where SEO/AEO fits now</b> \u2014 being recommended by AI (ChatGPT/Google AI) is the new &quot;found&quot; \u2014 earned visibility at the <i>Think/Do</i> stage. _(wiki [[AEO Fundamentals]])_</li>\n</ul>\n<p><b>Image:</b> a creator filming a phone video / a content-to-leads loop.</p>"}, {"region": "dk1", "badge": "21", "div": false, "title": "Module 4 \u2014 Campaign Teardown \u00b7 Guess the Objective", "html": "<section class=\"slide\">\n  <div class=\"kicker\"><span class=\"dot\"></span> Module 4 \u2014 Campaign Teardown \u00b7 Guess the Objective <span class=\"num\">21</span></div>\n  <div class=\"rule\"></div>\n  <div class=\"vid\">\n    <div class=\"frame\" style=\"background:#fff\"><img src=\"_assets/novastacks-aeo.jpeg\" alt=\"Google AI Overview naming Novastacks first for best AEO agency Singapore\" style=\"position:absolute;inset:0;width:100%;height:100%;object-fit:contain;background:#fff\"></div>\n    <div class=\"vtxt\">\n      <div style=\"font-family:'Spline Sans Mono';font-size:12px;letter-spacing:.2em;text-transform:uppercase;color:var(--proof);margin-bottom:10px\">Novastacks \u00b7 our own</div>\n      <div class=\"vbig\" style=\"font-size:44px\">The AI names<br>us first.</div>\n      <div class=\"vsm\">Search \"best AEO agency Singapore\" and Google's AI Overview puts Novastacks at the top of its answer. New customers discover us inside the AI's recommendation \u2014 not by scrolling ten blue links. That's AEO.</div>\n      <div style=\"margin-top:20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap\"><span style=\"font-family:'Spline Sans Mono';font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent)\">\ud83c\udfaf Objective?</span><span style=\"font-family:'Spline Sans Mono';font-size:12px;color:var(--ink-soft);border:1px dashed var(--line-2);border-radius:999px;padding:4px 13px\">\u21b3 Discovery \u00b7 new-customer awareness</span></div>\n    </div>\n  </div>\n</section>", "section": "m4", "note": "<ul>\n<li><b>Dollar Shave Club</b> \u2014 one $4,500 launch video \u2192 12,000 sign-ups in 48 hours (earned + paid amplification). _(wiki)_</li>\n<li><b>HubSpot \u2014 the &quot;Forgettable Zone&quot; fix</b> \u2014 software bought once every few years, so HubSpot built a <i>high-frequency</i> content/webinar relationship to stay present until the buying window opens. _(wiki [[Reforge Growth Model &amp; Loops]])_</li>\n<li><b>Where SEO/AEO fits now</b> \u2014 being recommended by AI (ChatGPT/Google AI) is the new &quot;found&quot; \u2014 earned visibility at the <i>Think/Do</i> stage. _(wiki [[AEO Fundamentals]])_</li>\n</ul>\n<p><b>Image:</b> a creator filming a phone video / a content-to-leads loop.</p>"}, {"region": "dk1", "badge": "22", "div": false, "title": "Module 4 \u2014 Campaign Teardown \u00b7 Guess the Objective", "html": "<section class=\"slide\">\n  <div class=\"kicker\"><span class=\"dot\"></span> Module 4 \u2014 Campaign Teardown \u00b7 Guess the Objective <span class=\"num\">22</span></div>\n  <div class=\"rule\"></div>\n  <div class=\"vid\">\n    <div class=\"frame\" style=\"background:#fff\"><div style=\"position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:26px;padding:30px\"><img src=\"_assets/amazon-logo.png\" alt=\"Amazon\" style=\"width:300px;max-width:60%\"><div style=\"display:flex;align-items:center;gap:22px;flex-wrap:wrap;justify-content:center\"><img src=\"_assets/amazon-prime-logo.png\" alt=\"Amazon Prime\" style=\"height:44px\"><span style=\"background:#FFD814;border:1px solid #FCD200;border-radius:999px;padding:11px 24px;font-family:Arial,Helvetica,sans-serif;font-size:16px;font-weight:600;color:#0F1111\">Buy now with 1-Click \u203a</span></div></div></div>\n    <div class=\"vtxt\">\n      <div style=\"font-family:'Spline Sans Mono';font-size:12px;letter-spacing:.2em;text-transform:uppercase;color:var(--proof);margin-bottom:10px\">Amazon</div>\n      <div class=\"vbig\" style=\"font-size:46px\">1-click checkout.<br>Prime membership.</div>\n      <div class=\"vsm\">1-click checkout makes buying effortless. Prime makes leaving costly.</div>\n      <div style=\"margin-top:20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap\"><span style=\"font-family:'Spline Sans Mono';font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent)\">\ud83c\udfaf Objective?</span><span style=\"font-family:'Spline Sans Mono';font-size:12px;color:var(--ink-soft);border:1px dashed var(--line-2);border-radius:999px;padding:4px 13px\">\u21b3 Conversion \u00b7 remove friction (+ retention)</span></div>\n    </div>\n  </div>\n</section>", "section": "m4", "note": "<ul>\n<li><b>Dollar Shave Club</b> \u2014 one $4,500 launch video \u2192 12,000 sign-ups in 48 hours (earned + paid amplification). _(wiki)_</li>\n<li><b>HubSpot \u2014 the &quot;Forgettable Zone&quot; fix</b> \u2014 software bought once every few years, so HubSpot built a <i>high-frequency</i> content/webinar relationship to stay present until the buying window opens. _(wiki [[Reforge Growth Model &amp; Loops]])_</li>\n<li><b>Where SEO/AEO fits now</b> \u2014 being recommended by AI (ChatGPT/Google AI) is the new &quot;found&quot; \u2014 earned visibility at the <i>Think/Do</i> stage. _(wiki [[AEO Fundamentals]])_</li>\n</ul>\n<p><b>Image:</b> a creator filming a phone video / a content-to-leads loop.</p>"}, {"region": "dk1", "badge": "23", "div": false, "title": "Module 4 \u2014 Campaign Teardown \u00b7 Guess the Objective", "html": "<section class=\"slide\">\n  <div class=\"kicker\"><span class=\"dot\"></span> Module 4 \u2014 Campaign Teardown \u00b7 Guess the Objective <span class=\"num\">23</span></div>\n  <div class=\"rule\"></div>\n  <div class=\"vid\">\n    <div class=\"frame\" style=\"aspect-ratio:auto;height:440px;background:transparent;border:0;box-shadow:none;overflow:visible;display:flex;gap:14px;align-items:center;justify-content:center\">\n      <img src=\"_assets/spotify-wrapped-1.png\" alt=\"Spotify Wrapped \u2014 248 genres\" style=\"height:100%;width:auto;border-radius:16px;border:1px solid var(--line-2);box-shadow:0 14px 30px -16px rgba(0,0,0,.45)\">\n      <img src=\"_assets/spotify-wrapped-2.png\" alt=\"Spotify Wrapped \u2014 listening age\" style=\"height:100%;width:auto;border-radius:16px;border:1px solid var(--line-2);box-shadow:0 14px 30px -16px rgba(0,0,0,.45)\">\n      <img src=\"_assets/spotify-wrapped-3.png\" alt=\"Spotify Wrapped \u2014 artist message\" style=\"height:100%;width:auto;border-radius:16px;border:1px solid var(--line-2);box-shadow:0 14px 30px -16px rgba(0,0,0,.45)\">\n    </div>\n    <div class=\"vtxt\">\n      <div style=\"font-family:'Spline Sans Mono';font-size:12px;letter-spacing:.2em;text-transform:uppercase;color:var(--proof);margin-bottom:10px\">Spotify Wrapped</div>\n      <div class=\"vbig\" style=\"font-size:44px\">Your year in music \u2014<br>built to be shared.</div>\n      <div class=\"vsm\">Every December, Spotify turns each user's own listening data into a personalised, shareable story. Users post it everywhere \u2014 free reach that pulls new users in, every year.</div>\n      <div style=\"margin-top:20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap\"><span style=\"font-family:'Spline Sans Mono';font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent)\">\ud83c\udfaf Objective?</span><span style=\"font-family:'Spline Sans Mono';font-size:12px;color:var(--ink-soft);border:1px dashed var(--line-2);border-radius:999px;padding:4px 13px\">\u21b3 Retention &amp; Advocacy</span></div>\n    </div>\n  </div>\n</section>", "section": "m4", "note": "<ul>\n<li><b>Dollar Shave Club</b> \u2014 one $4,500 launch video \u2192 12,000 sign-ups in 48 hours (earned + paid amplification). _(wiki)_</li>\n<li><b>HubSpot \u2014 the &quot;Forgettable Zone&quot; fix</b> \u2014 software bought once every few years, so HubSpot built a <i>high-frequency</i> content/webinar relationship to stay present until the buying window opens. _(wiki [[Reforge Growth Model &amp; Loops]])_</li>\n<li><b>Where SEO/AEO fits now</b> \u2014 being recommended by AI (ChatGPT/Google AI) is the new &quot;found&quot; \u2014 earned visibility at the <i>Think/Do</i> stage. _(wiki [[AEO Fundamentals]])_</li>\n</ul>\n<p><b>Image:</b> a creator filming a phone video / a content-to-leads loop.</p>"}, {"region": "dk1", "badge": "24", "div": false, "title": "Your Turn \u2014 Discuss", "html": "<section class=\"slide qslide\">\n  <div class=\"kicker\"><span class=\"dot\"></span> Your Turn \u2014 Discuss <span class=\"num\">24</span></div>\n  <div class=\"rule\"></div>\n  <div class=\"qbody\">\n    <div class=\"qmark\">Q.</div>\n    <h1 class=\"d\">Where is the gap in how customers find you?</h1>\n    <ol>\n      <li>Map your channels onto <b>See, Think, Do, Care</b>. Most owners sit only at \"Do.\"</li>\n      <li>Pick <b>one channel</b> to build first.</li>\n    </ol>\n    <div class=\"time\">8 min \u00b7 3 min to share</div>\n  </div>\n</section>", "section": "m4", "note": "<p><b>Exercise (you do):</b> &quot;1) Map your current channels onto See-Think-Do-Care \u2014 where&#x27;s the gap? (Most owners are all-Do, no See/Think.) 2) Pick <b>one loop</b> you could build (content, referral, or paid) and name its input \u2192 action \u2192 output.&quot; 8 min + 3 share.</p>\n<p><b>Takeaway:</b> <i>&quot;Don&#x27;t &#x27;do more marketing.&#x27; Fill the intent gap, then build one loop that compounds.&quot;</i></p>\n<p>---</p>"}, {"region": "dk1", "badge": "25", "div": false, "title": "Module 5 \u2014 Conversion & Retention", "html": "<section class=\"slide\">\n  <div class=\"kicker\"><span class=\"dot\"></span> Module 5 \u2014 Conversion & Retention <span class=\"num\">25</span></div>\n  <div class=\"rule\"></div>\n  <h2 class=\"d\" style=\"font-size:36px;margin-top:10px\">Convert, then <em class=\"i\">keep</em>.</h2>\n  <div class=\"fly\">\n    <div class=\"node\">Convert</div><span class=\"ar\">\u2192</span>\n    <div class=\"node k\">Keep</div><span class=\"ar\">\u2192</span>\n    <div class=\"node\">Advocate</div><span class=\"ar\">\u21ba</span>\n  </div>\n  <div class=\"triad\">\n    <div class=\"tri\"><div class=\"th\">Convert</div><div class=\"td\">Remove friction so an interested person actually buys.</div></div>\n    <div class=\"tri\"><div class=\"th\">Keep</div><div class=\"td\">Build the habit: a trigger, an action, a reward, repeated.</div></div>
